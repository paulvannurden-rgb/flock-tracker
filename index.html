<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flock Health Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f6f8;
    --surface3: #eceef2;
    --border: #e1e4ea;
    --border2: #c8cdd8;
    --text: #0d0f18;
    --text2: #2d3148;
    --text3: #5a6280;
    --accent: #2e7d4f;
    --accent2: #236040;
    --accent-glow: rgba(46,125,79,0.1);
    --green: #2e7d4f;
    --green-bg: #e8f5ee;
    --warn: #d97706;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --blue: #2563eb;
    --purple: #7c3aed;
    --radius: 0.75rem;
    --radius-sm: 0.45rem;
    --radius-lg: 1rem;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; }
  h1,h2,h3,h4 { font-family: 'Inter', sans-serif; font-weight: 600; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; background: radial-gradient(ellipse at 50% 30%, #e8ecf4 0%, #f0f2f5 70%); }
  .login-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 1.25rem; padding: 2.5rem; width: 100%; max-width: 360px; text-align: center; box-shadow: var(--shadow); }
  .login-box h1 { font-size: 1.6rem; color: var(--text); margin-bottom: 0.25rem; font-weight: 700; }
  .login-box p { color: var(--text3); font-size: 0.78rem; margin-bottom: 2rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .login-error { background: var(--danger-bg); color: var(--danger); border-radius: var(--radius-sm); padding: 0.6rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
  .login-logo { width: 52px; height: 52px; background: var(--accent-glow); border: 1px solid var(--border2); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.6rem; }

  /* LAYOUT */
  #app { display: none; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-logo { width: 32px; height: 32px; background: var(--accent-glow); border: 1px solid var(--border2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .header-title { font-size: 0.95rem; color: var(--text); font-weight: 600; }
  .header-sub { font-size: 0.68rem; color: var(--text3); }
  nav { display: flex; gap: 0.15rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.2rem; }
  .nav-btn { background: none; border: none; color: var(--text3); padding: 0.35rem 0.65rem; border-radius: 0.35rem; cursor: pointer; font-size: 0.75rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .nav-btn.active { background: var(--surface2); color: var(--accent); }
  .nav-btn:hover:not(.active) { color: var(--text2); background: var(--surface2); }
  main { flex: 1; padding: 1.5rem; max-width: 1000px; margin: 0 auto; width: 100%; }

  /* FORMS */
  .field { margin-bottom: 0.9rem; }
  .field label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.3rem; }
  input, select, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 0.75rem; }
  .row .field { flex: 1; min-width: 0; }

  /* BUTTONS */
  .btn { border: none; border-radius: var(--radius-sm); padding: 0.5rem 1rem; font-size: 0.83rem; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.35rem; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #5a2020; }
  .btn-danger:hover { background: #3d1a1a; }
  .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.75rem; }
  .btn-icon { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); padding: 0.3rem 0.55rem; font-size: 0.75rem; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; }
  .btn-icon:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .card-hover { cursor: pointer; transition: all 0.15s; }
  .card-hover:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-sm); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 1rem; color: var(--text); font-weight: 600; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-green { background: #e8f5ee; color: #1a6b3a; border: 1px solid #b3d9c0; }
  .badge-yellow { background: #fef3cd; color: #92560a; border: 1px solid #fcd68a; }
  .badge-red { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
  .badge-blue { background: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd; }
  .badge-purple { background: #f5f3ff; color: #6d28d9; border: 1px solid #c4b5fd; }
  .badge-gray { background: #f1f3f6; color: var(--text2); border: 1px solid var(--border); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; }
  .tab { background: none; border: none; color: var(--text3); padding: 0.6rem 0.9rem; font-size: 0.8rem; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* FLOCK GRID */
  .flock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.85rem; }

  /* SEARCH BAR */
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-bar input { flex: 1; min-width: 160px; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 0.35rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.75rem; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .filter-btn.active { background: var(--accent-glow); border-color: var(--accent2); color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

  /* RECORD ROWS */
  .record-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.5rem; transition: border-color 0.15s; }
  .record-row:hover { border-color: var(--border2); }
  .record-row:last-child { margin-bottom: 0; }
  .record-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
  .confirm-inline { display: flex; align-items: center; gap: 0.35rem; }
  .confirm-inline span { font-size: 0.73rem; color: var(--danger); }

  /* PEDIGREE */
  .pedigree-tree { overflow-x: auto; padding-bottom: 1rem; }
  .ped-node { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 0.75rem; font-size: 0.8rem; min-width: 130px; }
  .ped-node.linked { cursor: pointer; border-color: var(--border2); }
  .ped-node.linked:hover { border-color: var(--accent); }
  .ped-node-name { font-weight: 600; color: var(--text); }
  .ped-node-sub { font-size: 0.68rem; color: var(--text3); margin-top: 0.1rem; }
  .ped-row { display: flex; gap: 1.5rem; align-items: flex-start; }
  .ped-col { display: flex; flex-direction: column; gap: 0.5rem; }

  /* WEIGHT CHART */
  .weight-chart { background: var(--surface2); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); }
  canvas { width: 100% !important; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
  .empty h3 { font-size: 1rem; color: var(--text2); margin-bottom: 0.3rem; font-weight: 600; }
  .empty p { font-size: 0.83rem; }

  /* LOADING */
  .loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.85rem; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION HEADER */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
  .section-title { font-size: 0.85rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  /* PROFILE HEADER */
  .profile-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
  .profile-name { font-size: 1.5rem; color: var(--text); font-weight: 700; }
  .profile-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; align-items: center; }

  /* OPTGROUP */
  optgroup { color: var(--text3); font-style: normal; font-size: 0.72rem; }
  option { color: var(--text); background: var(--bg); }

  .filter-menu-item { padding: 0.4rem 0.65rem; border-radius: var(--radius-sm); font-size: 0.82rem; cursor: pointer; color: var(--text2); transition: background 0.1s; }
  .filter-menu-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-btn { background: none; border: none; color: var(--text3); padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.82rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 0.6rem; width: 100%; text-align: left; }
  .sidebar-btn span:first-child { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  .sidebar-btn.active { background: var(--accent-glow); color: var(--accent); }
  .sidebar-btn:hover:not(.active) { background: var(--surface2); color: var(--text2); }

  /* SIDEBAR POSITION */
  #sidebar { left: 0; }

  /* MOBILE */
  @media (max-width: 700px) {
    #sidebar {
      left: -240px;
      transition: left 0.25s ease;
      z-index: 90;
    }
    #sidebar.open {
      left: 0;
      box-shadow: 4px 0 32px rgba(0,0,0,0.6);
    }
    #mobile-header { display: flex !important; }
    .mobile-nav { display: none !important; }
    nav { display: none; }
    div[style*="margin-left:220px"] { margin-left: 0 !important; padding-top: 56px; }
    main { padding: 0.75rem; padding-top: 1rem; }
    .flock-grid { grid-template-columns: 1fr 1fr; }
    header { flex-wrap: wrap; gap: 0.5rem; }
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 0.6rem 1.2rem; border-radius: var(--radius); font-size: 0.83rem; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow); }
  #toast.show { opacity: 1; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .mobile-nav { display: none; }
</style>
</head>

let allAiRams = [];
let allSemenInventory = [];
let customProducts = { vaccine: [], medication: [], cost: [] };
let flockFilter = 'Active';
let flockTypeFilter = 'All';
let flockRoleFilter = 'All Roles';
let flockSexFilter = 'All';
let flockSearch = '';
let confirmingDelete = null;

// ── AUTH ──────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('login-password').value;
  if (pw === FLOCK_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    const el = document.getElementById('login-error');
    el.textContent = 'Incorrect password. Please try again.';
    el.style.display = 'block';
  }
}
// Farm profile stored in localStorage
function getFarmProfile() {
  try {
    return JSON.parse(localStorage.getItem('flock_farm_profile') || '{}');
  } catch(e) { return {}; }
}
function saveFarmProfile(data) {
  localStorage.setItem('flock_farm_profile', JSON.stringify(data));
}

function openFarmSettings() {
  const p = getFarmProfile();
  showModal(`
    <div class="modal-header"><div class="modal-title">⚙️ Farm Settings</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="font-size:0.82rem;color:var(--text3);margin-bottom:0.85rem">Used on invoices, health papers, and reports.</div>

    <input type="hidden" id="fs-type-val" value="${p.type||'personal'}">
    <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:0.85rem">
      <button type="button" id="fs-type-personal" onclick="fsSetType('personal')" style="flex:1;padding:0.45rem;font-size:0.82rem;font-weight:600;background:${(p.type||'personal')==='personal'?'var(--accent)':'var(--surface2)'};color:${(p.type||'personal')==='personal'?'#fff':'var(--text)'};border:none;cursor:pointer">👤 Personal / Farm</button>
      <button type="button" id="fs-type-business" onclick="fsSetType('business')" style="flex:1;padding:0.45rem;font-size:0.82rem;font-weight:600;background:${p.type==='business'?'var(--accent)':'var(--surface2)'};color:${p.type==='business'?'#fff':'var(--text)'};border:none;border-left:1px solid var(--border);cursor:pointer">🏢 Business</button>

    <div id="fs-personal-section" style="${p.type==='business'?'display:none':''}">
      <div class="row">
        <div class="field"><label>Farm / Operation Name</label><input id="fs-name" value="${p.name||''}" placeholder="e.g. Hidden Creek Lambs"></div>
        <div class="field"><label>Owner Name</label><input id="fs-owner-personal" value="${p.owner||''}" placeholder="e.g. Paul VanNurden"></div>
      </div>
    </div>
    <div id="fs-business-section" style="${p.type==='business'?'':'display:none'}">
      <div class="row">

      </div>
      <div class="field"><label>EIN / Tax ID</label><input id="fs-ein" value="${p.ein||''}" placeholder="XX-XXXXXXX"></div>
    </div>

    <div class="field"><label>Street Address</label><input id="fs-street" value="${p.street||''}" placeholder="e.g. 1234 County Road 5"></div>
    <div class="row">
      <div class="field"><label>City</label><input id="fs-city" value="${p.city||''}" placeholder="Willmar"></div>
      <div class="field"><label>State</label><input id="fs-state" value="${p.state||''}" placeholder="MN" style="max-width:80px"></div>
      <div class="field"><label>ZIP</label><input id="fs-zip" value="${p.zip||''}" placeholder="56201" style="max-width:100px"></div>
    </div>
    <div class="row">
      <div class="field"><label>Phone</label><input id="fs-phone" value="${p.phone||''}" placeholder="(320) 555-0000"></div>

function fsSetType(type) {
  const hidden = document.getElementById('fs-type-val');
  if (hidden) hidden.value = type;
  ['personal','business'].forEach(t => {
    const btn = document.getElementById(`fs-type-${t}`);
    if (btn) { btn.style.background = t===type?'var(--accent)':'var(--surface2)'; btn.style.color = t===type?'#fff':'var(--text)'; }
  });
  const ps = document.getElementById('fs-personal-section');
  const bs = document.getElementById('fs-business-section');
  if (ps) ps.style.display = type==='personal' ? '' : 'none';
  if (bs) bs.style.display = type==='business' ? '' : 'none';
}

function saveFarmSettings() {
  const type = document.getElementById('fs-type-val')?.value || 'personal';
  saveFarmProfile({
    type,
    name: document.getElementById('fs-name')?.value?.trim() || '',
    bizname: document.getElementById('fs-bizname')?.value?.trim() || '',
    owner: (type==='business' ? document.getElementById('fs-owner-business') : document.getElementById('fs-owner-personal'))?.value?.trim() || '',
    ein: document.getElementById('fs-ein')?.value?.trim() || '',
    street: document.getElementById('fs-street')?.value?.trim() || '',
    city: document.getElementById('fs-city')?.value?.trim() || '',
    state: document.getElementById('fs-state')?.value?.trim() || '',
    zip: document.getElementById('fs-zip')?.value?.trim() || '',
    phone: document.getElementById('fs-phone')?.value?.trim() || '',
    email: document.getElementById('fs-email')?.value?.trim() || '',
    website: document.getElementById('fs-website')?.value?.trim() || '',
    terms: document.getElementById('fs-terms')?.value?.trim() || '',
  });
  toast('Settings saved!');
  closeModal();
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-password').value = '';
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  await Promise.all([loadLambs(), loadCustomProducts(), loadAiRams(), loadSemenInventory()]);
  showPage('flock');
}

async function loadSemenInventory() {
  const { data } = await db.from('semen_inventory').select('*');
  allSemenInventory = data || [];
}

async function loadLambs() {
  const { data } = await db.from('lambs').select('*').order('name');
  allLambs = data || [];
  document.getElementById('flock-count').textContent = `${allLambs.filter(l=>l.status==='Active').length} active lambs`;
}

async function loadAiRams() {
  const { data } = await db.from('ai_rams').select('*').order('name');
  allAiRams = data || [];
}

async function loadCustomProducts() {
  const { data } = await db.from('custom_products').select('*').order('name');
  customProducts = { vaccine: [], medication: [], cost: [] };
  (data || []).forEach(p => {
    if (p.type === 'vaccine') customProducts.vaccine.push(p.name);
    else if (p.type === 'medication') customProducts.medication.push(p.name);
    else if (p.type === 'cost') customProducts.cost.push({ name: p.name });
    else if (p.type === 'supply_item' || p.type === 'supply_supplier') {} // handled separately
  });
}

// ── NAVIGATION ────────────────────────────────────────
function showPage(page) {
  closeMobileMenu();
  currentPage = page;
  currentLambId = null;
  document.querySelectorAll('[data-page]').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const btn = document.getElementById('header-action-btn');
  const treatBtn = document.getElementById('sidebar-treatment-btn');
  const bulkBreedBtn = document.getElementById('sidebar-bulk-breed-btn');
  const bulkPregBtn = document.getElementById('sidebar-bulk-pregcheck-btn');
  const bulkWeightBtn = document.getElementById('sidebar-bulk-weight-btn');
  btn.style.display = page === 'flock' ? '' : 'none';
  if (treatBtn) treatBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkBreedBtn) bulkBreedBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkPregBtn) bulkPregBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkWeightBtn) bulkWeightBtn.style.display = page === 'flock' ? '' : 'none';
  if (page === 'flock') renderFlock();
  else if (page === 'airams') renderAiRams();
  else if (page === 'breeding') renderBreeding();
  else if (page === 'flushes') renderFlushes();
  else if (page === 'weights') renderWeightsPage();
  else if (page === 'analytics') renderAnalytics();
  else if (page === 'shows') renderShows();
  else if (page === 'planning') renderPlanning();
  else if (page === 'embryo_inventory') renderEmbryoInventory();
  else if (page === 'costs') renderCosts();
  else if (page === 'supplies') renderSupplies();
  else if (page === 'calendar') renderCalendar();
  else if (page === 'pedigree') renderPedigreeNetwork();
  else if (page === 'export') renderExport();
  else if (page === 'invoices') renderInvoices();
}

function toggleMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    overlay.style.display = 'none';
  } else {
    sidebar.classList.add('open');
    overlay.style.display = 'block';
  }
}
function closeMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.remove('open');
  const overlay = document.getElementById('mobile-overlay');
  if (overlay) overlay.style.display = 'none';
}

function showLambAtTab(id, tab) {
  currentLambId = id;
  currentLambTab = tab;
  const btn = document.getElementById('header-action-btn');
  if (btn) btn.style.display = 'none';
  ['sidebar-treatment-btn','sidebar-bulk-breed-btn','sidebar-bulk-pregcheck-btn','sidebar-bulk-weight-btn'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  renderLambDetail();
}

function showLamb(id) {
  currentLambId = id;
  currentLambTab = 'health';
  document.getElementById('header-action-btn').style.display = 'none';
  const treatBtn = document.getElementById('sidebar-treatment-btn');
  const bulkBreedBtn = document.getElementById('sidebar-bulk-breed-btn');
  const bulkWeightBtn = document.getElementById('sidebar-bulk-weight-btn');
  if (treatBtn) treatBtn.style.display = 'none';
  if (bulkBreedBtn) bulkBreedBtn.style.display = 'none';
  if (bulkWeightBtn) bulkWeightBtn.style.display = 'none';
  renderLambDetail();
}

// ── FLOCK PAGE ────────────────────────────────────────
let flockViewMode = localStorage.getItem('flock_view_mode') || 'card';

function renderFlock() {
  const statuses = ['Active','Sold','Deceased','All'];
  const flockTypes = ['All','Show','Breeding','Both'];
  const roles = ['All Roles','Embryo Donor','Embryo Recipient','Standard'];
  const sexes = ['All','Ewe','Wether','Ram'];
  const filtered = allLambs.filter(l => {
    const flockType = l.flock_type || (l.sex === 'Wether' ? 'Show' : 'Breeding');
    const matchStatus = flockFilter === 'All' || l.status === flockFilter;
    const matchType = flockTypeFilter === 'All' || flockType === flockTypeFilter || flockType === 'Both';
    const matchRole = flockRoleFilter === 'All Roles' || l.role === flockRoleFilter || (flockRoleFilter === 'Embryo Donor' && l.role === 'Both') || (flockRoleFilter === 'Embryo Recipient' && l.role === 'Both');
    const matchSex = flockSexFilter === 'All' || l.sex === flockSexFilter;
    const matchSearch = !flockSearch || l.name.toLowerCase().includes(flockSearch.toLowerCase()) || (l.ear_tag||'').toLowerCase().includes(flockSearch.toLowerCase()) || (l.scrapie_id||'').toLowerCase().includes(flockSearch.toLowerCase()) || (l.alt_id||'').toLowerCase().includes(flockSearch.toLowerCase());
    return matchStatus && matchType && matchRole && matchSex && matchSearch;
  });

  const viewToggle = `
    <div style="display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0">
      <button onclick="flockViewMode='card';localStorage.setItem('flock_view_mode','card');renderFlock()" title="Card view" style="padding:0.35rem 0.6rem;background:${flockViewMode==='card'?'var(--accent)':'var(--surface2)'};color:${flockViewMode==='card'?'#fff':'var(--text3)'};border:none;cursor:pointer;font-size:0.85rem">⊞</button>
      <button onclick="flockViewMode='table';localStorage.setItem('flock_view_mode','table');renderFlock()" title="Table view" style="padding:0.35rem 0.6rem;background:${flockViewMode==='table'?'var(--accent)':'var(--surface2)'};color:${flockViewMode==='table'?'#fff':'var(--text3)'};border:none;border-left:1px solid var(--border);cursor:pointer;font-size:0.85rem">☰</button>
    </div>`;

  let html = `
    <div class="search-bar">
      <input placeholder="Search name, tag, scrapie ID…" value="${flockSearch}" oninput="flockSearch=this.value;renderFlock()" style="flex:1;min-width:160px">
      <div style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center">
        <select onchange="flockFilter=this.value;renderFlock()" style="font-size:0.82rem;padding:0.35rem 0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);width:auto">
          ${statuses.map(s=>`<option value="${s}" ${flockFilter===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <select onchange="flockTypeFilter=this.value;renderFlock()" style="font-size:0.82rem;padding:0.35rem 0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);width:auto">
          ${flockTypes.map(t=>`<option value="${t}" ${flockTypeFilter===t?'selected':''}>${t==='All'?'All Flocks':t+' Flock'}</option>`).join('')}
        </select>
        <select onchange="flockRoleFilter=this.value;renderFlock()" style="font-size:0.82rem;padding:0.35rem 0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);width:auto">
          ${roles.map(r=>`<option value="${r}" ${flockRoleFilter===r?'selected':''}>${r==='All Roles'?'All Roles':r==='Embryo Donor'?'Donors':r==='Embryo Recipient'?'Recipients':'Standard'}</option>`).join('')}
        </select>
        <select onchange="flockSexFilter=this.value;renderFlock()" style="font-size:0.82rem;padding:0.35rem 0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);width:auto">
          ${sexes.map(s=>`<option value="${s}" ${flockSexFilter===s?'selected':''}>${s==='All'?'All Sexes':s+'s'}</option>`).join('')}
        </select>
        ${viewToggle}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="openAddLamb()">+ Add Animal</button>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.4rem 0.9rem;display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:1.1rem;font-weight:700;color:var(--accent)">${filtered.length}</span>
        <span style="font-size:0.75rem;color:var(--text3);font-weight:500">${filtered.length === 1 ? 'animal' : 'animals'}</span>
      </div>
      ${flockTypeFilter !== 'All' ? `<span style="font-size:0.78rem;color:var(--text3)">${flockTypeFilter} Flock</span>` : ''}
      ${flockFilter !== 'All' ? `<span style="font-size:0.78rem;color:var(--text3)">${flockFilter}</span>` : ''}
      ${flockSearch ? `<span style="font-size:0.78rem;color:var(--text3)">matching "${flockSearch}"</span>` : ''}
    </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🐑</div><h3>No lambs found</h3><p>Try a different filter or add your first lamb</p></div>`;
  } else if (flockViewMode === 'table') {
    const rows = filtered.map(lamb => {
      const flockType = lamb.flock_type || (lamb.sex === 'Wether' ? 'Show' : 'Breeding');
      const statusBadge = lamb.status === 'Active' ? 'badge-green' : lamb.status === 'Sold' ? 'badge-blue' : 'badge-red';
      const flockBadge = flockType === 'Show' ? 'badge-purple' : flockType === 'Breeding' ? 'badge-blue' : 'badge-gray';
      return `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="showLamb('${lamb.id}')" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <td style="padding:0.55rem 0.85rem;font-weight:600;color:var(--text)">${lamb.name}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.ear_tag?'#'+lamb.ear_tag:'—'}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.alt_id||'—'}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.scrapie_id||'—'}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.sex||'—'}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.breed||'—'}</td>
        <td style="padding:0.55rem 0.75rem;color:var(--text2)">${lamb.dob||'—'}</td>
        <td style="padding:0.55rem 0.75rem"><span class="badge ${flockBadge}" style="font-size:0.65rem">${flockType}</span></td>
        <td style="padding:0.55rem 0.75rem"><span class="badge ${statusBadge}">${lamb.status||'Active'}</span></td>
        ${lamb.role&&lamb.role!=='Standard'?`<td style="padding:0.55rem 0.75rem"><span class="badge badge-yellow" style="font-size:0.65rem">${lamb.role==='Embryo Donor'?'Donor':lamb.role==='Embryo Recipient'?'Recip':'Both'}</span></td>`:`<td style="padding:0.55rem 0.75rem;color:var(--text3);font-size:0.75rem">—</td>`}
      </tr>`;
    }).join('');
    html += `<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:0.84rem">
        <thead><tr style="background:var(--surface2);border-bottom:2px solid var(--border)">
          <th style="padding:0.55rem 0.85rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Name</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Ear Tag</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Alt ID</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Scrapie ID</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Sex</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Breed</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">DOB</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Flock</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Status</th>
          <th style="padding:0.55rem 0.75rem;text-align:left;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Role</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div>`;
  } else {
    html += `<div class="flock-grid">`;
    filtered.forEach(lamb => {
      const color = lamb.tag_color || TAG_COLORS[0];
      const statusBadge = lamb.status === 'Active' ? 'badge-green' : lamb.status === 'Sold' ? 'badge-blue' : 'badge-red';
      const flockType = lamb.flock_type || (lamb.sex === 'Wether' ? 'Show' : 'Breeding');
      const flockBadge = flockType === 'Show' ? 'badge-purple' : flockType === 'Breeding' ? 'badge-blue' : 'badge-gray';
      html += `
        <div class="card card-hover" onclick="showLamb('${lamb.id}')">
          <div style="min-width:0">
            <div style="font-size:1rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${lamb.name}</div>
            <div style="display:flex;gap:0.35rem;margin-top:0.35rem;flex-wrap:wrap;align-items:center">

              <span class="badge ${flockBadge}" style="font-size:0.62rem">${flockType}</span>
              ${lamb.role!=='Standard'?`<span class="badge badge-yellow" style="font-size:0.62rem">${lamb.role==='Embryo Donor'?'Donor':lamb.role==='Embryo Recipient'?'Recip':'Both'}</span>`:''}
            </div>
            <div style="font-size:0.75rem;color:var(--text3);margin-top:0.35rem">${lamb.sex||''}${lamb.breed?' · '+lamb.breed:''}${lamb.dob?' · '+calcAge(lamb.dob):''}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('main-content').innerHTML = html;
}

function calcAge(dob) {
  if (!dob) return '';
  const days = Math.floor((new Date() - new Date(dob)) / 86400000);
  if (days < 0) return '';
  if (days < 30) return `${days}d`;
  const mo = Math.floor(days / 30.44);
  if (mo < 24) return `${mo}mo`;
  return `${Math.floor(mo/12)}yr`;
}

// ── LAMB DETAIL ───────────────────────────────────────
async function renderLambDetail() {
  const lamb = allLambs.find(l => l.id === currentLambId);
  if (!lamb) { showPage('flock'); return; }

  const color = lamb.tag_color || TAG_COLORS[0];
  const statusBadge = lamb.status === 'Active' ? 'badge-green' : lamb.status === 'Sold' ? 'badge-blue' : 'badge-red';

      ${(lamb.flock_type==='Show'||lamb.flock_type==='Both'||!lamb.flock_type&&lamb.sex==='Wether')?`<button class="tab ${currentLambTab==='weight'?'active':''}" onclick="switchLambTab('weight')">⚖️ Weight</button>`:''}

function style_links() {
  const style = document.createElement('style');
  style.textContent = '.link{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}';
  document.head.appendChild(style);
}

function switchLambTab(tab) {
  currentLambTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab) || t.onclick?.toString().includes(tab)));
  document.querySelectorAll('.tab').forEach(t => { if(t.getAttribute('onclick')?.includes(`'${tab}'`)) t.classList.add('active'); else t.classList.remove('active'); });
  loadLambTab();
}

async function loadLambTab() {
  const el = document.getElementById('lamb-tab-content');
  if (!el) return;
  el.innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  if (currentLambTab === 'health') await renderHealthTab(el);
  else if (currentLambTab === 'weight') await renderWeightTab(el);
  else if (currentLambTab === 'breeding') await renderBreedingTab(el);
  else if (currentLambTab === 'embryo') await renderEmbryoTab(el);
  else if (currentLambTab === 'notes') await renderNotesTab(el);
  else if (currentLambTab === 'shows') await renderShowsTab(el);
  else if (currentLambTab === 'pedigree') renderPedigreeTab(el);
}

function drawWeightChart(recs) {
  const canvas = document.getElementById('weight-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 400, H = 180;
  canvas.width = W; canvas.height = H;
  const pad = { t:20, r:20, b:30, l:45 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
  const weights = recs.map(r => parseFloat(r.weight_lbs));
  const minW = Math.min(...weights) * 0.95, maxW = Math.max(...weights) * 1.05;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = '#263d1c'; ctx.lineWidth = 1;
  for (let i=0;i<=4;i++) {
    const y = pad.t + iH - (i/4)*iH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+iW, y); ctx.stroke();
    ctx.fillStyle='#4a6e38'; ctx.font='10px Source Serif 4,serif'; ctx.textAlign='right';
    ctx.fillText((minW+(maxW-minW)*i/4).toFixed(0), pad.l-4, y+3);
  }
  ctx.beginPath(); ctx.strokeStyle='#6ab84a'; ctx.lineWidth=2;
  recs.forEach((r,i) => {
    const x = pad.l + (i/(recs.length-1))*iW;
    const y = pad.t + iH - ((parseFloat(r.weight_lbs)-minW)/(maxW-minW))*iH;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  recs.forEach((r,i) => {
    const x = pad.l + (i/(recs.length-1))*iW;
    const y = pad.t + iH - ((parseFloat(r.weight_lbs)-minW)/(maxW-minW))*iH;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle='#6ab84a'; ctx.fill();
    if (i===0||i===recs.length-1) {
      ctx.fillStyle='#8aad72'; ctx.font='10px Source Serif 4,serif'; ctx.textAlign='center';
      ctx.fillText(r.date.slice(5), x, H-pad.b+14);
    }
  });
}

async function saveBreedingResult(breedingId, id) {
  const payload = {
    breeding_id: breedingId,
    lamb_id: currentLambId,
    birth_date: v('br2-date')||null,
    num_born: v('br2-born')!==''?parseInt(v('br2-born')):null,
    num_alive: v('br2-alive')!==''?parseInt(v('br2-alive')):null,
    num_male: v('br2-male')!==''?parseInt(v('br2-male')):null,
    num_female: v('br2-female')!==''?parseInt(v('br2-female')):null,
    notes: v('br2-notes')
  };
  let resultId = id;
  if (id) {
    await db.from('breeding_results').update(payload).eq('id', id);
    toast('Result updated');
  } else {
    const { data } = await db.from('breeding_results').insert(payload).select().single();
    resultId = data?.id;
    toast('Result saved');
  }
  // Save individual lamb rows — delete existing then re-insert
  if (resultId) {
    await db.from('breeding_result_lambs').delete().eq('result_id', resultId);
    const lambRows = (window._brLambs||[]).filter(lb => lb.ear_tag || lb.lamb_id);
    if (lambRows.length > 0) {
      await db.from('breeding_result_lambs').insert(lambRows.map(lb => ({
        result_id: resultId,
        ear_tag: lb.ear_tag||null,
        sex: lb.sex||null,
        birth_weight: lb.birth_weight ? parseFloat(lb.birth_weight) : null,
        lamb_id: lb.lamb_id||null
      })));
    }
  }
  window._brLambs = [];
  // Auto-update breeding record outcome to Lamb Born
  await db.from('breeding_records').update({ outcome: 'Lamb Born' }).eq('id', breedingId);
  closeModal(); loadLambTab();
}

function confirmDeleteBreedingResult(id) {

// ── PEDIGREE TAB ──────────────────────────────────────
function renderPedigreeTab(el) {
  const lamb = allLambs.find(l=>l.id===currentLambId);

  function getNode(id, aiId, text) {
    if (id) { const l = allLambs.find(x=>x.id===id); if(l) return l; }
    if (aiId) { const r = allAiRams.find(x=>x.id===aiId); if(r) return { name: r.name+' 🧬', id: null, ai_id: r.id, ear_tag: null, dob: null, sex: 'Ram', sire_id: null, ai_sire_id: null, sire_text: null, dam_id: null, dam_text: null }; }
    if (text) return { name: text, id: null, ear_tag: null, dob: null };
    return null;
  }

  function buildTree(lamb, depth) {
    if (!lamb || depth > 4) return '';
    const sire = getNode(lamb.sire_id, lamb.ai_sire_id, lamb.sire_text);
    const dam = getNode(lamb.dam_id, null, lamb.dam_text);
    const clickable = lamb.id ? `class="ped-node linked" onclick="showLamb('${lamb.id}')"` : `class="ped-node"`;
    const nodeHtml = `<div ${clickable}>
      <div class="ped-node-name">${lamb.name}</div>
      ${lamb.ear_tag?`<div class="ped-node-sub">#${lamb.ear_tag}</div>`:''}
      ${lamb.sex?`<div class="ped-node-sub">${lamb.sex}${lamb.dob?' · '+calcAge(lamb.dob):''}</div>`:''}
    </div>`;
    if (depth >= 3 || (!sire && !dam)) return nodeHtml;
    return `<div class="ped-row">
      ${nodeHtml}
      <div class="ped-connector">→</div>
      <div class="ped-col">
        ${sire ? `<div><div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase;margin-bottom:0.2rem">Sire</div>${buildTree(sire, depth+1)}</div>` : ''}
        ${dam ? `<div><div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase;margin-bottom:0.2rem">Dam</div>${buildTree(dam, depth+1)}</div>` : ''}
      </div>
    </div>`;
  }

  el.innerHTML = `<div class="pedigree-tree">${buildTree(lamb, 0)}</div>`;
}

// ── AI RAMS PAGE ──────────────────────────────────────
function sireOptions(selectedId) {
  const flockRams = allLambs.filter(l => l.sex === 'Ram');
  const flockOpts = flockRams.map(l => `<option value="lamb:${l.id}" ${selectedId==='lamb:'+l.id?'selected':''}>${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}</option>`).join('');

  // Sort AI rams — those with inventory first
  const ramsWithInv = allAiRams.filter(r => allSemenInventory.some(i => i.ai_ram_id === r.id && i.straws > 0));
  const ramsWithoutInv = allAiRams.filter(r => !allSemenInventory.some(i => i.ai_ram_id === r.id && i.straws > 0));

  const makeOpt = r => {
    const inv = allSemenInventory.filter(i => i.ai_ram_id === r.id && i.straws > 0);
    const invStr = inv.length > 0 ? ` — ${inv.map(i=>i.location+': '+i.straws).join(', ')}` : '';
    return `<option value="ai:${r.id}" ${selectedId==='ai:'+r.id?'selected':''}>${r.name}${invStr} 🧬</option>`;
  };

  const aiOptsWithInv = ramsWithInv.map(makeOpt).join('');
  const aiOptsNoInv = ramsWithoutInv.map(makeOpt).join('');

  return `<option value="">— Select sire —</option>
    ${flockRams.length ? `<optgroup label="Flock Rams">${flockOpts}</optgroup>` : ''}
    ${ramsWithInv.length ? `<optgroup label="AI Rams — In Stock 🧪">${aiOptsWithInv}</optgroup>` : ''}
    ${ramsWithoutInv.length ? `<optgroup label="AI Rams — No Inventory">${aiOptsNoInv}</optgroup>` : ''}`;
}

function parseSireSelection(val) {
  if (!val) return { sire_id: null, ai_sire_id: null };
  if (val.startsWith('lamb:')) return { sire_id: val.replace('lamb:',''), ai_sire_id: null };
  if (val.startsWith('ai:')) return { sire_id: null, ai_sire_id: val.replace('ai:','') };
  return { sire_id: null, ai_sire_id: null };
}

function getSireDisplay(sire_id, ai_sire_id, sire_text) {
  if (sire_id) { const s = allLambs.find(l=>l.id===sire_id); return s ? s.name : sire_text||'—'; }
  if (ai_sire_id) { const s = allAiRams.find(r=>r.id===ai_sire_id); return s ? `${s.name} 🧬` : sire_text||'—'; }
  return sire_text || '—';
}

function openSemenInventory() {
  const sortedRams = [...allAiRams].sort((a, b) => {
    const aHas = allSemenInventory.some(i => i.ai_ram_id === a.id && i.straws > 0);
    const bHas = allSemenInventory.some(i => i.ai_ram_id === b.id && i.straws > 0);
    if (aHas && !bHas) return -1;
    if (!aHas && bHas) return 1;
    return a.name.localeCompare(b.name);
  });

  const rows = sortedRams.map(ram => {
    const inv = allSemenInventory.filter(i => i.ai_ram_id === ram.id && i.straws > 0);
    const total = inv.reduce((s,i) => s + (i.straws||0), 0);
    const locStr = inv.length > 0 ? inv.map(i=>`${i.location}: <strong>${i.straws}</strong>`).join(' &nbsp;·&nbsp; ') : '<span style="color:var(--text3)">No inventory</span>';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:600;font-size:0.9rem">${ram.name}${total > 0 ? ` <span style="color:var(--green);font-size:0.78rem">(${total} straws)</span>` : ''}</div>
        <div style="font-size:0.78rem;color:var(--text2);margin-top:0.15rem">${locStr}</div>
      </div>
      <button class="btn-icon btn-sm" onclick="openManageInventory('${ram.id}')">Manage</button>
    </div>`;
  }).join('');

  const grandTotal = allSemenInventory.filter(i => i.straws > 0).reduce((s,i) => s + (i.straws||0), 0);
  showModal(`
    <div class="modal-header"><div class="modal-title">🧪 Semen Inventory</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem 1rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:0.78rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.07em">Total Straws in Inventory</span>
      <span style="font-size:1.2rem;font-weight:700;color:var(--accent)">${grandTotal}</span>
    </div>
    <div style="max-height:380px;overflow-y:auto">${rows || '<div class="empty"><p>No AI rams yet</p></div>'}</div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

    const inv = allSemenInventory.filter(i => i.ai_ram_id === r.id && i.straws > 0);
    const total = inv.reduce((s,i) => s+(i.straws||0), 0);
    return `<option value="${r.id}">${r.name}${total > 0 ? ` (${total} straws)` : ' — no inventory'}</option>`;

  await loadSemenInventory();

  const LOCATIONS = ['Tank', 'RSG', 'Other'];

  const locRows = LOCATIONS.map(loc => {
    const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === loc);
    const count = entry ? entry.straws : 0;
    const cps = entry?.cost_per_straw;
    return `<div style="padding:0.6rem 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
        <div style="font-weight:500;color:var(--text);min-width:80px">${loc}</div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span style="font-size:1.1rem;font-weight:700;color:${count>0?'var(--accent)':'var(--text3)'};min-width:40px;text-align:center">${count}</span>
          <span style="font-size:0.75rem;color:var(--text3)">straws</span>
          ${cps ? `<span style="font-size:0.72rem;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:0.25rem;padding:0.1rem 0.4rem">$${parseFloat(cps).toFixed(2)}/straw</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:0.35rem;align-items:center;flex-wrap:wrap">
        <input type="number" id="inv-adj-${loc}" value="1" min="0.5" step="0.5" style="width:65px;padding:0.3rem 0.4rem;font-size:0.82rem" placeholder="qty">
        <input type="number" id="inv-cps-${loc}" value="${cps||''}" min="0" step="0.01" style="width:80px;padding:0.3rem 0.4rem;font-size:0.82rem" placeholder="$/straw">
        <button class="btn btn-primary btn-sm" onclick="adjustInventory('${ramId}','${loc}','',1)">+ Add</button>
        <button class="btn btn-secondary btn-sm" onclick="adjustInventory('${ramId}','${loc}','',-1)" ${count===0?'disabled':''}>− Use</button>
      </div>
    </div>`;
  }).join('');

  // Transfer section
  const locOptions = LOCATIONS.map(l => `<option value="${l}">${l}</option>`).join('');
  const transferSection = `
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
      <div style="font-size:0.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.6rem">Transfer Between Locations</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <select id="inv-from-loc" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.4rem 0.6rem;font-size:0.82rem">${locOptions}</select>
        <span style="color:var(--text3)">→</span>
        <select id="inv-to-loc" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.4rem 0.6rem;font-size:0.82rem">${locOptions}</select>
        <input type="number" id="inv-transfer-qty" value="1" min="0.5" step="0.5" style="width:65px;padding:0.4rem;font-size:0.82rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text)">
        <span style="font-size:0.78rem;color:var(--text3)">straws</span>
        <button class="btn btn-primary btn-sm" onclick="transferInventory('${ramId}')">Transfer</button>
      </div>
    </div>`;

  showModal(`
    <div class="modal-header"><div class="modal-title">🧪 ${ram.name} — Inventory</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:0.5rem;font-size:0.78rem;color:var(--text3)">Enter qty and cost per straw (required to add), then click Add</div>
    ${locRows}
    ${transferSection}
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

async function transferInventory(ramId) {
  const fromLoc = document.getElementById('inv-from-loc')?.value;
  const toLoc = document.getElementById('inv-to-loc')?.value;
  const qty = parseFloat(document.getElementById('inv-transfer-qty')?.value) || 1;

  if (fromLoc === toLoc) { toast('Select different locations'); return; }

  const fromEntry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === fromLoc);
  if (!fromEntry || fromEntry.straws < qty) { toast(`Not enough straws in ${fromLoc}`); return; }

  // Deduct from source
  const newFromCount = fromEntry.straws - qty;
  await db.from('semen_inventory').update({ straws: newFromCount, updated_at: new Date().toISOString() }).eq('id', fromEntry.id);
  fromEntry.straws = newFromCount;

  // Add to destination
  const toEntry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === toLoc);
  if (toEntry) {
    const newToCount = toEntry.straws + qty;
    await db.from('semen_inventory').update({ straws: newToCount, updated_at: new Date().toISOString() }).eq('id', toEntry.id);
    toEntry.straws = newToCount;
  } else {
    const { data } = await db.from('semen_inventory').insert({ ai_ram_id: ramId, location: toLoc, straws: qty });
    if (data) allSemenInventory.push(Array.isArray(data) ? data[0] : data);
  }

  // Log transaction
  await db.from('semen_transactions').insert({
    ai_ram_id: ramId, transaction_type: 'transfer', straws: qty,
    notes: `Transferred ${qty} from ${fromLoc} to ${toLoc}`
  });

  toast(`Transferred ${qty} straw${qty>1?'s':''} from ${fromLoc} to ${toLoc}`);
  await loadSemenInventory();
  renderAiRams();
  openManageInventory(ramId);
}

async function adjustInventory(ramId, location, entryIdHint, direction) {
  const qty = parseFloat(document.getElementById(`inv-adj-${location}`)?.value) || 1;
  const adj = direction * qty;
  const cpsInput = document.getElementById(`inv-cps-${location}`)?.value;
  const costPerStraw = cpsInput ? parseFloat(cpsInput) : null;

  // Require cost per straw when adding
  if (direction > 0 && !costPerStraw) {
    toast('Cost per straw required when adding inventory');
    document.getElementById(`inv-cps-${location}`)?.focus();
    return;
  }

  const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === location);

  if (entry) {
    const newCount = Math.max(0, (entry.straws || 0) + adj);
    const updateData = { straws: newCount, updated_at: new Date().toISOString() };
    if (direction > 0 && costPerStraw != null) updateData.cost_per_straw = costPerStraw;
    await db.from('semen_inventory').update(updateData).eq('id', entry.id);
    entry.straws = newCount;
    if (direction > 0 && costPerStraw != null) entry.cost_per_straw = costPerStraw;
  } else {
    if (adj <= 0) { toast('No inventory to deduct'); return; }
    const { data } = await db.from('semen_inventory').insert({ ai_ram_id: ramId, location, straws: adj, cost_per_straw: costPerStraw });
    if (data) allSemenInventory.push(Array.isArray(data) ? data[0] : data);
  }

  await db.from('semen_transactions').insert({
    ai_ram_id: ramId,
    transaction_type: direction > 0 ? 'add' : 'use',
    straws: qty,
    notes: direction > 0 ? `Manual add — ${location}${costPerStraw?` @ $${costPerStraw}/straw`:''}` : `Manual use — ${location}`
  });

  toast('Inventory updated');
  await loadSemenInventory();
  renderAiRams();
  openManageInventory(ramId);
}

async function deductSemenInventory(ramId, location, straws, referenceType, referenceId) {
  const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === location);
  if (!entry) { toast('No inventory found for that location'); return; }
  const newCount = Math.max(0, entry.straws - straws);
  await db.from('semen_inventory').update({ straws: newCount, updated_at: new Date().toISOString() }).eq('id', entry.id);
  await db.from('semen_transactions').insert({
    ai_ram_id: ramId, inventory_id: entry.id,
    transaction_type: 'use', straws,
    reference_type: referenceType, reference_id: referenceId,
    notes: `Used in ${referenceType}`
  });
  // Auto-create semen cost entry if cost_per_straw is set
  if (entry.cost_per_straw && referenceId) {
    const ram = allAiRams.find(r => r.id === ramId);
    const totalCost = parseFloat(entry.cost_per_straw) * straws;
    const table = referenceType === 'flush' ? 'flush_costs' : 'breeding_costs';
    const idField = referenceType === 'flush' ? 'flush_id' : 'breeding_id';
    await db.from(table).insert({
      [idField]: referenceId,
      description: `Semen — ${ram?.name||'AI Ram'} (${straws} straw${straws!==1?'s':''} @ $${parseFloat(entry.cost_per_straw).toFixed(2)})`,
      category: 'Semen',
      amount: totalCost,
      date: new Date().toISOString().slice(0,10)
    });
  }
  entry.straws = newCount;
  await loadSemenInventory();
}

function getSemenOptionsForRam(ramId, selectedLoc) {
  const inv = allSemenInventory.filter(i => i.ai_ram_id === ramId && i.straws > 0);
  if (inv.length === 0) return '<option value="">No inventory available</option>';
  return inv.map(i => `<option value="${i.location}" ${selectedLoc===i.location?'selected':''}>${i.location} (${i.straws} straws)</option>`).join('');
}

async function saveCostDesc(btn) {
  const input = btn.previousElementSibling;
  const desc = input?.value?.trim();
  if (!desc) { toast('Enter a description first'); return; }
  // Check if already saved
  if ((customProducts.cost||[]).find(p => p.name === desc)) { toast('Already saved'); return; }
  await db.from('custom_products').insert({ type: 'cost', name: desc });
  if (!customProducts.cost) customProducts.cost = [];
  customProducts.cost.push({ name: desc });
  // Update all datalists in the modal
  document.querySelectorAll('[id$="_dl"]').forEach(dl => {
    const opt = document.createElement('option');
    opt.value = desc;
    dl.appendChild(opt);
  });
  toast(`"${desc}" saved to list`);
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.style.color = 'var(--text3)'; }, 1500);
}

async function saveInlineCosts(containerId, table, idField, recordId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const inserts = [];
  container.querySelectorAll('div').forEach(row => {
    const desc = row.querySelector('.cr-desc')?.value?.trim();
    const cat = row.querySelector('.cr-cat')?.value;
    const amount = parseFloat(row.querySelector('.cr-amount')?.value);
    if (desc && amount > 0) inserts.push({ [idField]: recordId, description: desc, category: cat, amount, date: new Date().toISOString().slice(0,10) });
  });
  if (inserts.length > 0) await db.from(table).insert(inserts);
}

// ── BREEDING PAGE ─────────────────────────────────────
function clearBreedFilter(key, val) {
  if (key === 'females' || key === 'sires') {
    window._breedingFilters[key] = (window._breedingFilters[key]||[]).filter(v => v !== val);
  } else {
    window._breedingFilters[key] = '';
  }
  renderBreedingTable(window._breedingAllRecs, window._breedingFilters);
}

function clearFlushFilter(key) {
  window._flushFilters[key] = '';
  renderFlushTable(window._flushAllRecs, window._flushAllTransfers||[], window._flushFilters);
}

let _breedFilterTimer = null;
let _activeFilterKey = null;

function debounceBreedFilter(key, value) {
  window._breedingFilters[key] = value;
  clearTimeout(_breedFilterTimer);
  _breedFilterTimer = setTimeout(() => {
    renderBreedingTable(window._breedingAllRecs, window._breedingFilters);
  }, 350);
}

function toggleBreedFilterMenu() {
  const menu = document.getElementById('breed-filter-menu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function closeBreedFilterMenu() {
  const menu = document.getElementById('breed-filter-menu');
  if (menu) menu.style.display = 'none';
}

function showBreedFilterInput(key) {
  closeBreedFilterMenu();
  _activeFilterKey = key;
  const wrap = document.getElementById('breed-filter-input-wrap');
  const input = document.getElementById('breed-filter-input');
  if (!wrap || !input) return;
  const isDate = key.includes('From') || key.includes('To');
  input.type = isDate ? 'date' : 'text';
  input.placeholder = key === 'female' ? 'Name or tag…' : key === 'sire' ? 'Sire name…' : '';
  input.value = window._breedingFilters[key] || '';
  wrap.style.display = 'inline-flex';
  input.focus();
}

function applyBreedFilterInput() {
  if (!_activeFilterKey) return;
  const val = document.getElementById('breed-filter-input')?.value || '';
  if (val) {
    if (_activeFilterKey === 'female') {
      if (!window._breedingFilters.females.includes(val))
        window._breedingFilters.females.push(val);
    } else if (_activeFilterKey === 'sire') {
      if (!window._breedingFilters.sires.includes(val))
        window._breedingFilters.sires.push(val);
    } else {
      window._breedingFilters[_activeFilterKey] = val;
    }
  }
  document.getElementById('breed-filter-input-wrap').style.display = 'none';
  _activeFilterKey = null;
  renderBreedingTable(window._breedingAllRecs, window._breedingFilters);
}

// Close filter menu when clicking outside
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('filter-dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) closeBreedFilterMenu();
});

async function openShowDetail(showId) {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  const [{ data: show }, { data: entries }, { data: allWeightRecs }] = await Promise.all([
    db.from('shows').select('*').eq('id', showId).single(),
    db.from('show_entries').select('*').eq('show_id', showId),
    db.from('weight_records').select('*').order('date', {ascending:false}),
  ]);
  if (!show) { renderShows(); return; }
  // Get most recent weight per animal from weight_records
  const lastWeightByLamb = {};
  (allWeightRecs||[]).forEach(wr => {
    if (!lastWeightByLamb[wr.lamb_id]) lastWeightByLamb[wr.lamb_id] = wr;
  });
  window._currentShow = show;
  window._currentShowEntries = entries || [];
  window._lastWeightByLamb = lastWeightByLamb;
  renderShowDetail();
}

async function saveShowEntry(showId) {
  const lambId = document.getElementById('se-lamb')?.value;
  if (!lambId) { toast('Select an animal'); return; }

  const classRows = document.querySelectorAll('.se-class-row');
  const classes = [...classRows].map(row => {
    const inputs = row.querySelectorAll('input');
    return { class: inputs[0]?.value?.trim()||null, place: inputs[1]?.value?.trim()||null };
  }).filter(r => r.class || r.place);
  if (classes.length === 0) classes.push({ class: null, place: null });

  const wt = parseFloat(document.getElementById('se-weight')?.value);
  const wtDate = document.getElementById('se-wt-date')?.value;
  const seTime = combineTimeAmPm('se-time','se-ampm');
  const notes = document.getElementById('se-notes')?.value?.trim()||null;
  const entryWeight = (wt && !isNaN(wt)) ? wt : null;
  const entryWeightDate = wtDate||null;

  for (const cls of classes) {
    const { data: entry } = await db.from('show_entries').insert({
      show_id: showId, lamb_id: lambId,
      class: cls.class, place: cls.place, notes,
      entry_weight: entryWeight,
      entry_weight_date: entryWeightDate,
    }).select().single();
    if (entry) window._currentShowEntries = [...(window._currentShowEntries||[]), entry];
  }

  toast(classes.length > 1 ? `${classes.length} entries added` : 'Animal added to show');
  closeModal();
  renderShowDetail();
}

async function saveBulkShowWeight(showId) {
  const entries = window._currentShowEntries || [];
  const date = document.getElementById('bsw-date')?.value;
  const weigh_time = combineTimeAmPm('bsw-time','bsw-ampm');
  const updates = [];

  for (const e of entries) {
    const wt = parseFloat(document.getElementById(`bsw-wt-${e.id}`)?.value);
    if (isNaN(wt)) continue;
    if (e.weight_record_id) {
      await db.from('weight_records').update({ weight_lbs: wt, date, weigh_time: weigh_time||null }).eq('id', e.weight_record_id);
    } else {
      const { data: wr } = await db.from('weight_records').insert({
        lamb_id: e.lamb_id, weight_lbs: wt, date, weigh_time: weigh_time||null, show_id: showId
      }).select().single();
      if (wr) {
        await db.from('show_entries').update({ weight_record_id: wr.id }).eq('id', e.id);
      }
    }
    updates.push(e.id);
  }

  toast(`${updates.length} weight${updates.length!==1?'s':''} saved`);
  closeModal();
  await openShowDetail(showId);
}

  if (!show) {
    const [{ data: s }, { data: e }] = await Promise.all([
      db.from('shows').select('*').eq('id', showId).single(),
      db.from('show_entries').select('*').eq('show_id', showId),
    ]);
    show = s; entries = e||[];

  if (!show) { toast('Show not found'); return; }

  const p = getFarmProfile();

async function printShowHealthPapers(showId) {
  let show = window._currentShow?.id === showId ? window._currentShow : null;
  let entries = window._currentShow?.id === showId ? (window._currentShowEntries||[]) : null;
  if (!show) {
    const [{ data: s }, { data: e }] = await Promise.all([
      db.from('shows').select('*').eq('id', showId).single(),
      db.from('show_entries').select('*').eq('show_id', showId),
    ]);
    show = s; entries = e || [];
  }
  if (!show) { toast('Show not found'); return; }

  const animals = entries.map(e => allLambs.find(l => l.id === e.lamb_id)).filter(Boolean);
  if (animals.length === 0) { toast('No animals in this show'); return; }

  const p = getFarmProfile();
  const fromName = p.type==='business' ? (p.bizname||p.name||'') : (p.name||'');
  const fromAddr = [p.street, [p.city,p.state,p.zip].filter(Boolean).join(' ')].filter(Boolean).join(', ');

  const travelRange = show.show_date ? (show.show_date + (show.end_date && show.end_date!==show.show_date ? ' — '+show.end_date : '')) : '—';

  function calcAge(dob) {
    if (!dob) return '—';
    const months = Math.floor((new Date()-new Date(dob))/(1000*60*60*24*30.44));
    return months < 24 ? months+' mo' : Math.floor(months/12)+'yr '+months%12+'mo';

  const animalRows = animals.map((l,i) => `

      <td style="padding:6px 8px;font-size:11px">${l.dob||'—'}</td>

  table{width:100%;border-collapse:collapse;margin-top:4px}thead tr{background:#222;color:#fff}

  @media print{body{padding:12px}}</style></head><body>

function clearWeightFilters() {
  ['wt-search','wt-flock','wt-sex','wt-breed','wt-from','wt-to','wt-show'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  renderWeightsTable();
}

function renderWeightsTable() {
  const q = document.getElementById('wt-search')?.value?.toLowerCase() || '';
  const flock = document.getElementById('wt-flock')?.value || '';
  const sex = document.getElementById('wt-sex')?.value || '';
  const breed = document.getElementById('wt-breed')?.value || '';
  const from = document.getElementById('wt-from')?.value || '';
  const to = document.getElementById('wt-to')?.value || '';
  const showFilter = document.getElementById('wt-show')?.value || '';

  const records = (window._weightRecords || []).filter(r => {
    const lamb = r.lambs;
    if (q && !((lamb?.name||'').toLowerCase().includes(q) || (lamb?.ear_tag||'').toLowerCase().includes(q) || (lamb?.alt_id||'').toLowerCase().includes(q))) return false;
    const ft = lamb?.flock_type || '';
    if (flock === 'Show' && !(ft==='Show'||ft==='Both')) return false;
    if (flock === 'Breeding' && !(ft==='Breeding'||ft==='Both')) return false;
    if (flock === 'Both' && ft !== 'Both') return false;
    if (sex && lamb?.sex !== sex) return false;
    if (breed && lamb?.breed !== breed) return false;
    if (from && r.date < from) return false;
    if (to && r.date > to) return false;
    if (showFilter && r.show_id !== showFilter) return false;
    return true;
  });

  // Summary stats
  const weights = records.map(r => r.weight_lbs).filter(Boolean);
  const avg = weights.length ? (weights.reduce((s,w) => s+w, 0) / weights.length).toFixed(1) : '—';
  const max = weights.length ? Math.max(...weights).toFixed(1) : '—';
  const min = weights.length ? Math.min(...weights).toFixed(1) : '—';

  const summaryEl = document.getElementById('wt-summary');
  if (summaryEl) summaryEl.innerHTML = `
    <div class="card" style="padding:0.65rem 1rem;flex:1;min-width:100px;text-align:center">
      <div style="font-size:1.4rem;font-weight:700;color:var(--accent)">${records.length}</div>
      <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase">Records</div>
    </div>
    <div class="card" style="padding:0.65rem 1rem;flex:1;min-width:100px;text-align:center">
      <div style="font-size:1.4rem;font-weight:700;color:var(--text)">${avg}</div>
      <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase">Avg (lbs)</div>
    </div>
    <div class="card" style="padding:0.65rem 1rem;flex:1;min-width:100px;text-align:center">
      <div style="font-size:1.4rem;font-weight:700;color:#15803d">${max}</div>
      <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase">Max (lbs)</div>
    </div>
    <div class="card" style="padding:0.65rem 1rem;flex:1;min-width:100px;text-align:center">
      <div style="font-size:1.4rem;font-weight:700;color:#1d4ed8">${min}</div>
      <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase">Min (lbs)</div>
    </div>`;

  // Check if filtered to single animal
  const uniqueAnimals = [...new Set(records.map(r => r.lamb_id))];
  const isSingle = uniqueAnimals.length === 1;
  const chartEl = document.getElementById('wt-chart-wrap');

  if (chartEl) {
    if (isSingle && records.length > 1) {
      const sorted = [...records].sort((a,b) => a.date > b.date ? 1 : -1);
      const lamb = sorted[0].lambs;
      const maxW = Math.max(...sorted.map(r => r.weight_lbs));
      const minW = Math.min(...sorted.map(r => r.weight_lbs));
      const padded_max = maxW + (maxW - minW) * 0.15 || maxW + 10;
      const padded_min = Math.max(0, minW - (maxW - minW) * 0.15);
      const chartW = 600; const chartH = 180; const padL = 48; const padR = 16; const padT = 12; const padB = 32;
      const innerW = chartW - padL - padR;
      const innerH = chartH - padT - padB;
      const pts = sorted.map((r, i) => {
        const x = padL + (sorted.length === 1 ? innerW/2 : (i / (sorted.length-1)) * innerW);
        const y = padT + innerH - ((r.weight_lbs - padded_min) / (padded_max - padded_min)) * innerH;
        return { x, y, r };
      });
      const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
      const area = `${padL},${padT+innerH} ` + polyline + ` ${pts[pts.length-1].x},${padT+innerH}`;
      const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="1.5">
        <title>${p.r.weight_lbs} lbs — ${p.r.date}</title></circle>`).join('');
      const labels = pts.filter((_, i) => i === 0 || i === pts.length-1 || sorted.length <= 8 || i % Math.ceil(sorted.length/6) === 0)
        .map(p => `<text x="${p.x}" y="${padT+innerH+14}" text-anchor="middle" font-size="9" fill="var(--text3)">${p.r.date?.slice(5)}</text>`).join('');
      // Y axis ticks
      const yTicks = [0, 0.25, 0.5, 0.75, 1].map(t => {
        const val = (padded_min + t*(padded_max-padded_min)).toFixed(0);
        const y = padT + innerH - t*innerH;
        return `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--text3)">${val}</text>
                <line x1="${padL}" y1="${y}" x2="${padL+innerW}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
      }).join('');

      chartEl.innerHTML = `<div class="card" style="padding:1rem;margin-bottom:0.5rem">
        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem">${lamb?.name||''} — Weight Over Time</div>
        <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;max-height:200px;overflow:visible">
          ${yTicks}
          <polyline points="${area}" fill="var(--accent)" fill-opacity="0.1" stroke="none"/>
          <polyline points="${polyline}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
          ${dots}
          ${labels}
        </svg>
      </div>`;
    } else {
      chartEl.innerHTML = '';
    }
  }
  const tableEl = document.getElementById('wt-table-wrap');
  if (!tableEl) return;

  if (records.length === 0) {
    tableEl.innerHTML = `<div class="empty"><div class="empty-icon">⚖️</div><h3>No records found</h3><p>Try adjusting the filters</p></div>`;
    return;
  }

  const rows = records.map(r => {
    const lamb = r.lambs;
    return `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="${lamb ? `showLamb('${r.lamb_id}')` : ''}" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
      <td style="padding:0.6rem 0.85rem;font-weight:600;color:var(--text)">${lamb?.name||'—'}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text2)">${lamb?.ear_tag?'#'+lamb.ear_tag:'—'}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text2)">${lamb?.sex||'—'}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text2)">${lamb?.breed||'—'}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text2)">${lamb?.flock_type||'—'}</td>
      <td style="padding:0.6rem 0.75rem;text-align:right;font-weight:700;color:var(--accent)">${r.weight_lbs ? r.weight_lbs+' lbs' : '—'}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text2)">${r.date||'—'}${r.weigh_time?'<br><span style="font-size:0.72rem;color:var(--text3)">'+fmtStepTime(r.weigh_time)+'</span>':''}</td>
      <td style="padding:0.6rem 0.75rem;color:var(--text3);font-size:0.8rem">${r.notes||''}</td>
    </tr>`;
  }).join('');

  tableEl.innerHTML = `<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:0.84rem">
      <thead><tr style="background:var(--surface2);border-bottom:2px solid var(--border)">
        <th style="padding:0.6rem 0.85rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Name</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Ear Tag</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Sex</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Breed</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Flock</th>
        <th style="padding:0.6rem 0.75rem;text-align:right;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Weight</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Date</th>
        <th style="padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)">Notes</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div></div>`;
}

function openAddWeightGlobal() {
  const lambOpts = allLambs.filter(l => l.status === 'Active').map(l =>
    `<option value="${l.id}">${l.name}${l.ear_tag?' #'+l.ear_tag:''}</option>`).join('');
  showModal(`

    <div class="field"><label>Animal *</label><select id="wg-lamb"><option value="">— Select —</option>${lambOpts}</select></div>

      <div class="field"><label>Time <span style="font-size:0.72rem;color:var(--text3)">(optional)</span></label><div style="display:flex;gap:0.35rem"><input type="text" id="wg-time" placeholder="HH:MM" onblur="fmtTimeInput(this)" style="flex:1"><select id="wg-ampm" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.35rem 0.5rem;font-size:0.82rem"><option>AM</option><option>PM</option></select></div></div>

async function saveWeightGlobal() {
  const lambId = document.getElementById('wg-lamb')?.value;
  const weight = parseFloat(document.getElementById('wg-weight')?.value);
  const date = document.getElementById('wg-date')?.value;
  const notes = document.getElementById('wg-notes')?.value?.trim() || null;
  if (!lambId) { toast('Select an animal'); return; }
  if (!weight || isNaN(weight)) { toast('Enter a weight'); return; }
  if (!date) { toast('Enter a date'); return; }
  const wgTime = combineTimeAmPm('wg-time','wg-ampm');
  await db.from('weight_records').insert({ lamb_id: lambId, weight_lbs: weight, date, weigh_time: wgTime||null, notes });
  toast('Weight logged!');
  closeModal();
  renderWeightsPage();
}

async function renderBreeding() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  const { data } = await db.from('breeding_records').select('*').order('breeding_date', {ascending:false});
  const allRecs = data || [];
  window._breedingAllRecs = allRecs;
  window._breedingFilters = window._breedingFilters || { females: [], sires: [], breedFrom: '', breedTo: '', dueFrom: '', dueTo: '', outcome: '' };
  renderBreedingTable(allRecs, window._breedingFilters);
}

function renderBreedingTable(allRecs, filters) {
  const outcomeColors = {
    'Confirmed Pregnant': { dot: '#16a34a', text: '#15803d', bg: '#dcfce7' },
    'Lamb Born':          { dot: '#2563eb', text: '#1d4ed8', bg: '#dbeafe' },
    'Not Pregnant':       { dot: '#dc2626', text: '#b91c1c', bg: '#fee2e2' },
    'Failed':             { dot: '#9ca3af', text: '#6b7280', bg: '#f3f4f6' },
    'Pending':            { dot: '#d97706', text: '#b45309', bg: '#fef3c7' },
  };

  // Apply filters
  const recs = allRecs.filter(r => {
    const lamb = allLambs.find(l => l.id === r.lamb_id);
    const sire = r.ai_sire_id ? allAiRams.find(x=>x.id===r.ai_sire_id) : (r.sire_id ? allLambs.find(l=>l.id===r.sire_id) : null);
    const sireName = (sire?.name || r.sire_text || '').toLowerCase();
    const lambName = ((lamb?.name||'') + ' ' + (lamb?.ear_tag||'')).toLowerCase();
    if (filters.females && filters.females.length > 0 && !filters.females.some(f => lambName.includes(f.toLowerCase()))) return false;
    if (filters.sires && filters.sires.length > 0 && !filters.sires.some(s => sireName.includes(s.toLowerCase()))) return false;
    if (filters.breedFrom && r.breeding_date && r.breeding_date < filters.breedFrom) return false;
    if (filters.breedTo && r.breeding_date && r.breeding_date > filters.breedTo) return false;
    if (filters.dueFrom && r.expected_lamb_date && r.expected_lamb_date < filters.dueFrom) return false;
    if (filters.dueTo && r.expected_lamb_date && r.expected_lamb_date > filters.dueTo) return false;
    if (filters.outcome && (r.outcome||'Pending') !== filters.outcome) return false;
    return true;
  });

  // Summary stats from filtered records
  const decided = recs.filter(r => r.outcome && r.outcome !== 'Pending');
  const pregnant = recs.filter(r => r.outcome === 'Confirmed Pregnant' || r.outcome === 'Lamb Born');
  const conceptionRate = decided.length ? Math.round(pregnant.length/decided.length*100) : 0;
  const pending = recs.filter(r => !r.outcome || r.outcome === 'Pending').length;
  const outcomes = ['Confirmed Pregnant','Lamb Born','Not Pregnant','Failed','Pending'];
  const today = new Date().toISOString().slice(0,10);

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem">
