async function confirmCompletePlanDom(groupId) {
  const isFlush = window._cpIsFlush;
  const tbody = document.getElementById('cp-tbody');
  if (!tbody) return;

  const rows = Array.from(tbody.querySelectorAll('tr'));
  const flushInserts = [];
  const breedInserts = [];
  const transferInserts = [];

  // First pass: collect donor rows and their indices for lookup
  const donorRowIds = [];
  for (const row of rows) {
    if ((row.dataset.type||'donor') === 'donor') donorRowIds.push(row.id.replace('cp-row-',''));
  }

  for (const row of rows) {
    const rowId = row.id.replace('cp-row-','');
    const include = document.getElementById(`cp-include-${rowId}`)?.checked;
    if (!include) continue;
    const rowType = row.dataset.type || 'donor';

    if (rowType === 'recip') {
      const lambId = document.getElementById(`cp-lamb-id-${rowId}`)?.value ||
                     document.getElementById(`cp-lamb-${rowId}`)?.value || null;
      const recipText = document.getElementById(`cp-lamb-name-${rowId}`)?.value?.trim() || null;
      if (!lambId && !recipText) continue;
      const transferDate = document.getElementById(`cp-transfer-date-${rowId}`)?.value || window._cpTargetDate;
      const numEmbryos = parseInt(document.getElementById(`cp-embryos-${rowId}`)?.value) || 1;
      const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
      // Store donor index — will resolve to flush ID after flush creation
      transferInserts.push({ recipient_id: lambId||null, recip_text: recipText||null, implant_date: transferDate, outcome: 'Pending', num_transferred: numEmbryos, _donorIdx: donorIdx !== '' ? parseInt(donorIdx) : null });
    } else {
      const lambId = document.getElementById(`cp-lamb-id-${rowId}`)?.value ||
                     document.getElementById(`cp-lamb-${rowId}`)?.value;
      if (!lambId) continue;
      const sireVal = document.getElementById(`cp-sire-${rowId}`)?.value || '';
      const { sire_id, ai_sire_id } = parseSireSelection(sireVal);
      const date = document.getElementById(`cp-date-${rowId}`)?.value;
      if (isFlush) {
        flushInserts.push({ donor_id: lambId, ai_sire_id: ai_sire_id||null, sire_id: sire_id||null,
          flush_date: date, flush_type: document.getElementById(`cp-type-${rowId}`)?.value||'MOET',
          embryos_collected: parseInt(document.getElementById(`cp-collected-${rowId}`)?.value)||0,
          embryos_transferred: parseInt(document.getElementById(`cp-transferred-${rowId}`)?.value)||null,
          _frozen: parseInt(document.getElementById(`cp-frozen-${rowId}`)?.value)||0 });
      } else {
        const dueDate = document.getElementById(`cp-due-${rowId}`)?.value;
        breedInserts.push({ lamb_id: lambId, ai_sire_id: ai_sire_id||null, sire_id: sire_id||null,
          breeding_date: date, expected_lamb_date: dueDate||null, outcome: 'Pending' });
      }
    }
  }

  // Check for over-assignment
  const tbody2 = document.getElementById('cp-tbody');
  const donorRows2 = Array.from((tbody2||document).querySelectorAll('tr[data-type="donor"]'));
  const collectedMap = {};
  donorRows2.forEach((row, di) => {
    const rid = row.id.replace('cp-row-','');
    collectedMap[di] = parseInt(document.getElementById('cp-collected-'+rid)?.value)||0;
  });
  const assignedMap = {};
  Array.from((tbody2||document).querySelectorAll('tr[data-type="recip"]')).forEach(row => {
    const rid = row.id.replace('cp-row-','');
    const di = document.getElementById('cp-donor-'+rid)?.value;
    const emb = parseInt(document.getElementById('cp-embryos-'+rid)?.value)||0;
    if (di!==''&&di!==undefined) assignedMap[parseInt(di)] = (assignedMap[parseInt(di)]||0) + emb;
  });
  const overAssigned = Object.keys(collectedMap).some(di => collectedMap[di]>0 && (assignedMap[di]||0) > collectedMap[di]);
  if (overAssigned) { toast('⚠️ Some donors have more embryos assigned to recips than were collected — please fix before saving'); return; }

  if (flushInserts.length === 0 && breedInserts.length === 0) { toast('No records to create'); return; }

  // Insert flush records and capture IDs for transfer linking
  let totalCreated = 0;
  const createdFlushIds = []; // index matches flushInserts order

  if (flushInserts.length > 0) {
    for (const flush of flushInserts) {
      const { data: f } = await db.from('embryo_flushes').insert(flush).select().single();
      createdFlushIds.push(f?.id || null);
      totalCreated++;
      // Create embryo inventory record if frozen > 0
      if (f?.id && flush._frozen > 0) {
        await db.from('embryo_inventory').insert({
          flush_id: f.id,
          donor_id: flush.donor_id,
          ai_sire_id: flush.ai_sire_id||null,
          sire_id: flush.sire_id||null,
          quantity: flush._frozen,
          date_frozen: flush.flush_date,
        });
      }
    }
    // Create transfers linked to correct donor flush
    for (const t of transferInserts) {
      const flushId = t._donorIdx !== null && createdFlushIds[t._donorIdx] ? createdFlushIds[t._donorIdx] : (createdFlushIds[0]||null);
      const donorId = flushId ? flushInserts[t._donorIdx ?? 0]?.donor_id : null;
      const { _donorIdx, recip_text, ...rest } = t;
      await db.from('embryo_transfers').insert({ ...rest, flush_id: flushId, donor_id: donorId, recip_text: recip_text||null });
      totalCreated++;
    }
  }
  if (breedInserts.length > 0) {
    await Promise.all(breedInserts.map(b => db.from('breeding_records').insert(b)));
    totalCreated += breedInserts.length;
  }

  await db.from('breeding_groups').update({ status: 'Complete' }).eq('id', groupId);
  window._planGroups = (window._planGroups||[]).map(g => g.id === groupId ? {...g, status:'Complete'} : g);

  toast(`${totalCreated} record${totalCreated!==1?'s':''} created! <a href="#" onclick="showPage('${isFlush?'flushes':'breeding'}')" style="color:#fff;text-decoration:underline">View ${isFlush?'Flushes':'Breeding'} →</a>`);
  closeModal();
  renderPlanningHTML();
}

async function openEditGroupPage(id) {

  const statuses = ['Planned','Active','Complete','Cancelled'];

  function buildPreview(targetDate, protocolId, isRecip) {
    if (!targetDate || !protocolId) return '';
    const protSteps = (window._planSteps||[]).filter(s => s.protocol_id === protocolId).sort((a,b) => b.day_offset - a.day_offset);
    if (protSteps.length === 0) return '';
    const rows = protSteps.map(s => {
      const stepDate = new Date(new Date(targetDate + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10);
      const isTarget = s.day_offset === 0;
      return `<div style="display:flex;justify-content:space-between;padding:0.2rem 0.5rem;border-radius:0.25rem;background:${isTarget?'var(--accent-glow)':'transparent'}">

  }

  const recipProtOpts = `<option value="">— None —</option>` + (protocols||[]).map(p => `<option value="${p.id}" ${g.recip_protocol_id===p.id?'selected':''}>${p.name}</option>`).join('');

      <div class="field"><label>Type</label><select id="eg-type"><option value="flush" ${g.type==='flush'?'selected':''}>🔬 Flush</option><option value="breeding" ${g.type==='breeding'?'selected':''}>🐏 Breeding</option></select></div>

      <div class="field"><label>Status</label><select id="eg-status">${statuses.map(s=>`<option value="${s}" ${g.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>

    ${g.type==='flush'?`<div class="field"><label>Recip Protocol</label><select id="eg-recip-protocol" onchange="previewEditGroupSchedule()">${recipProtOpts}</select></div>`:''}
    <div id="eg-schedule-preview">${buildPreview(g.target_date, g.protocol_id) + (g.type==='flush'&&g.recip_protocol_id ? buildPreview(g.target_date, g.recip_protocol_id, true) : '')}</div>
    <div class="field"><label>Notes</label><textarea id="eg-notes" rows="2">${g.notes||''}</textarea></div>

  stepRows.forEach((row, i) => {

function buildScheduleRows(steps, targetDate, label, color) {
  if (!steps || steps.length === 0) return '';
  const sorted = steps.slice().sort((a,b) => b.day_offset - a.day_offset);
  const rows = sorted.map(s => {
    const stepDate = new Date(new Date(targetDate + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10);
    const isTarget = s.day_offset === 0;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.2rem 0.5rem;border-radius:0.25rem;background:${isTarget?'var(--accent-glow)':'transparent'}">
      <div style="font-size:0.78rem;color:var(--text);font-weight:${isTarget?700:400}">${s.step_name} <span style="color:var(--text3);font-size:0.7rem">${s.step_time ? fmtStepTime(s.step_time) : (s.time_of_day||'AM')}</span></div>
      <div style="font-size:0.78rem;font-weight:600;color:${isTarget?'var(--accent)':'var(--text2)'}">${stepDate}</div>
    </div>`;
  }).join('');
  return `<div style="background:${color||'var(--surface2)'};border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem;margin-bottom:0.35rem">
    <div style="font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.3rem">${label}</div>
    ${rows}
  </div>`;
}

    <div id="gm-panel-donors" style="${activeTab!=='donors'?'display:none':''}">
      <div style="max-height:180px;overflow-y:auto;margin-bottom:0.75rem">${donorRows}</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem">
        <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5rem">Add Donor</div>
        <div class="field" style="margin-bottom:0.4rem"><label>Female</label>
          <select id="gm-lamb"><option value="">— Select ewe —</option>${allEweOpts}</select>
        </div>
        <div class="field" style="margin-bottom:0.4rem"><label>Sire</label><select id="gm-sire">${sireOpts}</select></div>
        <div class="field" style="margin-bottom:0.5rem"><label>Sire (if not in system)</label><input id="gm-sire-text" placeholder="Sire name"></div>
        <button class="btn btn-primary btn-sm" style="width:100%" onclick="addGroupMember('${groupId}','donor')">+ Add Donor</button>
      </div>
    </div>

    <!-- RECIPS -->
    ${isFlush?`<div id="gm-panel-recips" style="${activeTab!=='recips'?'display:none':''}">
      <div style="max-height:180px;overflow-y:auto;margin-bottom:0.75rem">${recipRows}</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem">
        <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5rem">Add Recipient</div>
        <div class="field" style="margin-bottom:0.4rem"><label>Recipient (system lamb)</label>
          <select id="gm-recip-lamb"><option value="">— Select or use name below —</option>${allEweOpts}</select>
        </div>
        <div class="field" style="margin-bottom:0.5rem"><label>External Recipient Name</label>
          <input id="gm-recip-text" placeholder="e.g. Schoenfeld 2024"></div>
        <button class="btn btn-primary btn-sm" style="width:100%" onclick="addGroupMember('${groupId}','recip')">+ Add Recipient</button>
      </div>
    </div>`:''}

    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal();if(currentPage==='planning')renderPlanning();else openPlanningManager()">Back</button></div>`);
}

function switchGmTab(tab) {
  document.getElementById('gm-panel-donors').style.display = tab==='donors'?'':'none';
  const recipPanel = document.getElementById('gm-panel-recips');
  if (recipPanel) recipPanel.style.display = tab==='recips'?'':'none';
  document.getElementById('gm-tab-donors')?.classList.toggle('active', tab==='donors');
  document.getElementById('gm-tab-recips')?.classList.toggle('active', tab==='recips');
}

async function addGroupMember(groupId, role) {
  role = role || 'donor';
  if (role === 'recip') {
    const lambId = document.getElementById('gm-recip-lamb')?.value || null;
    const recipText = document.getElementById('gm-recip-text')?.value?.trim() || null;
    if (!lambId && !recipText) { toast('Select a recipient or enter a name'); return; }
    await db.from('breeding_group_members').insert({ group_id: groupId, lamb_id: lambId||null, recip_text: recipText||null, role: 'recip' });
    toast('Recipient added');
  } else {
    const lambId = document.getElementById('gm-lamb')?.value;
    if (!lambId) { toast('Select a female'); return; }
    const { sire_id, ai_sire_id } = parseSireSelection(document.getElementById('gm-sire')?.value || '');
    const sireText = document.getElementById('gm-sire-text')?.value?.trim() || null;
    await db.from('breeding_group_members').insert({ group_id: groupId, lamb_id: lambId, ai_sire_id: ai_sire_id||null, sire_text: sireText, role: 'donor' });
    toast('Donor added');
  }
  if (currentPage === 'planning') { await renderPlanning(); openManageGroupMembers(groupId, role==='recip'?'recips':'donors'); }
  else openManageGroupMembers(groupId, role==='recip'?'recips':'donors');
}

async function removeGroupMember(memberId, groupId, activeTab) {
  await db.from('breeding_group_members').delete().eq('id', memberId);
  toast('Removed');
  if (currentPage === 'planning') { await renderPlanning(); openManageGroupMembers(groupId, activeTab||'donors'); }
  else openManageGroupMembers(groupId, activeTab||'donors');
}

async function showPlanGroupDetail(groupId) {
  const [{ data: g }, { data: members }, { data: steps }] = await Promise.all([
    db.from('breeding_groups').select('*').eq('id', groupId).single(),
    db.from('breeding_group_members').select('*').eq('group_id', groupId),
    db.from('protocol_steps').select('*'),
  ]);
  if (!g) return;
  const groupSteps = g.protocol_id ? (steps||[]).filter(s => s.protocol_id === g.protocol_id).sort((a,b) => a.day_offset - b.day_offset) : [];
  const stepRows = groupSteps.map(s => {
    const stepDate = g.target_date ? new Date(new Date(g.target_date + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10) : null;
    return `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border)">
      <div style="font-size:0.85rem;color:var(--text)">${s.step_name} <span style="color:var(--text3);font-size:0.78rem">${s.day_offset===0?'Target Day':s.day_offset+' days before'} · ${s.time_of_day||'AM'}</span></div>
      <div style="font-size:0.82rem;font-weight:600;color:var(--accent)">${stepDate||'—'}</div>
    </div>`;
  }).join('');
  const memberRows = (members||[]).map(m => {
    const lamb = allLambs.find(l => l.id === m.lamb_id);
    const sire = m.ai_sire_id ? allAiRams.find(r => r.id === m.ai_sire_id) : null;
    return `<div style="font-size:0.85rem;padding:0.3rem 0;border-bottom:1px solid var(--border)">
      <span style="font-weight:600;color:var(--text)">${lamb?.name||'Unknown'}</span> <span style="color:var(--text3)">× ${sire?sire.name+' 🧬':(m.sire_text||'—')}</span>
    </div>`;
  }).join('') || `<div style="color:var(--text3);font-size:0.82rem">No members</div>`;
  showModal(`
    <div class="modal-header"><div class="modal-title">📋 ${g.name}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
      <span class="badge ${g.type==='flush'?'badge-purple':'badge-green'}">${g.type==='flush'?'🔬 Flush':'🐏 Breeding'}</span>
      <span class="badge badge-gray">${g.status}</span>
      ${g.target_date?`<span class="badge badge-blue">Target: ${g.target_date}</span>`:''}
    </div>
    ${stepRows ? `<div style="font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.35rem">Protocol Steps</div>${stepRows}<div style="margin-bottom:0.75rem"></div>` : ''}
    <div style="font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.35rem">Members (${members?.length||0})</div>
    ${memberRows}
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="closeModal();openManageGroupMembers('${groupId}')">Manage Members</button>
    </div>`);
}

// ── CALENDAR ──────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calFilter = 'all';    // 'all' | 'breeding' | 'lambing' | 'treatment'
let calLambFilter = '';   // '' = whole flock, or lamb id
let calEvents = [];

async function renderCalendar() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  await loadCalendarEvents();
  drawCalendar();
}

async function loadCalendarEvents() {
  calEvents = [];

  // Breeding dates & expected lamb dates
  const { data: breeding } = await db.from('breeding_records').select('*');
  (breeding||[]).forEach(r => {
    if (r.breeding_date) calEvents.push({ date: r.breeding_date, type: 'breeding', label: `🐏 Bred`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
    if (r.expected_lamb_date) calEvents.push({ date: r.expected_lamb_date, type: 'lambing', label: `📅 Due`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
    if (r.actual_lamb_date) calEvents.push({ date: r.actual_lamb_date, type: 'lambing', label: `🐑 Lambed`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
  });

  // Health records (treatments)
  const { data: health } = await db.from('health_records').select('*');
  (health||[]).forEach(r => {
    calEvents.push({ date: r.date, type: 'treatment', label: r.type === 'vaccine' ? `💉 ${r.product}` : `💊 ${r.product}`, lamb_id: r.lamb_id });
  });

  // Embryo flushes
  const { data: flushes } = await db.from('embryo_flushes').select('*');
  (flushes||[]).forEach(f => {
    if (f.flush_date) {
      const sire = f.sire_id ? allLambs.find(l=>l.id===f.sire_id) : (f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : null);
      const sireName = sire ? sire.name+(f.ai_sire_id?' 🧬':'') : (f.sire_text||'');
      calEvents.push({ date: f.flush_date, type: 'embryo', label: `🔬 Flush`, lamb_id: f.donor_id, sire_text: sireName, extra: `${f.embryos_collected||0} embryos` });
    }
  });

  // Embryo transfers
  const { data: transfers } = await db.from('embryo_transfers').select('*');
  (transfers||[]).forEach(t => {
    if (t.implant_date) {
      calEvents.push({ date: t.implant_date, type: 'embryo', label: `🐑 Transfer`, lamb_id: t.recipient_id||t.donor_id, extra: t.outcome||'Pending' });
    }
  });

  // Planned breeding/flush group protocol steps
  const { data: groups } = await db.from('breeding_groups').select('*');
  const { data: steps } = await db.from('protocol_steps').select('*');
  const { data: members } = await db.from('breeding_group_members').select('*');
  (groups||[]).filter(g => g.target_date && g.status !== 'Cancelled').forEach(g => {
    const donorSteps = (steps||[]).filter(s => s.protocol_id === g.protocol_id);
    const recipSteps = g.recip_protocol_id ? (steps||[]).filter(s => s.protocol_id === g.recip_protocol_id) : [];
    const allSteps = [
      ...donorSteps.map(s => ({...s, _isRecip: false})),
      ...recipSteps.map(s => ({...s, _isRecip: true})),
    ];
    const donorMembers = (members||[]).filter(m => m.group_id === g.id && (m.role||'donor') === 'donor');
    const recipMembers = (members||[]).filter(m => m.group_id === g.id && m.role === 'recip');
    const donorNames = donorMembers.map(m => allLambs.find(l => l.id === m.lamb_id)?.name || '?').join(', ');
    const recipNames = recipMembers.map(m => {
      const lamb = m.lamb_id ? allLambs.find(l => l.id === m.lamb_id) : null;
      return lamb?.name || m.recip_text || '?';
    }).join(', ');

    if (allSteps.length > 0) {
      allSteps.forEach(step => {
        const stepDate = new Date(new Date(g.target_date + 'T12:00:00').getTime() - step.day_offset*24*60*60*1000).toISOString().slice(0,10);
        const roleLabel = step._isRecip ? 'Recip' : 'Donor';
        const memberList = step._isRecip ? (recipNames||donorNames) : donorNames;
        const timeLabel = step.time_of_day && step.time_of_day !== 'AM' ? ' ' + step.time_of_day : '';
        calEvents.push({ date: stepDate, type: 'planned', label: `📋 ${roleLabel}: ${step.step_name}${timeLabel}`, group_id: g.id, group_name: g.name, extra: memberList, group_type: g.type, isRecip: step._isRecip });
      });
    } else {
      calEvents.push({ date: g.target_date, type: 'planned', label: `📋 ${g.name}`, group_id: g.id, group_name: g.name, extra: donorNames, group_type: g.type });
    }
  });
}

function jumpToMostRecentEvent() {
  const today = new Date().toISOString().slice(0, 10);
  const relevant = calEvents.filter(e => {
    if (!e.date) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  });
  if (relevant.length === 0) return;

  // Prefer the closest upcoming date, otherwise the most recent past date
  const upcoming = relevant.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  const past = relevant.filter(e => e.date < today).sort((a,b) => b.date.localeCompare(a.date));
  const best = upcoming.length > 0 ? upcoming[0] : past[0];

  const [y, m] = best.date.split('-');
  calYear = parseInt(y);
  calMonth = parseInt(m) - 1;
}

function drawCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);

  // Filter events
  let filtered = calEvents.filter(e => {
    if (!e.date) return false;
    const [y, m] = e.date.split('-');
    if (parseInt(y) !== calYear || parseInt(m) !== calMonth + 1) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  });

  // Group by date
  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  const lambOptions = allLambs.map(l => `<option value="${l.id}" ${calLambFilter===l.id?'selected':''}>${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}</option>`).join('');

  const filterBtns = [
    { key: 'all', label: 'All' },
    { key: 'breeding', label: '🐏 Breeding' },
    { key: 'lambing', label: '🐑 Lambing' },
    { key: 'treatment', label: '💉 Treatments' },
    { key: 'embryo', label: '🔬 Embryo' },
    { key: 'planned', label: '📋 Planned' },
  ].map(f => `<button class="filter-btn ${calFilter===f.key?'active':''}" onclick="calFilter='${f.key}';jumpToMostRecentEvent();drawCalendar()">${f.label}</button>`).join('');

  let html = `
    <div style="margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem;flex-wrap:wrap;gap:0.5rem">
        <div style="display:flex;align-items:center;gap:0.75rem">
          <button class="btn btn-secondary btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}drawCalendar()">‹</button>
          <span style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);min-width:160px;text-align:center">${monthNames[calMonth]} ${calYear}</span>
          <button class="btn btn-secondary btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}drawCalendar()">›</button>
          <button class="btn btn-secondary btn-sm" onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();drawCalendar()">Today</button>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <select style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.45rem 0.75rem;font-size:0.85rem" onchange="calLambFilter=this.value;drawCalendar()">
            <option value="">Whole Flock</option>
            ${lambOptions}
          </select>
        </div>
      </div>
      <div class="search-bar" style="margin-bottom:0.85rem">${filterBtns}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div style="text-align:center;font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:0.3rem 0">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px" id="cal-grid">`;

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div style="min-height:80px;background:var(--bg);border-radius:0.35rem;opacity:0.3"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const dayEvents = byDate[dateStr] || [];

    // Deduplicate treatments on same day — show count instead
    const treatments = dayEvents.filter(e => e.type === 'treatment');
    const nonTreatments = dayEvents.filter(e => e.type !== 'treatment');
    const uniqueTreatmentProducts = [...new Set(treatments.map(e => e.label))];

    html += `<div style="min-height:80px;background:var(--surface);border-radius:0.35rem;padding:0.3rem;border:1.5px solid ${isToday?'var(--accent)':'var(--border)'};position:relative;overflow:hidden">
      <div style="font-size:0.8rem;font-weight:${isToday?700:400};color:${isToday?'var(--accent)':'var(--text2)'};margin-bottom:0.2rem">${day}</div>
      ${nonTreatments.map(e => {
        const lamb = allLambs.find(l => l.id === e.lamb_id);
        const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
        const sireName = sire ? sire.name : (e.sire_text||'');
        const color = e.type==='breeding'?'#3a5a20':e.type==='lambing'?'#103a60':e.type==='embryo'?'#2a1a50':e.type==='planned'?(e.isRecip?'#1a2a5a':'#0a3a5a'):'#3a3010';
        const textColor = e.type==='breeding'?'#a8d88a':e.type==='lambing'?'#80b0f0':e.type==='embryo'?'#c090f0':e.type==='planned'?(e.isRecip?'#a0c0ff':'#60c8f8'):'#e8c040';
        return `<div onclick="${e.group_id ? `showPlanGroupDetail('${e.group_id}')` : `showCalEventDetail('${dateStr}')`}" style="font-size:0.68rem;background:${color};color:${textColor};border-radius:0.2rem;padding:0.1rem 0.3rem;margin-bottom:0.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${e.label}${e.group_name?' — '+e.group_name:''}${e.extra?' ('+e.extra+')':''}">
          ${e.label}${e.group_name?` <span style="opacity:0.8">${e.group_name}</span>`:(lamb?` <span style="opacity:0.8">${lamb.name}</span>`:'')}
        </div>`;
      }).join('')}
      ${uniqueTreatmentProducts.map(prod => {
        const count = treatments.filter(e=>e.label===prod).length;
        return `<div onclick="showCalEventDetail('${dateStr}')" style="font-size:0.68rem;background:#3a3010;color:#e8c040;border-radius:0.2rem;padding:0.1rem 0.3rem;margin-bottom:0.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${prod}">
          ${prod}${count>1?` <span style="opacity:0.7">(${count})</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  html += `</div>`;

  // Upcoming events list below calendar
  const upcoming = calEvents.filter(e => {
    if (!e.date || e.date < today) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 10);

  if (upcoming.length > 0) {
    html += `<div style="margin-top:1.5rem">
      <div class="section-title" style="margin-bottom:0.75rem">Upcoming Events</div>`;
    upcoming.forEach(e => {
      const lamb = allLambs.find(l => l.id === e.lamb_id);
      const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
      const sireName = sire ? sire.name+(e.ai_sire_id?' 🧬':'') : (e.sire_text||'');
      const typeBadge = e.type==='breeding'?'badge-green':e.type==='lambing'?'badge-blue':e.type==='embryo'?'badge-purple':e.type==='planned'?'badge-blue':'badge-yellow';
      html += `<div class="record-row" style="cursor:pointer" onclick="${e.group_id ? `showPlanGroupDetail('${e.group_id}')` : (lamb?`showLamb('${lamb.id}')`:``)}">
        <div style="display:flex;gap:0.75rem;align-items:center;flex:1">
          <div style="text-align:center;min-width:40px">
            <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent);font-weight:700">${parseInt(e.date.split('-')[2])}</div>
            <div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase">${monthNames[parseInt(e.date.split('-')[1])-1].slice(0,3)}</div>
          </div>
          <div>
            <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
              <span style="font-weight:600;color:var(--text)">${e.label}</span>
              <span class="badge ${typeBadge}" style="font-size:0.65rem">${e.type}</span>
            </div>
            <div style="font-size:0.78rem;color:var(--text3);margin-top:0.15rem">
              ${lamb?lamb.name:''}${sireName?' × '+sireName:''}
            </div>
          </div>
        </div>
        ${lamb?`<span style="color:var(--text3);font-size:0.8rem">→</span>`:''}
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('main-content').innerHTML = html;

  // Restore lamb filter select value
  const sel = document.querySelector('#main-content select');
  if (sel) sel.value = calLambFilter;
}

function showCalEventDetail(dateStr) {
  const dayEvents = calEvents.filter(e => e.date === dateStr && (calFilter==='all'||e.type===calFilter) && (!calLambFilter||e.lamb_id===calLambFilter));
  if (dayEvents.length === 0) return;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,m,d] = dateStr.split('-');
  let html = `
    <div class="modal-header">
      <div class="modal-title">${parseInt(d)} ${monthNames[parseInt(m)-1]} ${y}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>`;
  dayEvents.forEach(e => {
    const lamb = allLambs.find(l => l.id === e.lamb_id);
    const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
    const sireName = sire ? sire.name+(e.ai_sire_id?' 🧬':'') : (e.sire_text||'');
    const typeBadge = e.type==='breeding'?'badge-green':e.type==='lambing'?'badge-blue':e.type==='embryo'?'badge-purple':'badge-yellow';
    html += `<div class="record-row" style="${lamb?'cursor:pointer':''}" onclick="${lamb?`closeModal();showLamb('${lamb.id}')`:``}">
      <div style="flex:1">
        <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
          <span style="font-weight:600;color:var(--text)">${e.label}</span>
          <span class="badge ${typeBadge}" style="font-size:0.65rem">${e.type}</span>
        </div>
        <div style="font-size:0.82rem;color:var(--text3);margin-top:0.2rem">
          ${lamb?`<span style="color:var(--text2)">${lamb.name}</span>${lamb.ear_tag?' #'+lamb.ear_tag:''}`:''} ${sireName?'× '+sireName:''} ${e.extra?`<span style="color:var(--text3)">· ${e.extra}</span>`:''}
        </div>
      </div>
      ${lamb?`<span style="color:var(--text3)">→</span>`:''}
    </div>`;
  });
  showModal(html);
}

function calcExpectedLamb() {
  const dateVal = document.getElementById('br-date')?.value;
  if (!dateVal) return;
  const d = new Date(dateVal);
  d.setDate(d.getDate() + 147);
  const el = document.getElementById('br-expected');
  if (el) el.value = d.toISOString().slice(0, 10);
}
</script>
