<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flock Health Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --surface3: #2a2e42;
    --border: #2e3248;
    --border2: #3d4260;
    --text: #e8eaf2;
    --text2: #9198b8;
    --text3: #5a6080;
    --accent: #6c8ef5;
    --accent2: #4f6fe8;
    --accent-glow: rgba(108,142,245,0.15);
    --green: #4ade80;
    --green-bg: #0d2318;
    --warn: #f59e0b;
    --danger: #f87171;
    --danger-bg: #2d1515;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --radius: 0.75rem;
    --radius-sm: 0.45rem;
    --radius-lg: 1rem;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; }
  h1,h2,h3,h4 { font-family: 'Inter', sans-serif; font-weight: 600; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; background: radial-gradient(ellipse at 50% 30%, #1a1f35 0%, #0f1117 70%); }
  .login-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 1.25rem; padding: 2.5rem; width: 100%; max-width: 360px; text-align: center; box-shadow: var(--shadow); }
  .login-box h1 { font-size: 1.6rem; color: var(--text); margin-bottom: 0.25rem; font-weight: 700; }
  .login-box p { color: var(--text3); font-size: 0.78rem; margin-bottom: 2rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .login-error { background: var(--danger-bg); color: var(--danger); border-radius: var(--radius-sm); padding: 0.6rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
  .login-logo { width: 52px; height: 52px; background: var(--accent-glow); border: 1px solid var(--border2); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.6rem; }

  /* LAYOUT */
  #app { display: none; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-logo { width: 32px; height: 32px; background: var(--accent-glow); border: 1px solid var(--border2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .header-title { font-size: 0.95rem; color: var(--text); font-weight: 600; }
  .header-sub { font-size: 0.68rem; color: var(--text3); }
  nav { display: flex; gap: 0.15rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.2rem; }
  .nav-btn { background: none; border: none; color: var(--text3); padding: 0.35rem 0.65rem; border-radius: 0.35rem; cursor: pointer; font-size: 0.75rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .nav-btn.active { background: var(--surface2); color: var(--accent); }
  .nav-btn:hover:not(.active) { color: var(--text2); background: var(--surface2); }
  main { flex: 1; padding: 1.5rem; max-width: 1000px; margin: 0 auto; width: 100%; }

  /* FORMS */
  .field { margin-bottom: 0.9rem; }
  .field label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.3rem; }
  input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 0.75rem; }
  .row .field { flex: 1; min-width: 0; }

  /* BUTTONS */
  .btn { border: none; border-radius: var(--radius-sm); padding: 0.5rem 1rem; font-size: 0.83rem; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.35rem; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #5a2020; }
  .btn-danger:hover { background: #3d1a1a; }
  .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.75rem; }
  .btn-icon { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); padding: 0.3rem 0.55rem; font-size: 0.75rem; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; }
  .btn-icon:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .card-hover { cursor: pointer; transition: all 0.15s; }
  .card-hover:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-sm); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 1rem; color: var(--text); font-weight: 600; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-green { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
  .badge-yellow { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
  .badge-red { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
  .badge-blue { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.25); }
  .badge-purple { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
  .badge-gray { background: rgba(148,163,184,0.1); color: var(--text2); border: 1px solid var(--border); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; }
  .tab { background: none; border: none; color: var(--text3); padding: 0.6rem 0.9rem; font-size: 0.8rem; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* FLOCK GRID */
  .flock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.85rem; }

  /* SEARCH BAR */
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-bar input { flex: 1; min-width: 160px; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 0.35rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.75rem; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .filter-btn.active { background: var(--accent-glow); border-color: var(--accent2); color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

  /* RECORD ROWS */
  .record-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.5rem; transition: border-color 0.15s; }
  .record-row:hover { border-color: var(--border2); }
  .record-row:last-child { margin-bottom: 0; }
  .record-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
  .confirm-inline { display: flex; align-items: center; gap: 0.35rem; }
  .confirm-inline span { font-size: 0.73rem; color: var(--danger); }

  /* PEDIGREE */
  .pedigree-tree { overflow-x: auto; padding-bottom: 1rem; }
  .ped-node { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 0.75rem; font-size: 0.8rem; min-width: 130px; }
  .ped-node.linked { cursor: pointer; border-color: var(--border2); }
  .ped-node.linked:hover { border-color: var(--accent); }
  .ped-node-name { font-weight: 600; color: var(--text); }
  .ped-node-sub { font-size: 0.68rem; color: var(--text3); margin-top: 0.1rem; }
  .ped-row { display: flex; gap: 1.5rem; align-items: flex-start; }
  .ped-col { display: flex; flex-direction: column; gap: 0.5rem; }

  /* WEIGHT CHART */
  .weight-chart { background: var(--bg); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); }
  canvas { width: 100% !important; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
  .empty h3 { font-size: 1rem; color: var(--text2); margin-bottom: 0.3rem; font-weight: 600; }
  .empty p { font-size: 0.83rem; }

  /* LOADING */
  .loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.85rem; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION HEADER */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .section-title { font-size: 0.85rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  /* PROFILE HEADER */
  .profile-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
  .profile-name { font-size: 1.5rem; color: var(--text); font-weight: 700; }
  .profile-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; align-items: center; }

  /* OPTGROUP */
  optgroup { color: var(--text3); font-style: normal; font-size: 0.72rem; }
  option { color: var(--text); background: var(--bg); }

  /* SIDEBAR NAV BUTTONS */
  .sidebar-btn { background: none; border: none; color: var(--text3); padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.82rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 0.6rem; width: 100%; text-align: left; }
  .sidebar-btn span:first-child { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  .sidebar-btn.active { background: var(--accent-glow); color: var(--accent); }
  .sidebar-btn:hover:not(.active) { background: var(--surface2); color: var(--text2); }

  @media (max-width: 700px) {
    #sidebar { display: none !important; }
    .mobile-nav { display: flex !important; }
    #main-content { margin-left: 0 !important; padding-bottom: 5rem; }
    div[style*="margin-left:220px"] { margin-left: 0 !important; }
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* TOAST */
  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 0.6rem 1.2rem; border-radius: var(--radius); font-size: 0.83rem; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow); }
  #toast.show { opacity: 1; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }

  @media (max-width: 600px) {
    main { padding: 0.75rem; }
    .flock-grid { grid-template-columns: 1fr 1fr; }
    nav { display: none; }
    .mobile-nav { display: flex !important; }
    header { flex-wrap: wrap; gap: 0.5rem; }
  }
  .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 0.4rem 0.5rem; z-index: 50; gap: 0; backdrop-filter: blur(12px); }
  .mobile-nav-btn { flex: 1; background: none; border: none; color: var(--text3); padding: 0.45rem 0.25rem; font-size: 0.6rem; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.15rem; transition: color 0.15s; }
  .mobile-nav-btn.active { color: var(--accent); }
  .mobile-nav-btn span:first-child { font-size: 1rem; }
  @media (max-width: 600px) { main { padding-bottom: 5rem; } }
</style>
</head>

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-password').value = '';
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  await Promise.all([loadLambs(), loadCustomProducts(), loadAiRams(), loadSemenInventory()]);
  showPage('flock');
}

async function loadSemenInventory() {
  const { data } = await db.from('semen_inventory').select('*');
  allSemenInventory = data || [];
}

async function loadLambs() {
  const { data } = await db.from('lambs').select('*').order('name');
  allLambs = data || [];
  document.getElementById('flock-count').textContent = `${allLambs.filter(l=>l.status==='Active').length} active lambs`;
}

async function loadAiRams() {
  const { data } = await db.from('ai_rams').select('*').order('name');
  allAiRams = data || [];
}

async function loadCustomProducts() {
  const { data } = await db.from('custom_products').select('*').order('name');
  customProducts = { vaccine: [], medication: [] };
  (data || []).forEach(p => { if (customProducts[p.type]) customProducts[p.type].push(p.name); });
}

// ── NAVIGATION ────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  currentLambId = null;
  document.querySelectorAll('[data-page]').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const btn = document.getElementById('header-action-btn');
  const treatBtn = document.getElementById('sidebar-treatment-btn');
  const bulkBreedBtn = document.getElementById('sidebar-bulk-breed-btn');
  const bulkPregBtn = document.getElementById('sidebar-bulk-pregcheck-btn');
  const bulkWeightBtn = document.getElementById('sidebar-bulk-weight-btn');
  btn.style.display = page === 'flock' ? '' : 'none';
  if (treatBtn) treatBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkBreedBtn) bulkBreedBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkPregBtn) bulkPregBtn.style.display = page === 'flock' ? '' : 'none';
  if (bulkWeightBtn) bulkWeightBtn.style.display = page === 'flock' ? '' : 'none';
  if (page === 'flock') renderFlock();
  else if (page === 'airams') renderAiRams();
  else if (page === 'breeding') renderBreeding();
  else if (page === 'flushes') renderFlushes();
  else if (page === 'analytics') renderAnalytics();
  else if (page === 'calendar') renderCalendar();
  else if (page === 'pedigree') renderPedigreeNetwork();
  else if (page === 'export') renderExport();
}

function showLambAtTab(id, tab) {
  currentLambId = id;
  currentLambTab = tab;
  const btn = document.getElementById('header-action-btn');
  if (btn) btn.style.display = 'none';
  ['sidebar-treatment-btn','sidebar-bulk-breed-btn','sidebar-bulk-pregcheck-btn','sidebar-bulk-weight-btn'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  renderLambDetail();
}

function showLamb(id) {
  currentLambId = id;
  currentLambTab = 'health';
  document.getElementById('header-action-btn').style.display = 'none';
  const treatBtn = document.getElementById('sidebar-treatment-btn');
  const bulkBreedBtn = document.getElementById('sidebar-bulk-breed-btn');
  const bulkWeightBtn = document.getElementById('sidebar-bulk-weight-btn');
  if (treatBtn) treatBtn.style.display = 'none';
  if (bulkBreedBtn) bulkBreedBtn.style.display = 'none';
  if (bulkWeightBtn) bulkWeightBtn.style.display = 'none';
  renderLambDetail();
}

// ── FLOCK PAGE ────────────────────────────────────────
function renderFlock() {
  const statuses = ['Active','Sold','Deceased','All'];
  const flockTypes = ['All','Show','Breeding','Both'];
  const roles = ['All Roles','Embryo Donor','Embryo Recipient','Standard'];
  const filtered = allLambs.filter(l => {
    const flockType = l.flock_type || (l.sex === 'Wether' ? 'Show' : 'Breeding');
    const matchStatus = flockFilter === 'All' || l.status === flockFilter;
    const matchType = flockTypeFilter === 'All' || flockType === flockTypeFilter || flockType === 'Both';
    const matchRole = flockRoleFilter === 'All Roles' || l.role === flockRoleFilter || (flockRoleFilter === 'Embryo Donor' && l.role === 'Both') || (flockRoleFilter === 'Embryo Recipient' && l.role === 'Both');
    const matchSearch = !flockSearch || l.name.toLowerCase().includes(flockSearch.toLowerCase()) || (l.ear_tag||'').toLowerCase().includes(flockSearch.toLowerCase()) || (l.scrapie_id||'').toLowerCase().includes(flockSearch.toLowerCase());
    return matchStatus && matchType && matchRole && matchSearch;
  });

  let html = `
    <div class="search-bar">
      <input placeholder="Search name, tag, scrapie ID…" value="${flockSearch}" oninput="flockSearch=this.value;renderFlock()">
      <div style="display:flex;gap:0.3rem;flex-wrap:wrap">
        ${statuses.map(s=>`<button class="filter-btn ${flockFilter===s?'active':''}" onclick="flockFilter='${s}';renderFlock()">${s}</button>`).join('')}
        <div style="width:1px;background:var(--border);margin:0 0.2rem"></div>
        ${flockTypes.map(t=>`<button class="filter-btn ${flockTypeFilter===t?'active':''}" onclick="flockTypeFilter='${t}';renderFlock()">${t==='All'?'All Flocks':t+' Flock'}</button>`).join('')}
        <div style="width:1px;background:var(--border);margin:0 0.2rem"></div>
        ${roles.map(r=>`<button class="filter-btn ${flockRoleFilter===r?'active':''}" onclick="flockRoleFilter='${r}';renderFlock()">${r==='All Roles'?'All Roles':r==='Embryo Donor'?'Donors':r==='Embryo Recipient'?'Recipients':'Standard'}</button>`).join('')}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.4rem 0.9rem;display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:1.1rem;font-weight:700;color:var(--accent)">${filtered.length}</span>
        <span style="font-size:0.75rem;color:var(--text3);font-weight:500">${filtered.length === 1 ? 'animal' : 'animals'}</span>
      </div>
      ${flockTypeFilter !== 'All' ? `<span style="font-size:0.78rem;color:var(--text3)">${flockTypeFilter} Flock</span>` : ''}
      ${flockFilter !== 'All' ? `<span style="font-size:0.78rem;color:var(--text3)">${flockFilter}</span>` : ''}
      ${flockSearch ? `<span style="font-size:0.78rem;color:var(--text3)">matching "${flockSearch}"</span>` : ''}
    </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🐑</div><h3>No lambs found</h3><p>Try a different filter or add your first lamb</p></div>`;
  } else {
    html += `<div class="flock-grid">`;
    filtered.forEach(lamb => {
      const color = lamb.tag_color || TAG_COLORS[0];
      const statusBadge = lamb.status === 'Active' ? 'badge-green' : lamb.status === 'Sold' ? 'badge-blue' : 'badge-red';
      const flockType = lamb.flock_type || (lamb.sex === 'Wether' ? 'Show' : 'Breeding');
      const flockBadge = flockType === 'Show' ? 'badge-purple' : flockType === 'Breeding' ? 'badge-blue' : 'badge-gray';
      html += `
        <div class="card card-hover" onclick="showLamb('${lamb.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem">
            <div style="min-width:0">
              <div style="font-size:1rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${lamb.name}</div>
              <div style="display:flex;gap:0.35rem;margin-top:0.35rem;flex-wrap:wrap;align-items:center">
                ${lamb.ear_tag?`<span style="font-size:0.72rem;font-weight:600;padding:0.1rem 0.45rem;border-radius:0.25rem;background:${color}22;border:1px solid ${color}55;color:${color}">#${lamb.ear_tag}</span>`:''}
                <span class="badge ${statusBadge}">${lamb.status}</span>
                <span class="badge ${flockBadge}" style="font-size:0.62rem">${flockType}</span>
              </div>
              <div style="font-size:0.75rem;color:var(--text3);margin-top:0.35rem">${lamb.sex||''}${lamb.breed?' · '+lamb.breed:''}${lamb.dob?' · '+calcAge(lamb.dob):''}</div>
            </div>
            <div style="font-size:0.68rem;color:var(--text3);text-align:right;flex-shrink:0">${lamb.role!=='Standard'?`<div style="color:var(--accent);font-weight:600">${lamb.role}</div>`:''}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('main-content').innerHTML = html;
}

function calcAge(dob) {
  if (!dob) return '';
  const days = Math.floor((new Date() - new Date(dob)) / 86400000);
  if (days < 0) return '';
  if (days < 30) return `${days}d`;
  const mo = Math.floor(days / 30.44);
  if (mo < 24) return `${mo}mo`;
  return `${Math.floor(mo/12)}yr`;
}

// ── LAMB DETAIL ───────────────────────────────────────
async function renderLambDetail() {
  const lamb = allLambs.find(l => l.id === currentLambId);
  if (!lamb) { showPage('flock'); return; }

  const color = lamb.tag_color || TAG_COLORS[0];
  const statusBadge = lamb.status === 'Active' ? 'badge-green' : lamb.status === 'Sold' ? 'badge-blue' : 'badge-red';

  let sireDisplay = '—', damDisplay = '—';
  if (lamb.sire_id) { const s = allLambs.find(l=>l.id===lamb.sire_id); sireDisplay = s ? `<span class="link" onclick="showLamb('${s.id}')">${s.name}</span>` : lamb.sire_text||'—'; }
  else if (lamb.ai_sire_id) { const s = allAiRams.find(r=>r.id===lamb.ai_sire_id); sireDisplay = s ? `${s.name} 🧬` : lamb.sire_text||'—'; }
  else if (lamb.sire_text) sireDisplay = lamb.sire_text;
  if (lamb.dam_id) { const d = allLambs.find(l=>l.id===lamb.dam_id); damDisplay = d ? `<span class="link" onclick="showLamb('${d.id}')">${d.name}</span>` : lamb.dam_text||'—'; }
  else if (lamb.dam_text) damDisplay = lamb.dam_text;

  const content = document.getElementById('main-content');
  content.innerHTML = `
    <div style="margin-bottom:1rem">
      <button class="btn btn-secondary btn-sm" onclick="showPage('flock')">← Back to Flock</button>
    </div>
    <div class="profile-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
        <div>
          <div class="profile-name">${lamb.name}</div>
          <div class="profile-meta">
            ${lamb.ear_tag?`<span style="font-size:0.78rem;font-weight:600;padding:0.12rem 0.5rem;border-radius:0.25rem;background:${color}22;border:1px solid ${color}55;color:${color}">#${lamb.ear_tag}</span>`:''}
            ${lamb.scrapie_id?`<span class="badge badge-gray">Scrapie: ${lamb.scrapie_id}</span>`:''}
            <span class="badge ${statusBadge}">${lamb.status}</span>
            ${lamb.flock_type?`<span class="badge ${lamb.flock_type==='Show'?'badge-purple':lamb.flock_type==='Breeding'?'badge-blue':'badge-gray'}">${lamb.flock_type} Flock</span>`:''}
            ${lamb.role!=='Standard'?`<span class="badge badge-yellow">${lamb.role}</span>`:''}
            ${lamb.sex?`<span style="color:var(--text2);font-size:0.83rem">${lamb.sex}</span>`:''}
            ${lamb.dob?`<span style="color:var(--text3);font-size:0.8rem">Born ${lamb.dob} (${calcAge(lamb.dob)})</span>`:''}
          </div>
          ${lamb.genetic_code?`<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--text3)">🧬 ${lamb.genetic_code}</div>`:''}
          ${lamb.breed?`<div style="margin-top:0.25rem;font-size:0.82rem;color:var(--text3);font-style:italic">${lamb.breed}</div>`:''}
          <div style="margin-top:0.5rem;font-size:0.82rem;color:var(--text3)">
            Sire: ${sireDisplay} &nbsp;·&nbsp; Dam: ${damDisplay}
          </div>
          ${lamb.status!=='Active'&&lamb.status_date?`<div style="margin-top:0.4rem;font-size:0.8rem;color:var(--text3)">${lamb.status} ${lamb.status_date}${lamb.status_note?' — '+lamb.status_note:''}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end">
          <button class="btn btn-secondary btn-sm" onclick="openEditLamb('${lamb.id}')">✏️ Edit Profile</button>
          ${lamb.status==='Active'?`
            <button class="btn btn-secondary btn-sm" onclick="openStatusChange('${lamb.id}','Sold')" style="color:var(--blue);border-color:#1a3a60">💰 Mark Sold</button>
            <button class="btn btn-secondary btn-sm" onclick="openStatusChange('${lamb.id}','Deceased')" style="color:#f08080;border-color:#5a2020">✝ Mark Deceased</button>
          `:`
            <button class="btn btn-secondary btn-sm" onclick="reactivateLamb('${lamb.id}')" style="color:var(--accent);border-color:var(--border2)">✅ Reactivate</button>
          `}
          <div id="delete-lamb-btn">
            <button class="btn btn-secondary btn-sm" style="color:#c07070;border-color:#5a2a2a" onclick="confirmDeleteLamb('${lamb.id}')">🗑 Delete Lamb</button>
          </div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${currentLambTab==='health'?'active':''}" onclick="switchLambTab('health')">💉 Health</button>
      ${(lamb.flock_type==='Show'||lamb.flock_type==='Both'||!lamb.flock_type&&lamb.sex==='Wether')?`<button class="tab ${currentLambTab==='weight'?'active':''}" onclick="switchLambTab('weight')">⚖️ Weight</button>`:''}
      ${(lamb.flock_type==='Breeding'||lamb.flock_type==='Both'||(!lamb.flock_type&&lamb.sex!=='Wether'))?`<button class="tab ${currentLambTab==='breeding'?'active':''}" onclick="switchLambTab('breeding')">🐏 Breeding</button>`:''}
      ${(lamb.flock_type==='Breeding'||lamb.flock_type==='Both'||(!lamb.flock_type&&lamb.sex!=='Wether'))?`<button class="tab ${currentLambTab==='embryo'?'active':''}" onclick="switchLambTab('embryo')">🔬 Embryo</button>`:''}
      <button class="tab ${currentLambTab==='notes'?'active':''}" onclick="switchLambTab('notes')">📝 Notes</button>
      <button class="tab ${currentLambTab==='pedigree'?'active':''}" onclick="switchLambTab('pedigree')">🌳 Pedigree</button>
    </div>
    <div id="lamb-tab-content"><div class="loading"><span class="spinner"></span>Loading…</div></div>
  `;

  style_links();
  loadLambTab();
}

function style_links() {
  const style = document.createElement('style');
  style.textContent = '.link{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}';
  document.head.appendChild(style);
}

function switchLambTab(tab) {
  currentLambTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab) || t.onclick?.toString().includes(tab)));
  document.querySelectorAll('.tab').forEach(t => { if(t.getAttribute('onclick')?.includes(`'${tab}'`)) t.classList.add('active'); else t.classList.remove('active'); });
  loadLambTab();
}

async function loadLambTab() {
  const el = document.getElementById('lamb-tab-content');
  if (!el) return;
  el.innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  if (currentLambTab === 'health') await renderHealthTab(el);
  else if (currentLambTab === 'weight') await renderWeightTab(el);
  else if (currentLambTab === 'breeding') await renderBreedingTab(el);
  else if (currentLambTab === 'embryo') await renderEmbryoTab(el);
  else if (currentLambTab === 'notes') await renderNotesTab(el);
  else if (currentLambTab === 'pedigree') renderPedigreeTab(el);
}

// ── WEIGHT TAB ────────────────────────────────────────
async function renderWeightTab(el) {
  const { data } = await db.from('weight_records').select('*').eq('lamb_id', currentLambId).order('date', {ascending:true});
  const recs = data || [];
  let html = `
    <div class="section-header">
      <div class="section-title">Weight Records</div>
      <button class="btn btn-primary btn-sm" onclick="openAddWeight()">+ Log Weight</button>
    </div>`;
  if (recs.length >= 2) {
    html += `<div class="weight-chart"><canvas id="weight-canvas" height="180"></canvas></div>`;
  }
  if (recs.length === 0) {
    html += `<div class="empty"><div class="empty-icon">⚖️</div><h3>No weights logged</h3></div>`;
  } else {
    [...recs].reverse().forEach(r => {
      html += `
        <div class="record-row" id="wrow-${r.id}">
          <div>
            <span style="font-weight:600;color:var(--text);font-size:1rem">${r.weight_lbs} lbs</span>
            <div style="font-size:0.78rem;color:var(--text3);margin-top:0.2rem">📅 ${r.date}${r.notes?' — '+r.notes:''}</div>
          </div>
          <div class="record-actions" id="wact-${r.id}">
            <button class="btn-icon" style="color:#c07070;border-color:#5a2a2a" onclick="confirmDeleteWeight('${r.id}')">🗑</button>
          </div>
        </div>`;
    });
  }
  el.innerHTML = html;
  if (recs.length >= 2) drawWeightChart(recs);
}

function drawWeightChart(recs) {
  const canvas = document.getElementById('weight-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 400, H = 180;
  canvas.width = W; canvas.height = H;
  const pad = { t:20, r:20, b:30, l:45 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
  const weights = recs.map(r => parseFloat(r.weight_lbs));
  const minW = Math.min(...weights) * 0.95, maxW = Math.max(...weights) * 1.05;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = '#263d1c'; ctx.lineWidth = 1;
  for (let i=0;i<=4;i++) {
    const y = pad.t + iH - (i/4)*iH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+iW, y); ctx.stroke();
    ctx.fillStyle='#4a6e38'; ctx.font='10px Source Serif 4,serif'; ctx.textAlign='right';
    ctx.fillText((minW+(maxW-minW)*i/4).toFixed(0), pad.l-4, y+3);
  }
  ctx.beginPath(); ctx.strokeStyle='#6ab84a'; ctx.lineWidth=2;
  recs.forEach((r,i) => {
    const x = pad.l + (i/(recs.length-1))*iW;
    const y = pad.t + iH - ((parseFloat(r.weight_lbs)-minW)/(maxW-minW))*iH;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  recs.forEach((r,i) => {
    const x = pad.l + (i/(recs.length-1))*iW;
    const y = pad.t + iH - ((parseFloat(r.weight_lbs)-minW)/(maxW-minW))*iH;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle='#6ab84a'; ctx.fill();
    if (i===0||i===recs.length-1) {
      ctx.fillStyle='#8aad72'; ctx.font='10px Source Serif 4,serif'; ctx.textAlign='center';
      ctx.fillText(r.date.slice(5), x, H-pad.b+14);
    }
  });
}

function confirmDeleteWeight(id) {
  const el = document.getElementById(`wact-${id}`);
  el.innerHTML = `<div class="confirm-inline"><span>Delete?</span><button class="btn btn-danger btn-sm" onclick="deleteWeight('${id}')">Yes</button><button class="btn-icon" onclick="loadLambTab()">No</button></div>`;
}
async function deleteWeight(id) {
  await db.from('weight_records').delete().eq('id', id);
  toast('Weight deleted'); loadLambTab();
}

async function saveBreedingResult(breedingId, id) {
  const payload = {
    breeding_id: breedingId,
    lamb_id: currentLambId,
    birth_date: v('br2-date')||null,
    num_born: v('br2-born')!==''?parseInt(v('br2-born')):null,
    num_alive: v('br2-alive')!==''?parseInt(v('br2-alive')):null,
    num_male: v('br2-male')!==''?parseInt(v('br2-male')):null,
    num_female: v('br2-female')!==''?parseInt(v('br2-female')):null,
    notes: v('br2-notes')
  };
  let resultId = id;
  if (id) {
    await db.from('breeding_results').update(payload).eq('id', id);
    toast('Result updated');
  } else {
    const { data } = await db.from('breeding_results').insert(payload).select().single();
    resultId = data?.id;
    toast('Result saved');
  }
  // Save individual lamb rows — delete existing then re-insert
  if (resultId) {
    await db.from('breeding_result_lambs').delete().eq('result_id', resultId);
    const lambRows = (window._brLambs||[]).filter(lb => lb.ear_tag || lb.lamb_id);
    if (lambRows.length > 0) {
      await db.from('breeding_result_lambs').insert(lambRows.map(lb => ({
        result_id: resultId,
        ear_tag: lb.ear_tag||null,
        sex: lb.sex||null,
        birth_weight: lb.birth_weight ? parseFloat(lb.birth_weight) : null,
        lamb_id: lb.lamb_id||null
      })));
    }
  }
  window._brLambs = [];
  // Auto-update breeding record outcome to Lamb Born
  await db.from('breeding_records').update({ outcome: 'Lamb Born' }).eq('id', breedingId);
  closeModal(); loadLambTab();
}

// ── PEDIGREE TAB ──────────────────────────────────────
function renderPedigreeTab(el) {
  const lamb = allLambs.find(l=>l.id===currentLambId);

  function getNode(id, aiId, text) {
    if (id) { const l = allLambs.find(x=>x.id===id); if(l) return l; }
    if (aiId) { const r = allAiRams.find(x=>x.id===aiId); if(r) return { name: r.name+' 🧬', id: null, ai_id: r.id, ear_tag: null, dob: null, sex: 'Ram', sire_id: null, ai_sire_id: null, sire_text: null, dam_id: null, dam_text: null }; }
    if (text) return { name: text, id: null, ear_tag: null, dob: null };
    return null;
  }

  function buildTree(lamb, depth) {
    if (!lamb || depth > 4) return '';
    const sire = getNode(lamb.sire_id, lamb.ai_sire_id, lamb.sire_text);
    const dam = getNode(lamb.dam_id, null, lamb.dam_text);
    const clickable = lamb.id ? `class="ped-node linked" onclick="showLamb('${lamb.id}')"` : `class="ped-node"`;
    const nodeHtml = `<div ${clickable}>
      <div class="ped-node-name">${lamb.name}</div>
      ${lamb.ear_tag?`<div class="ped-node-sub">#${lamb.ear_tag}</div>`:''}
      ${lamb.sex?`<div class="ped-node-sub">${lamb.sex}${lamb.dob?' · '+calcAge(lamb.dob):''}</div>`:''}
    </div>`;
    if (depth >= 3 || (!sire && !dam)) return nodeHtml;
    return `<div class="ped-row">
      ${nodeHtml}
      <div class="ped-connector">→</div>
      <div class="ped-col">
        ${sire ? `<div><div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase;margin-bottom:0.2rem">Sire</div>${buildTree(sire, depth+1)}</div>` : ''}
        ${dam ? `<div><div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase;margin-bottom:0.2rem">Dam</div>${buildTree(dam, depth+1)}</div>` : ''}
      </div>
    </div>`;
  }

  el.innerHTML = `<div class="pedigree-tree">${buildTree(lamb, 0)}</div>`;
}

function sireOptions(selectedId) {
  const flockRams = allLambs.filter(l => l.sex === 'Ram');
  const flockOpts = flockRams.map(l => `<option value="lamb:${l.id}" ${selectedId==='lamb:'+l.id?'selected':''}>${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}</option>`).join('');

  // Sort AI rams — those with inventory first
  const ramsWithInv = allAiRams.filter(r => allSemenInventory.some(i => i.ai_ram_id === r.id && i.straws > 0));
  const ramsWithoutInv = allAiRams.filter(r => !allSemenInventory.some(i => i.ai_ram_id === r.id && i.straws > 0));

  const makeOpt = r => {
    const inv = allSemenInventory.filter(i => i.ai_ram_id === r.id && i.straws > 0);
    const invStr = inv.length > 0 ? ` — ${inv.map(i=>i.location+': '+i.straws).join(', ')}` : '';
    return `<option value="ai:${r.id}" ${selectedId==='ai:'+r.id?'selected':''}>${r.name}${invStr} 🧬</option>`;
  };

  const aiOptsWithInv = ramsWithInv.map(makeOpt).join('');
  const aiOptsNoInv = ramsWithoutInv.map(makeOpt).join('');

  return `<option value="">— Select sire —</option>
    ${flockRams.length ? `<optgroup label="Flock Rams">${flockOpts}</optgroup>` : ''}
    ${ramsWithInv.length ? `<optgroup label="AI Rams — In Stock 🧪">${aiOptsWithInv}</optgroup>` : ''}
    ${ramsWithoutInv.length ? `<optgroup label="AI Rams — No Inventory">${aiOptsNoInv}</optgroup>` : ''}`;
}

function parseSireSelection(val) {
  if (!val) return { sire_id: null, ai_sire_id: null };
  if (val.startsWith('lamb:')) return { sire_id: val.replace('lamb:',''), ai_sire_id: null };
  if (val.startsWith('ai:')) return { sire_id: null, ai_sire_id: val.replace('ai:','') };
  return { sire_id: null, ai_sire_id: null };
}

function getSireDisplay(sire_id, ai_sire_id, sire_text) {
  if (sire_id) { const s = allLambs.find(l=>l.id===sire_id); return s ? s.name : sire_text||'—'; }
  if (ai_sire_id) { const s = allAiRams.find(r=>r.id===ai_sire_id); return s ? `${s.name} 🧬` : sire_text||'—'; }
  return sire_text || '—';
}

function openSemenInventory() {
  const sortedRams = [...allAiRams].sort((a, b) => {
    const aHas = allSemenInventory.some(i => i.ai_ram_id === a.id && i.straws > 0);
    const bHas = allSemenInventory.some(i => i.ai_ram_id === b.id && i.straws > 0);
    if (aHas && !bHas) return -1;
    if (!aHas && bHas) return 1;
    return a.name.localeCompare(b.name);
  });

  const rows = sortedRams.map(ram => {
    const inv = allSemenInventory.filter(i => i.ai_ram_id === ram.id && i.straws > 0);
    const total = inv.reduce((s,i) => s + (i.straws||0), 0);
    const locStr = inv.length > 0 ? inv.map(i=>`${i.location}: <strong>${i.straws}</strong>`).join(' &nbsp;·&nbsp; ') : '<span style="color:var(--text3)">No inventory</span>';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:600;font-size:0.9rem">${ram.name}${total > 0 ? ` <span style="color:var(--green);font-size:0.78rem">(${total} straws)</span>` : ''}</div>
        <div style="font-size:0.78rem;color:var(--text2);margin-top:0.15rem">${locStr}</div>
      </div>
      <button class="btn-icon btn-sm" onclick="openManageInventory('${ram.id}')">Manage</button>
    </div>`;
  }).join('');

  const grandTotal = allSemenInventory.filter(i => i.straws > 0).reduce((s,i) => s + (i.straws||0), 0);
  showModal(`
    <div class="modal-header"><div class="modal-title">🧪 Semen Inventory</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem 1rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:0.78rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.07em">Total Straws in Inventory</span>
      <span style="font-size:1.2rem;font-weight:700;color:var(--accent)">${grandTotal}</span>
    </div>
    <div style="max-height:380px;overflow-y:auto">${rows || '<div class="empty"><p>No AI rams yet</p></div>'}</div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

  const LOCATIONS = ['Tank', 'RSG', 'Other'];

  const locRows = LOCATIONS.map(loc => {
    const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === loc);
    const count = entry ? entry.straws : 0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:500;color:var(--text);min-width:80px">${loc}</div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:1.1rem;font-weight:700;color:${count>0?'var(--accent)':'var(--text3)'};min-width:40px;text-align:center">${count}</span>
        <span style="font-size:0.75rem;color:var(--text3)">straws</span>

      </div>
    </div>`;
  }).join('');

  // Transfer section
  const locOptions = LOCATIONS.map(l => `<option value="${l}">${l}</option>`).join('');
  const transferSection = `
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
      <div style="font-size:0.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.6rem">Transfer Between Locations</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <select id="inv-from-loc" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.4rem 0.6rem;font-size:0.82rem">${locOptions}</select>
        <span style="color:var(--text3)">→</span>
        <select id="inv-to-loc" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.4rem 0.6rem;font-size:0.82rem">${locOptions}</select>
        <input type="number" id="inv-transfer-qty" value="1" min="0.5" step="0.5" style="width:65px;padding:0.4rem;font-size:0.82rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text)">
        <span style="font-size:0.78rem;color:var(--text3)">straws</span>
        <button class="btn btn-primary btn-sm" onclick="transferInventory('${ramId}')">Transfer</button>
      </div>
    </div>`;

  showModal(`
    <div class="modal-header"><div class="modal-title">🧪 ${ram.name} — Inventory</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:0.5rem;font-size:0.78rem;color:var(--text3)">Enter quantity then click Add or Use</div>
    ${locRows}
    ${transferSection}
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

async function transferInventory(ramId) {
  const fromLoc = document.getElementById('inv-from-loc')?.value;
  const toLoc = document.getElementById('inv-to-loc')?.value;
  const qty = parseFloat(document.getElementById('inv-transfer-qty')?.value) || 1;

  if (fromLoc === toLoc) { toast('Select different locations'); return; }

  const fromEntry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === fromLoc);
  if (!fromEntry || fromEntry.straws < qty) { toast(`Not enough straws in ${fromLoc}`); return; }

  // Deduct from source
  const newFromCount = fromEntry.straws - qty;
  await db.from('semen_inventory').update({ straws: newFromCount, updated_at: new Date().toISOString() }).eq('id', fromEntry.id);
  fromEntry.straws = newFromCount;

  // Add to destination
  const toEntry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === toLoc);
  if (toEntry) {
    const newToCount = toEntry.straws + qty;
    await db.from('semen_inventory').update({ straws: newToCount, updated_at: new Date().toISOString() }).eq('id', toEntry.id);
    toEntry.straws = newToCount;
  } else {
    const { data } = await db.from('semen_inventory').insert({ ai_ram_id: ramId, location: toLoc, straws: qty });
    if (data) allSemenInventory.push(Array.isArray(data) ? data[0] : data);
  }

  // Log transaction
  await db.from('semen_transactions').insert({
    ai_ram_id: ramId, transaction_type: 'transfer', straws: qty,
    notes: `Transferred ${qty} from ${fromLoc} to ${toLoc}`
  });

  toast(`Transferred ${qty} straw${qty>1?'s':''} from ${fromLoc} to ${toLoc}`);
  await loadSemenInventory();
  renderAiRams();
  openManageInventory(ramId);
}

async function adjustInventory(ramId, location, entryIdHint, direction) {
  const qty = parseFloat(document.getElementById(`inv-adj-${location}`)?.value) || 1;
  const adj = direction * qty;

  // Always look up fresh from allSemenInventory by ram+location
  const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === location);

  if (entry) {
    const newCount = Math.max(0, (entry.straws || 0) + adj);
    await db.from('semen_inventory').update({ straws: newCount, updated_at: new Date().toISOString() }).eq('id', entry.id);
    entry.straws = newCount;
  } else {
    if (adj <= 0) { toast('No inventory to deduct'); return; }
    const { data } = await db.from('semen_inventory').insert({ ai_ram_id: ramId, location, straws: adj });
    if (data) allSemenInventory.push(Array.isArray(data) ? data[0] : data);
  }

  await db.from('semen_transactions').insert({
    ai_ram_id: ramId,
    transaction_type: direction > 0 ? 'add' : 'use',
    straws: qty,
    notes: direction > 0 ? `Manual add — ${location}` : `Manual use — ${location}`
  });

  toast(`Inventory updated`);
  await loadSemenInventory();
  renderAiRams();
  openManageInventory(ramId);
}

async function deductSemenInventory(ramId, location, straws, referenceType, referenceId) {
  const entry = allSemenInventory.find(i => i.ai_ram_id === ramId && i.location === location);
  if (!entry) { toast('No inventory found for that location'); return; }
  const newCount = Math.max(0, entry.straws - straws);
  await db.from('semen_inventory').update({ straws: newCount, updated_at: new Date().toISOString() }).eq('id', entry.id);
  await db.from('semen_transactions').insert({
    ai_ram_id: ramId, inventory_id: entry.id,
    transaction_type: 'use', straws,
    reference_type: referenceType, reference_id: referenceId,
    notes: `Used in ${referenceType}`
  });
  // Update in memory immediately
  entry.straws = newCount;
  await loadSemenInventory();
}

  const recs = flushes || [];

  // Summary stats
  const totalFlushes = recs.length;
  const totalCollected = recs.reduce((s,f) => s + (f.embryos_collected||0), 0);
  const totalTransferred = recs.reduce((s,f) => s + (f.embryos_transferred||0), 0);
  const ivfCount = recs.filter(f => f.flush_type === 'IVF').length;
  const moetCount = recs.filter(f => f.flush_type === 'MOET' || !f.flush_type).length;

  let html = `
    <div class="section-header"><div class="section-title" style="font-size:1.15rem">Embryo Flushes — All Donors</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.75rem;margin-bottom:1.25rem">
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.6rem;font-weight:700;color:var(--accent)">${totalFlushes}</div>
        <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem">Total Flushes</div>
      </div>
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.6rem;font-weight:700;color:var(--green)">${totalCollected}</div>
        <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem">Embryos Collected</div>
      </div>
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.6rem;font-weight:700;color:var(--blue)">${totalTransferred}</div>
        <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem">Embryos Transferred</div>
      </div>
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.6rem;font-weight:700;color:var(--purple)">${moetCount} / ${ivfCount}</div>
        <div style="font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem">MOET / IVF</div>
      </div>
    </div>`;

  if (recs.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔬</div><h3>No flush records yet</h3><p>Open a donor ewe's profile to log a flush</p></div>`;
  } else {
    // Group by donor
    const byDonor = {};
    recs.forEach(f => {
      const donorId = f.donor_id;
      if (!byDonor[donorId]) byDonor[donorId] = [];
      byDonor[donorId].push(f);
    });

    Object.entries(byDonor).forEach(([donorId, donorFlushes]) => {
      const donor = allLambs.find(l => l.id === donorId);
      const donorName = donor ? donor.name + (donor.ear_tag ? ` #${donor.ear_tag}` : '') : 'Unknown';
      const donorTotal = donorFlushes.reduce((s,f) => s + (f.embryos_collected||0), 0);

      html += `
        <div class="card" style="margin-bottom:0.75rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;cursor:pointer" onclick="showLamb('${donorId}')">
            <div>
              <div style="font-size:1rem;font-weight:700;color:var(--text)">${donorName}</div>
              <div style="font-size:0.75rem;color:var(--text3);margin-top:0.15rem">${donorFlushes.length} flush${donorFlushes.length!==1?'es':''} · ${donorTotal} embryos collected</div>
            </div>
            <span style="color:var(--accent);font-size:0.8rem">View Profile →</span>
          </div>
          ${donorFlushes.map(f => {
            const sire = f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : (f.sire_id ? allLambs.find(l=>l.id===f.sire_id) : null);
            const sireName = sire ? sire.name+(f.ai_sire_id?' 🧬':'') : (f.sire_text||'—');
            const typeBadge = f.flush_type === 'IVF' ? 'badge-purple' : 'badge-blue';
            return `<div style="padding:0.6rem 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem">
              <div>
                <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
                  <span style="font-size:0.85rem;font-weight:600;color:var(--text)">📅 ${f.flush_date}</span>
                  <span class="badge ${typeBadge}">${f.flush_type||'MOET'}</span>
                  ${f.embryos_collected!=null?`<span class="badge badge-green">${f.embryos_collected} collected</span>`:''}
                  ${f.embryos_transferred!=null?`<span class="badge badge-blue">${f.embryos_transferred} transferred</span>`:''}
                </div>
                <div style="font-size:0.78rem;color:var(--text3);margin-top:0.25rem;display:flex;gap:0.75rem;flex-wrap:wrap">
                  <span>Sire: ${sireName}</span>
                  ${f.notes?`<span style="font-style:italic">${f.notes}</span>`:''}
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
    });
  }

  document.getElementById('main-content').innerHTML = html;
}

// ── ANALYTICS PAGE ────────────────────────────────────
async function renderAnalytics() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading analytics…</div>`;

  // Load all data needed
  const [{ data: breedingRecs }, { data: breedingResults }, { data: transfers }, { data: flushes }, { data: transferLambs }, { data: resultLambs }] = await Promise.all([
    db.from('breeding_records').select('*'),
    db.from('breeding_results').select('*'),
    db.from('embryo_transfers').select('*'),
    db.from('embryo_flushes').select('*'),
    db.from('embryo_transfer_lambs').select('*'),
    db.from('breeding_result_lambs').select('*'),
  ]);

  const today = new Date().toISOString().slice(0,10);
  const defaultFrom = new Date(new Date().setFullYear(new Date().getFullYear()-2)).toISOString().slice(0,10);

  // Render with filters
  function buildAnalyticsHTML(fromDate, toDate) {
    const filterBreed = (breedingRecs||[]).filter(r => (!fromDate||r.breeding_date>=fromDate) && (!toDate||r.breeding_date<=toDate));
    const filterTransfer = (transfers||[]).filter(t => (!fromDate||t.implant_date>=fromDate) && (!toDate||t.implant_date<=toDate));

    const conceivedOutcomes = ['Confirmed Pregnant','Lamb Born'];
    const decidedOutcomes = ['Confirmed Pregnant','Lamb Born','Not Pregnant','Failed'];

    // Only include records with a decided outcome (exclude Pending)
    const filterBreedDecided = filterBreed.filter(r => decidedOutcomes.includes(r.outcome));
    const filterTransferDecided = filterTransfer.filter(t => decidedOutcomes.includes(t.outcome));

    // Needs update — ALL pending records (not just overdue)
    const today = new Date().toISOString().slice(0,10);
    const overdueBreeding = (breedingRecs||[]).filter(r =>
      (r.outcome === 'Pending' || !r.outcome)
    ).sort((a,b) => (a.breeding_date||'').localeCompare(b.breeding_date||''));
    const overdueTransfer = (transfers||[]).filter(t =>
      (t.outcome === 'Pending' || !t.outcome)
    ).sort((a,b) => (a.implant_date||'').localeCompare(b.implant_date||''));
    const pendingBreeding = filterBreed.filter(r => r.outcome === 'Pending' || !r.outcome);
    const pendingTransfer = filterTransfer.filter(t => t.outcome === 'Pending' || !t.outcome);

    // ── FLUSH TYPE ANALYTICS ──
    const filterFlushes = (flushes||[]).filter(f => (!fromDate||f.flush_date>=fromDate) && (!toDate||f.flush_date<=toDate));

    function flushTypeStats(type) {
      const typeFlushes = filterFlushes.filter(f => type === 'IVF' ? f.flush_type === 'IVF' : (f.flush_type === 'MOET' || !f.flush_type));
      const count = typeFlushes.length;
      if (count === 0) return null;
      const totalCollected = typeFlushes.reduce((s,f) => s + (f.embryos_collected||0), 0);
      const totalTransferred = typeFlushes.reduce((s,f) => s + (f.embryos_transferred||0), 0);
      const avgCollected = count ? (totalCollected/count).toFixed(1) : '—';
      const avgTransferred = count ? (totalTransferred/count).toFixed(1) : '—';

      // Transfers for these flushes (decided only)
      const flushIds = new Set(typeFlushes.map(f => f.id));
      const relatedTransfers = filterTransferDecided.filter(t => flushIds.has(t.flush_id));
      const retained = relatedTransfers.filter(t => conceivedOutcomes.includes(t.outcome)).length;
      const retentionRate = relatedTransfers.length ? Math.round(retained/relatedTransfers.length*100)+'%' : '—';
      const totalLambs = relatedTransfers.reduce((s,t) => s + (t.lamb_born ? (t.lamb_count||0) : 0), 0);

      return { type, count, avgCollected, avgTransferred, totalCollected, totalTransferred, relatedTransfers: relatedTransfers.length, retained, retentionRate, totalLambs };
    }

    const ivfStats = flushTypeStats('IVF');
    const moetStats = flushTypeStats('MOET');

    function flushTypeCard(stats, typeFlushes) {
      if (!stats) return '';
      const retColor = stats.relatedTransfers === 0 ? 'var(--text3)' : (stats.retained/stats.relatedTransfers >= 0.6 ? 'var(--green)' : stats.retained/stats.relatedTransfers >= 0.4 ? 'var(--warn)' : 'var(--danger)');
      const flushData = JSON.stringify(typeFlushes.map(f => f.id)).replace(/"/g, '&quot;');
      return `<div class="card" style="padding:1rem;cursor:pointer;transition:border-color 0.15s" onclick="showFlushTypeDetail('${stats.type}','${stats.type==='IVF'?'badge-purple':'badge-blue'}',${flushData})" onmouseenter="this.style.borderColor='var(--border2)'" onmouseleave="this.style.borderColor='var(--border)'">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <div style="font-size:1rem;font-weight:700;color:var(--text)">${stats.type} <span style="font-size:0.7rem;color:var(--text3)">→</span></div>
          <span class="badge ${stats.type==='IVF'?'badge-purple':'badge-blue'}">${stats.count} flush${stats.count!==1?'es':''}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem">
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.6rem;text-align:center">
            <div style="font-size:1.3rem;font-weight:700;color:var(--accent)">${stats.avgCollected}</div>
            <div style="font-size:0.68rem;color:var(--text3);margin-top:0.1rem">Avg Collected</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.6rem;text-align:center">
            <div style="font-size:1.3rem;font-weight:700;color:var(--blue)">${stats.avgTransferred}</div>
            <div style="font-size:0.68rem;color:var(--text3);margin-top:0.1rem">Avg Transferred</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.6rem;text-align:center">
            <div style="font-size:1.3rem;font-weight:700;color:${retColor}">${stats.retentionRate}</div>
            <div style="font-size:0.68rem;color:var(--text3);margin-top:0.1rem">Retention Rate</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.6rem;text-align:center">
            <div style="font-size:1.3rem;font-weight:700;color:var(--green)">${stats.totalLambs}</div>
            <div style="font-size:0.68rem;color:var(--text3);margin-top:0.1rem">Live Born</div>
          </div>
        </div>
        <div style="font-size:0.72rem;color:var(--text3);margin-top:0.5rem">${stats.totalCollected} collected · ${stats.totalTransferred} transferred · ${stats.relatedTransfers} transfers checked</div>
      </div>`;
    }

    // Store flushes for modal use
    const ivfFlushes = filterFlushes.filter(f => f.flush_type === 'IVF');
    const moetFlushes = filterFlushes.filter(f => f.flush_type === 'MOET' || !f.flush_type);
    window._analyticsFlushes = flushes || [];
    window._analyticsTransfers = transfers || [];
    const eweConception = {};
    filterBreedDecided.forEach(r => {
      if (!r.lamb_id) return;
      if (!eweConception[r.lamb_id]) eweConception[r.lamb_id] = { total:0, conceived:0, lambs:0 };
      eweConception[r.lamb_id].total++;
      if (conceivedOutcomes.includes(r.outcome)) eweConception[r.lamb_id].conceived++;
    });
    // Count live born lambs per ewe from breeding_results
    (breedingResults||[]).forEach(res => {
      const rec = (breedingRecs||[]).find(r => r.id === res.breeding_id);
      if (rec && eweConception[rec.lamb_id]) eweConception[rec.lamb_id].lambs += (res.num_alive||0);
    });

    // ── CONCEPTION RATE BY AI SIRE (breeding) ──
    const sireConception = {};
    filterBreedDecided.forEach(r => {
      const sireKey = r.ai_sire_id || ('text:' + (r.sire_text||'Unknown'));
      if (!sireConception[sireKey]) sireConception[sireKey] = { total:0, conceived:0, lambs:0, isAi: !!r.ai_sire_id };
      sireConception[sireKey].total++;
      if (conceivedOutcomes.includes(r.outcome)) sireConception[sireKey].conceived++;
    });
    (breedingResults||[]).forEach(res => {
      const rec = (breedingRecs||[]).find(r => r.id === res.breeding_id);
      if (!rec) return;
      const sireKey = rec.ai_sire_id || ('text:' + (rec.sire_text||'Unknown'));
      if (sireConception[sireKey]) sireConception[sireKey].lambs += (res.num_alive||0);
    });

    // ── RETENTION RATE BY DONOR ──
    const donorRetention = {};
    filterTransferDecided.forEach(t => {
      const flushRec = (flushes||[]).find(f => f.id === t.flush_id);
      const donorId = flushRec?.donor_id || t.donor_id;
      if (!donorId) return;
      if (!donorRetention[donorId]) donorRetention[donorId] = { total:0, retained:0, lambs:0 };
      donorRetention[donorId].total++;
      if (conceivedOutcomes.includes(t.outcome)) donorRetention[donorId].retained++;
      if (t.lamb_born) donorRetention[donorId].lambs += (t.lamb_count||0);
    });
    (transferLambs||[]).forEach(tl => {
      const transfer = (transfers||[]).find(t => t.id === tl.transfer_id);
      const flushRec = transfer ? (flushes||[]).find(f => f.id === transfer.flush_id) : null;
      const donorId = flushRec?.donor_id;
    });

    // ── RETENTION RATE BY RECIPIENT ──
    const recipRetention = {};
    filterTransferDecided.forEach(t => {
      const recipKey = t.recipient_id || ('text:' + (t.recipient_text||'Unknown'));
      if (!recipRetention[recipKey]) recipRetention[recipKey] = { total:0, retained:0, lambs:0, isLinked: !!t.recipient_id };
      recipRetention[recipKey].total++;
      if (conceivedOutcomes.includes(t.outcome)) recipRetention[recipKey].retained++;
      if (t.lamb_born) recipRetention[recipKey].lambs += (t.lamb_count||0);
    });

    // ── RETENTION RATE BY AI SIRE (flush) ──
    const flushSireRetention = {};
    filterTransferDecided.forEach(t => {
      const flushRec = (flushes||[]).find(f => f.id === t.flush_id);
      const sireKey = flushRec?.ai_sire_id || ('text:' + (flushRec?.sire_text||'Unknown'));
      if (!flushSireRetention[sireKey]) flushSireRetention[sireKey] = { total:0, retained:0, lambs:0, isAi: !!flushRec?.ai_sire_id };
      flushSireRetention[sireKey].total++;
      if (conceivedOutcomes.includes(t.outcome)) flushSireRetention[sireKey].retained++;
      if (t.lamb_born) flushSireRetention[sireKey].lambs += (t.lamb_count||0);
    });

    function pct(n, d) { return d === 0 ? '—' : Math.round(n/d*100) + '%'; }
    function rateColor(n, d) { if (d===0) return 'var(--text3)'; const p = n/d; return p>=0.6?'var(--green)':p>=0.4?'var(--warn)':'var(--danger)'; }

    function statCard(name, tag, total, success, lambs, label, lambId) {
      const rate = pct(success, total);
      const color = rateColor(success, total);
      const clickable = lambId ? `onclick="showLamb('${lambId}')" style="cursor:pointer"` : '';
      return `<div class="card" style="padding:1rem;transition:border-color 0.15s${lambId?';cursor:pointer':''}" ${clickable} ${lambId?'onmouseenter="this.style.borderColor=\'var(--border2)\'" onmouseleave="this.style.borderColor=\'var(--border)\'"':''}>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem">
          <div>
            <div style="font-weight:600;font-size:0.9rem;color:var(--text)">${name}${lambId?` <span style="font-size:0.7rem;color:var(--text3)">→</span>`:''}</div>
            ${tag?`<div style="font-size:0.72rem;color:var(--text3)">${tag}</div>`:''}
          </div>
          <div style="text-align:right">
            <div style="font-size:1.4rem;font-weight:700;color:${color}">${rate}</div>
            <div style="font-size:0.68rem;color:var(--text3)">${label}</div>
          </div>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <span class="badge badge-gray">${total} attempts</span>
          <span class="badge badge-green">${success} success</span>
          ${lambs>0?`<span class="badge badge-blue">🐑 ${lambs} live born</span>`:''}
        </div>
      </div>`;
    }

    // Sort by rate descending
    function sortByRate(obj) {
      return Object.entries(obj).sort((a,b) => {
        const ra = a[1].total ? (a[1].conceived||a[1].retained)/a[1].total : -1;
        const rb = b[1].total ? (b[1].conceived||b[1].retained)/b[1].total : -1;
        return rb - ra;
      });
    }

    const eweCards = sortByRate(eweConception).map(([id, d]) => {
      const lamb = allLambs.find(l=>l.id===id);
      return statCard(lamb?.name||'Unknown', lamb?.ear_tag?'#'+lamb.ear_tag:'', d.total, d.conceived, d.lambs, 'Conception Rate', id);
    }).join('');

    const sireCards = sortByRate(sireConception).map(([key, d]) => {
      const ram = d.isAi ? allAiRams.find(r=>r.id===key) : null;
      const name = ram ? ram.name+' 🧬' : key.replace('text:','');
      return statCard(name, '', d.total, d.conceived, d.lambs, 'Conception Rate', null);
    }).join('');

    const donorCards = sortByRate(donorRetention).map(([id, d]) => {
      const lamb = allLambs.find(l=>l.id===id);
      return statCard(lamb?.name||'Unknown', lamb?.ear_tag?'#'+lamb.ear_tag:'', d.total, d.retained, d.lambs, 'Retention Rate', id);
    }).join('');

    const recipCards = sortByRate(recipRetention).map(([key, d]) => {
      const lamb = d.isLinked ? allLambs.find(l=>l.id===key) : null;
      const name = lamb ? lamb.name : key.replace('text:','');
      const tag = lamb?.ear_tag ? '#'+lamb.ear_tag : '';
      return statCard(name, tag, d.total, d.retained, d.lambs, 'Retention Rate', d.isLinked ? key : null);
    }).join('');

    const flushSireCards = sortByRate(flushSireRetention).map(([key, d]) => {
      const ram = d.isAi ? allAiRams.find(r=>r.id===key) : null;
      const name = ram ? ram.name+' 🧬' : key.replace('text:','');
      return statCard(name, '', d.total, d.retained, d.lambs, 'Retention Rate', null);
    }).join('');

    return `
      <div class="section-header"><div class="section-title" style="font-size:1.15rem">📈 Analytics</div></div>

      <!-- Date Range Filter -->
      <div class="card" style="margin-bottom:1.25rem;padding:1rem">
        <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap">
          <div class="field" style="margin:0;flex:1;min-width:130px"><label>From</label><input type="date" id="analytics-from" value="${fromDate}" onchange="applyAnalyticsFilter()"></div>
          <div class="field" style="margin:0;flex:1;min-width:130px"><label>To</label><input type="date" id="analytics-to" value="${toDate}" onchange="applyAnalyticsFilter()"></div>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('analytics-from').value='';document.getElementById('analytics-to').value='';applyAnalyticsFilter()">Clear</button>
        </div>
        <div style="font-size:0.72rem;color:var(--text3);margin-top:0.5rem">Pending outcomes are excluded from rate calculations.</div>
      </div>

      <!-- NEEDS UPDATE -->
      ${(overdueBreeding.length > 0 || overdueTransfer.length > 0) ? `
      <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:var(--radius);padding:1rem;margin-bottom:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
          <div style="font-size:0.78rem;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:0.08em">⚠️ Pending Records (${overdueBreeding.length + overdueTransfer.length} need outcome)</div>
          <div style="display:flex;gap:0.35rem">
            <button class="filter-btn active" id="pending-filter-all" onclick="setPendingFilter('all')" style="font-size:0.7rem;padding:0.2rem 0.5rem">All</button>
            <button class="filter-btn" id="pending-filter-pastdue" onclick="setPendingFilter('pastdue')" style="font-size:0.7rem;padding:0.2rem 0.5rem">Past Due</button>
          </div>
        </div>
        <div id="pending-records-list">
          ${overdueBreeding.map(r => {
            const lamb = allLambs.find(l=>l.id===r.lamb_id);
            const sire = r.ai_sire_id ? allAiRams.find(x=>x.id===r.ai_sire_id) : null;
            const isPastDue = r.expected_lamb_date && r.expected_lamb_date < today;
            return `<div class="pending-record-row" data-pastdue="${isPastDue}" style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid rgba(245,158,11,0.15);cursor:pointer" onclick="showLambAtTab('${r.lamb_id}','breeding')">
              <div>
                <span style="font-weight:600;font-size:0.85rem">${lamb?.name||'Unknown'}</span>
                <span style="color:var(--text3);font-size:0.78rem"> · Breeding ${r.breeding_date} · ${sire?.name||r.sire_text||'—'}</span>
              </div>
              <div style="display:flex;gap:0.4rem;align-items:center;flex-shrink:0">
                ${isPastDue?'<span class="badge badge-red" style="font-size:0.65rem">Past Due</span>':''}
                <span style="color:var(--warn);font-size:0.75rem">${r.expected_lamb_date?'Due '+r.expected_lamb_date:''} →</span>
              </div>
            </div>`;
          }).join('')}
          ${overdueTransfer.map(t => {
            const flush = (flushes||[]).find(f=>f.id===t.flush_id);
            const donor = allLambs.find(l=>l.id===(flush?.donor_id||t.donor_id));
            const recip = t.recipient_id ? allLambs.find(l=>l.id===t.recipient_id) : null;

            const checkDate = t.implant_date ? new Date(new Date(t.implant_date).getTime()+45*24*60*60*1000).toISOString().slice(0,10) : null;
            const isPastDue = checkDate && checkDate < today;
            return `<div class="pending-record-row" data-pastdue="${isPastDue}" style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid rgba(245,158,11,0.15);cursor:pointer" onclick="showLambAtTab('${flush?.donor_id||t.donor_id}','embryo')">

              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      <!-- FLUSH TYPE COMPARISON -->
      ${(ivfStats || moetStats) ? `
      <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Flush Type Comparison</div>

        ${flushTypeCard(moetStats, moetFlushes)}
        ${flushTypeCard(ivfStats, ivfFlushes)}

      <!-- TWO COLUMN LAYOUT -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">

        <!-- LEFT COLUMN: CONCEPTION -->
        <div>
          <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🐏 Conception Rate — By Ewe</div>
          <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem">${eweCards||'<div style="color:var(--text3);font-size:0.85rem">No breeding records in range</div>'}</div>

          <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🐏 Conception Rate — By Sire</div>
          <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem">${sireCards||'<div style="color:var(--text3);font-size:0.85rem">No breeding records in range</div>'}</div>
        </div>

        <!-- RIGHT COLUMN: RETENTION -->
        <div>
          <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Retention Rate — By Donor</div>
          <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem">${donorCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>

          <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Retention Rate — By Recipient</div>
          <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem">${recipCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>

          <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Retention Rate — By Sire</div>
          <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem">${flushSireCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>
        </div>

      </div>`;
  }

  window._buildAnalyticsHTML = buildAnalyticsHTML;
  document.getElementById('main-content').innerHTML = buildAnalyticsHTML(defaultFrom, today);
}

function setPendingFilter(mode) {
  document.getElementById('pending-filter-all')?.classList.toggle('active', mode==='all');
  document.getElementById('pending-filter-pastdue')?.classList.toggle('active', mode==='pastdue');
  document.querySelectorAll('.pending-record-row').forEach(row => {
    if (mode === 'all') row.style.display = '';
    else row.style.display = row.dataset.pastdue === 'true' ? '' : 'none';
  });
}

function applyAnalyticsFilter() {
  const from = document.getElementById('analytics-from')?.value || '';
  const to = document.getElementById('analytics-to')?.value || '';
  if (!window._buildAnalyticsHTML) return;
  const scrollPos = document.getElementById('main-content').scrollTop;
  document.getElementById('main-content').innerHTML = window._buildAnalyticsHTML(from, to);
  document.getElementById('main-content').scrollTop = scrollPos;
}

function showFlushTypeDetail(type, badgeClass, flushIds) {
  const flushList = (window._analyticsFlushes||[]).filter(f => flushIds.includes(f.id));
  const allTransfers = window._analyticsTransfers || [];
  const conceivedOutcomes = ['Confirmed Pregnant','Lamb Born'];

  const rows = flushList.sort((a,b) => b.flush_date.localeCompare(a.flush_date)).map(f => {
    const donor = allLambs.find(l => l.id === f.donor_id);
    const sire = f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : null;
    const sireName = sire ? sire.name+' 🧬' : (f.sire_text||'—');
    const fTransfers = allTransfers.filter(t => t.flush_id === f.id && ['Confirmed Pregnant','Lamb Born','Not Pregnant','Failed'].includes(t.outcome));
    const retained = fTransfers.filter(t => conceivedOutcomes.includes(t.outcome)).length;
    const rate = fTransfers.length ? Math.round(retained/fTransfers.length*100)+'%' : '—';
    const lambs = allTransfers.filter(t=>t.flush_id===f.id&&t.lamb_born).reduce((s,t)=>s+(t.lamb_count||0),0);

    return `<div style="padding:0.65rem 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="closeModal();showLamb('${f.donor_id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:600;font-size:0.88rem;color:var(--text)">${donor?.name||'Unknown'}${donor?.ear_tag?' <span style="color:var(--text3)">#'+donor.ear_tag+'</span>':''}</div>
          <div style="font-size:0.72rem;color:var(--text3);margin-top:0.2rem">📅 ${f.flush_date} · Sire: ${sireName}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:0.5rem">
          <div style="font-size:0.78rem;color:var(--text2)">${f.embryos_collected||0} collected · ${f.embryos_transferred||0} transferred</div>
          <div style="font-size:0.72rem;margin-top:0.15rem;display:flex;gap:0.4rem;justify-content:flex-end;flex-wrap:wrap">
            ${fTransfers.length>0?`<span class="badge badge-gray">${rate} retention</span>`:'<span style="color:var(--text3)">No transfers</span>'}
            ${lambs>0?`<span class="badge badge-green">🐑 ${lambs} born</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title"><span class="badge ${badgeClass}" style="margin-right:0.5rem">${type}</span> ${flushList.length} Flush${flushList.length!==1?'es':''}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="max-height:480px;overflow-y:auto">
      ${rows || '<div class="empty"><p>No flushes in this range</p></div>'}
    </div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`, true);
}

async function exportFlock() {
  const rows = allLambs.map(l => {
    const sire = l.sire_id ? allLambs.find(x=>x.id===l.sire_id) : null;
    const dam = l.dam_id ? allLambs.find(x=>x.id===l.dam_id) : null;
    return { Name:l.name, 'Ear Tag':l.ear_tag||'', 'Scrapie ID':l.scrapie_id||'', 'Genetic Code':l.genetic_code||'', DOB:l.dob||'', Sex:l.sex||'', Breed:l.breed||'', Role:l.role||'Standard', Status:l.status||'Active', 'Status Date':l.status_date||'', 'Status Note':l.status_note||'', Sire:sire?sire.name:(l.sire_text||''), Dam:dam?dam.name:(l.dam_text||''), Notes:l.notes||'' };
  });
  downloadXLSX(rows, 'flock-export');
  toast('Flock exported!');
}

async function exportHealth() {
  const { data } = await db.from('health_records').select('*, lambs(name,ear_tag)').order('date',{ascending:false});
  const rows = (data||[]).map(r=>({ Lamb:r.lambs?.name||'', 'Ear Tag':r.lambs?.ear_tag||'', Type:r.type, Product:r.product, 'Start Date':r.date, 'End Date':r.end_date||'', Dose:r.dose||'', Route:r.route||'', Notes:r.notes||'' }));
  downloadXLSX(rows, 'health-records');
  toast('Health records exported!');
}

async function exportWeights() {
  const { data } = await db.from('weight_records').select('*, lambs(name,ear_tag)').order('date',{ascending:false});
  const rows = (data||[]).map(r=>({ Lamb:r.lambs?.name||'', 'Ear Tag':r.lambs?.ear_tag||'', 'Weight (lbs)':r.weight_lbs, Date:r.date, Notes:r.notes||'' }));
  downloadXLSX(rows, 'weight-records');
  toast('Weight records exported!');
}

async function exportBreeding() {
  const { data } = await db.from('breeding_records').select('*, lambs(name,ear_tag)').order('breeding_date',{ascending:false});
  const rows = (data||[]).map(r=>{
    const sire = r.sire_id ? allLambs.find(l=>l.id===r.sire_id) : (r.ai_sire_id ? allAiRams.find(x=>x.id===r.ai_sire_id) : null);
    return { Lamb:r.lambs?.name||'', 'Ear Tag':r.lambs?.ear_tag||'', Sire:sire?sire.name+(r.ai_sire_id?' (AI)':''):(r.sire_text||''), 'Breeding Date':r.breeding_date||'', 'Expected Lamb Date':r.expected_lamb_date||'', 'Outcome':r.outcome||'', Notes:r.notes||'' };
  });
  downloadXLSX(rows, 'breeding-records');
  toast('Breeding records exported!');
}

function downloadXLSX(rows, filename) {
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, `${filename}-${new Date().toISOString().slice(0,10)}.xlsx`);
}
