async function openUseInventory(id) {
  const { data: item } = await db.from('embryo_inventory').select('*').eq('id', id).single();
  if (!item) return;
  const donor = allLambs.find(l => l.id === item.donor_id);
  const sire = item.ai_sire_id ? allAiRams.find(r => r.id === item.ai_sire_id) : item.sire_id ? allLambs.find(l => l.id === item.sire_id) : null;
  const ewes = allLambs.filter(l => l.sex==='Ewe' && l.status==='Active');
  const eweOpts = ewes.map(l=>`<option value="${l.id}">${l.name}${l.ear_tag?' #'+l.ear_tag:''}</option>`).join('');
  showModal(`
    <div class="modal-header"><div class="modal-title">🔬 Use Frozen Embryos</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:0.65rem;margin-bottom:0.75rem;font-size:0.85rem">
      <strong>${donor?.name||'Unknown'}</strong> × ${sire?sire.name+(item.ai_sire_id?' 🧬':''):'—'}
      <span style="margin-left:0.75rem;color:#1d4ed8;font-weight:700">${item.quantity} available</span>
    </div>
    <div class="row">
      <div class="field"><label>Recipient</label><select id="ui-recip"><option value="">— System lamb —</option>${eweOpts}</select></div>
      <div class="field"><label>External Recipient</label><input id="ui-recip-text" placeholder="e.g. Schoenfeld Farm 1"></div>
    </div>
    <div class="row">
      <div class="field"><label>Transfer Date</label><input type="date" id="ui-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label># Embryos to Transfer</label><input type="number" id="ui-qty" min="1" max="${item.quantity}" value="1"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmUseInventory('${id}','${item.quantity}','${item.flush_id||''}','${item.donor_id}')">Create Transfer Record</button>
    </div>`);
}

async function confirmUseInventory(id, available, flushId, donorId) {
  const recipId = document.getElementById('ui-recip')?.value || null;
  const recipText = document.getElementById('ui-recip-text')?.value?.trim() || null;
  const qty = parseInt(document.getElementById('ui-qty')?.value) || 1;
  const date = document.getElementById('ui-date')?.value;
  if (!recipId && !recipText) { toast('Select or enter a recipient'); return; }
  if (qty > parseInt(available)) { toast(`Only ${available} embryos available`); return; }
  // Create transfer record
  await db.from('embryo_transfers').insert({
    recipient_id: recipId||null, recip_text: recipText||null,
    flush_id: flushId||null, donor_id: donorId||null,
    implant_date: date, outcome: 'Pending', num_transferred: qty,
  });
  // Deduct from inventory
  const newQty = parseInt(available) - qty;
  if (newQty <= 0) {
    await db.from('embryo_inventory').delete().eq('id', id);
    toast(`Transfer created — inventory lot depleted`);
  } else {
    await db.from('embryo_inventory').update({ quantity: newQty }).eq('id', id);
    toast(`Transfer created — ${newQty} embryos remaining`);
  }
  closeModal();
  renderEmbryoInventory();
}

// ── PLANNING PAGE ─────────────────────────────────────
async function renderPlanning() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  const [{ data: groups }, { data: protocols }, { data: steps }, { data: members }] = await Promise.all([
    db.from('breeding_groups').select('*').order('target_date', {ascending:true}),
    db.from('breeding_protocols').select('*').order('name', {ascending:true}),
    db.from('protocol_steps').select('*').order('day_offset', {ascending:false}),
    db.from('breeding_group_members').select('*'),
  ]);
  window._planGroups = groups || [];
  window._planProtocols = protocols || [];
  window._planSteps = steps || [];
  window._planMembers = members || [];
  window._planTab = window._planTab || 'groups';
  renderPlanningHTML();
}

function renderPlanningHTML() {
  const allGroups = window._planGroups || [];
  const protocols = window._planProtocols || [];
  const steps = window._planSteps || [];
  const members = window._planMembers || [];
  const tab = window._planTab || 'groups';
  const hideComplete = window._planHideComplete !== false; // default true

  // Filter groups
  const groups = hideComplete ? allGroups.filter(g => g.status !== 'Complete' && g.status !== 'Cancelled') : allGroups;
  const hiddenCount = allGroups.length - groups.length;

  const statusColors = { Planned:'#eff6ff:#1d4ed8', Active:'#dcfce7:#15803d', Complete:'#f1f5f9:#475569', Cancelled:'#fef2f2:#b91c1c' };
  const _today = new Date().toISOString().slice(0,10);

  function renderStepRow(g, s, isRecip) {
    const stepDate = new Date(new Date(g.target_date + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10);
    const isTarget = s.day_offset === 0;
    const isPast = stepDate < _today;
    const rowBg = isTarget ? 'var(--accent-glow)' : isRecip ? (isPast?'#e0eeff':'#f0f7ff') : (isPast?'var(--surface2)':'transparent');
    const nameColor = isPast ? 'var(--text3)' : 'var(--text)';
    const dateColor = isTarget ? 'var(--accent)' : isPast ? 'var(--text3)' : (isRecip ? '#1d4ed8' : 'var(--text2)');
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.2rem 0.5rem;border-radius:0.25rem;background:${rowBg}">
      <div style="font-size:0.78rem;color:${nameColor};font-weight:${isTarget?700:400};text-decoration:${isPast&&!isTarget?'line-through':'none'}"><span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:${isRecip?'#1d4ed8':'var(--accent)'};margin-right:0.3rem">${isRecip?'Recip':'Donor'}</span>${s.step_name} <span style="color:var(--text3);font-size:0.7rem">${s.time_of_day||'AM'}</span></div>
      <div style="font-size:0.78rem;font-weight:600;color:${dateColor}">${stepDate}</div>
    </div>`;
  }

  // Groups HTML
  const groupsHtml = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem">
      <div style="display:flex;align-items:center;gap:0.5rem">
        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em">Groups</div>
        <label style="display:inline-flex;align-items:center;gap:0.3rem;font-size:0.78rem;color:var(--text3);cursor:pointer">
          <input type="checkbox" ${hideComplete?'checked':''} onchange="window._planHideComplete=this.checked;renderPlanningHTML()" style="accent-color:var(--accent)">
          Hide Complete/Cancelled
        </label>
        ${hiddenCount>0&&hideComplete?`<span style="font-size:0.75rem;color:var(--text3)">(${hiddenCount} hidden)</span>`:''}
      </div>
      <button class="btn btn-primary btn-sm" onclick="openNewGroupInline()">+ New Group</button>
    </div>
    <div id="plan-new-group-form" style="display:none"></div>
    ${groups.length === 0 ? `<div class="empty"><div class="empty-icon">📋</div><h3>${allGroups.length>0?'All groups complete':'No groups yet'}</h3><p>${allGroups.length>0?'Uncheck "Hide Complete" to view them':'Create a group to start planning'}</p></div>` :
      groups.map(g => {
        const prot = protocols.find(p => p.id === g.protocol_id);
        const recipProt = g.recip_protocol_id ? protocols.find(p => p.id === g.recip_protocol_id) : null;
        const groupSteps = prot ? steps.filter(s => s.protocol_id === prot.id).sort((a,b) => b.day_offset - a.day_offset) : [];
        const recipSteps = recipProt ? steps.filter(s => s.protocol_id === recipProt.id).sort((a,b) => b.day_offset - a.day_offset) : [];
        const groupMembers = members.filter(m => m.group_id === g.id);
        const donors = groupMembers.filter(m => (m.role||'donor') === 'donor');
        const recips = groupMembers.filter(m => m.role === 'recip');
        const [bg, col] = (statusColors[g.status]||'#f1f5f9:#475569').split(':');
        const isComplete = g.status === 'Complete' || g.status === 'Cancelled';

        const scheduleRows = g.target_date && (groupSteps.length > 0 || recipSteps.length > 0) ? (() => {
          const all = [
            ...groupSteps.map(s=>({...s,_isRecip:false})),
            ...recipSteps.map(s=>({...s,_isRecip:true}))
          ].sort((a,b) => b.day_offset - a.day_offset);
          return all.map(s => renderStepRow(g, s, s._isRecip)).join('');
        })() : '';
        const donorNames = donors.map(m => {
          const lamb = allLambs.find(l => l.id === m.lamb_id);
          const sire = m.ai_sire_id ? allAiRams.find(r => r.id === m.ai_sire_id) : null;
          return `<span style="display:inline-flex;align-items:center;gap:0.25rem;background:var(--surface2);border:1px solid var(--border);border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.75rem;color:var(--text2)">${lamb?.name||'?'}<span style="color:var(--text3)">× ${sire?.name||m.sire_text||'?'}</span></span>`;
        }).join('');
        const recipNames = recips.map(m => {
          const lamb = m.lamb_id ? allLambs.find(l => l.id === m.lamb_id) : null;
          const name = lamb ? lamb.name : (m.recip_text||'?');
          return `<span style="display:inline-flex;align-items:center;gap:0.25rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.75rem;color:#1d4ed8">${name}</span>`;
        }).join('');
        const memberNames = donorNames + (recipNames ? `<span style="font-size:0.72rem;color:var(--text3);align-self:center"> | Recips: </span>${recipNames}` : '');
        return `<div class="card" style="padding:1rem;margin-bottom:0.75rem;${isComplete?'opacity:0.7':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;gap:0.5rem">
            <div>
              <div style="font-size:1rem;font-weight:700;color:var(--text)">${g.name}</div>
              <div style="display:flex;gap:0.35rem;margin-top:0.3rem;flex-wrap:wrap;align-items:center">
                <span class="badge ${g.type==='flush'?'badge-purple':'badge-green'}">${g.type==='flush'?'🔬 Flush':'🐏 Breeding'}</span>
                <span style="background:${bg};color:${col};padding:0.15rem 0.5rem;border-radius:1rem;font-size:0.72rem;font-weight:600">${g.status}</span>
                ${g.target_date?`<span class="badge badge-blue">🎯 ${g.target_date}</span>`:''}
                ${prot?`<span class="badge badge-gray">${prot.name}</span>`:''}
                ${recipProt?`<span class="badge badge-gray">Recip: ${recipProt.name}</span>`:''}
              </div>
            </div>
            <div style="display:flex;gap:0.35rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
              ${!isComplete?`
              <button class="btn btn-secondary btn-sm" onclick="cancelPlan('${g.id}')" style="color:var(--danger);border-color:var(--danger)">✕ Cancel</button>
              <button class="btn btn-secondary btn-sm" onclick="openCompletePlan('${g.id}')" style="color:var(--accent);border-color:var(--accent)">✅ Complete Plan</button>`:''}
              <button class="btn-icon btn-sm" onclick="openEditGroupPage('${g.id}')" title="Edit">✏️</button>
              <button class="btn-icon btn-sm" onclick="openManageGroupMembers('${g.id}')" title="Members">👥</button>
              <button class="btn-icon btn-sm" onclick="deleteGroupPage('${g.id}')" style="color:var(--danger)" title="Delete">🗑</button>
            </div>
          </div>
          ${memberNames ? `<div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.65rem">${memberNames}</div>` : `<div style="font-size:0.78rem;color:var(--text3);margin-bottom:0.65rem">No members yet — <a href="#" onclick="event.preventDefault();openManageGroupMembers('${g.id}')" style="color:var(--accent)">add members</a></div>`}
          ${scheduleRows ? `<div style="border-top:1px solid var(--border);padding-top:0.5rem">${scheduleRows}</div>` : g.target_date && !prot ? `<div style="font-size:0.75rem;color:var(--text3);border-top:1px solid var(--border);padding-top:0.5rem">No protocol assigned</div>` : ''}
          ${g.notes?`<div style="font-size:0.78rem;color:var(--text3);margin-top:0.5rem;font-style:italic">${g.notes}</div>`:''}
        </div>`;
      }).join('')}`;

  // Protocols HTML
  const protocolsHtml = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em">Protocol Library</div>
      <button class="btn btn-primary btn-sm" onclick="openNewProtocolInline()">+ New Protocol</button>
    </div>
    <div id="plan-new-protocol-form" style="display:none"></div>
    ${protocols.length === 0 ? `<div class="empty"><div class="empty-icon">🔬</div><h3>No protocols yet</h3><p>Build reusable step templates to assign to groups</p></div>` :
      protocols.map(p => {
        const protSteps = steps.filter(s => s.protocol_id === p.id).sort((a,b) => b.day_offset - a.day_offset);
        return `<div class="card" style="padding:1rem;margin-bottom:0.75rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
            <div>
              <div style="font-size:0.95rem;font-weight:700;color:var(--text)">${p.name}</div>
              <span class="badge ${p.type==='flush'?'badge-purple':'badge-green'}" style="margin-top:0.2rem">${p.type==='flush'?'🔬 Flush':'🐏 Breeding'}</span>
            </div>
            <div style="display:flex;gap:0.35rem">
              <button class="btn-icon btn-sm" onclick="openEditProtocol('${p.id}')">✏️</button>
              <button class="btn-icon btn-sm" onclick="deleteProtocolPage('${p.id}')" style="color:var(--danger)">🗑</button>
            </div>
          </div>
          ${protSteps.length > 0 ? protSteps.map(s => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:0.2rem 0;border-bottom:1px solid var(--border)">
              <div style="font-size:0.82rem;color:var(--text)">${s.step_name} <span style="font-size:0.72rem;color:var(--text3)">${s.time_of_day||'AM'}</span></div>
              <div style="font-size:0.78rem;color:var(--text3)">${s.day_offset===0?'<span style="color:var(--accent);font-weight:600">Target Day</span>':s.day_offset+' days before'}</div>
            </div>`).join('') : `<div style="font-size:0.78rem;color:var(--text3)">No steps yet</div>`}
          ${p.notes?`<div style="font-size:0.75rem;color:var(--text3);margin-top:0.4rem;font-style:italic">${p.notes}</div>`:''}
        </div>`;
      }).join('')}`;

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem">
      <div style="font-size:1.1rem;font-weight:700;color:var(--text)">📋 Breeding Planning</div>
    </div>
    <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem">
      <button class="tab ${tab==='groups'?'active':''}" onclick="window._planTab='groups';renderPlanningHTML()">Groups (${allGroups.length})</button>
      <button class="tab ${tab==='protocols'?'active':''}" onclick="window._planTab='protocols';renderPlanningHTML()">Protocol Library (${protocols.length})</button>

    <div id="plan-content">
      ${tab==='groups' ? groupsHtml : protocolsHtml}

  document.getElementById('main-content').innerHTML = html;
}

async function cancelPlan(groupId) {
  const g = (window._planGroups||[]).find(x => x.id === groupId);
  if (!g) return;
  // Use modal confirm instead of browser confirm (blocked on file:// URLs)
  showModal(`
    <div class="modal-header"><div class="modal-title">✕ Cancel Plan</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="padding:0.5rem 0 1rem;color:var(--text)">Cancel <strong>${g.name}</strong>? It will stay visible with Cancelled status and can be restored by editing it.</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Keep Plan</button>
      <button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger)" onclick="confirmCancelPlan('${groupId}')">Yes, Cancel Plan</button>
    </div>`);
}

async function confirmCancelPlan(groupId) {
  await db.from('breeding_groups').update({ status: 'Cancelled' }).eq('id', groupId);
  window._planGroups = (window._planGroups||[]).map(g => g.id === groupId ? {...g, status:'Cancelled'} : g);
  toast('Plan cancelled');
  closeModal();
  renderPlanningHTML();
}

async function openCompletePlan(groupId) {
  const g = (window._planGroups||[]).find(x => x.id === groupId);
  const groupMembers = (window._planMembers||[]).filter(m => m.group_id === groupId);
  if (!g) return;

  const isFlush = g.type === 'flush';
  const donors = groupMembers.filter(m => (m.role||'donor') === 'donor');
  const recips = isFlush ? groupMembers.filter(m => m.role === 'recip') : [];

  if (donors.length === 0) { toast('Add donors to this group first'); return; }

  const targetDate = g.target_date || new Date().toISOString().slice(0,10);
  const expectedLambDate = !isFlush ? new Date(new Date(targetDate + 'T12:00:00').getTime() + 147*24*60*60*1000).toISOString().slice(0,10) : null;

  window._cpIsFlush = isFlush;
  window._cpTargetDate = targetDate;
  window._cpExpectedDate = expectedLambDate;

  const sireOpts = sireOptions('');
  const ewes = allLambs.filter(l => l.sex === 'Ewe' && l.status === 'Active');
  const eweOpts = ewes.map(l => `<option value="${l.id}">${l.name}${l.ear_tag?' #'+l.ear_tag:''}</option>`).join('');

  function buildRow(i, lambId, aiSireId, sireText, rowType) {
    const lamb = allLambs.find(l => l.id === lambId);
    const sireSelectId = `cp-sire-${i}`;
    const sireVal = aiSireId ? `ai:${aiSireId}` : '';
    const bgColor = rowType==='recip' ? 'background:#eff6ff' : '';

    // Build donor options for recip rows
    const donorOpts = donors.map((d, di) => {
      const dlamb = allLambs.find(l => l.id === d.lamb_id);
      const dsire = d.ai_sire_id ? allAiRams.find(r => r.id === d.ai_sire_id) : null;
      return `<option value="${di}">${dlamb?.name||'?'} × ${dsire?.name||d.sire_text||'?'}</option>`;
    }).join('');

    return `<tr id="cp-row-${i}" data-type="${rowType||'donor'}" style="border-bottom:1px solid var(--border);${bgColor}">
      <td style="padding:0.5rem">
        ${rowType==='recip' ? `<span style="font-size:0.68rem;color:#1d4ed8;font-weight:600;text-transform:uppercase">🐄 Recip</span><br>` : `<span style="font-size:0.68rem;color:var(--accent);font-weight:600;text-transform:uppercase">🐑 Donor</span><br>`}
        ${lamb ? `<div style="font-weight:600;font-size:0.84rem;color:var(--text)">${lamb.name}</div><div style="font-size:0.72rem;color:var(--text3)">${lamb.ear_tag?'#'+lamb.ear_tag:''}</div>`
               : (rowType==='recip'

let _cpNextRow = 0;
function validateCpEmbryos() {
  const tbody = document.getElementById('cp-tbody');
  if (!tbody) return;

  const donorRows = Array.from(tbody.querySelectorAll('tr[data-type="donor"]'));
  const recipRows = Array.from(tbody.querySelectorAll('tr[data-type="recip"]'));

  // Build maps: donorIdx -> collected, transferred, frozen
  const collectedByDonor = {}, transferredByDonor = {}, frozenByDonor = {};
  donorRows.forEach((row, di) => {
    const rowId = row.id.replace('cp-row-','');
    collectedByDonor[di] = parseInt(document.getElementById(`cp-collected-${rowId}`)?.value) || 0;
    transferredByDonor[di] = parseInt(document.getElementById(`cp-transferred-${rowId}`)?.value) || 0;
    frozenByDonor[di] = parseInt(document.getElementById(`cp-frozen-${rowId}`)?.value) || 0;
  });

  // Sum recip embryos assigned per donor
  const assignedByDonor = {};
  recipRows.forEach(row => {
    const rowId = row.id.replace('cp-row-','');
    const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
    const embryos = parseInt(document.getElementById(`cp-embryos-${rowId}`)?.value) || 0;
    if (donorIdx !== '' && donorIdx !== null && donorIdx !== undefined) {
      const di = parseInt(donorIdx);
      assignedByDonor[di] = (assignedByDonor[di] || 0) + embryos;
    }
  });

  // Validate each donor row
  donorRows.forEach((row, di) => {
    const rowId = row.id.replace('cp-row-','');
    const collected = collectedByDonor[di] || 0;
    const transferred = transferredByDonor[di] || 0;
    const frozen = frozenByDonor[di] || 0;
    const assigned = assignedByDonor[di] || 0;
    const accounted = transferred + frozen;
    const unaccounted = collected - accounted;
    const balanceEl = document.getElementById(`cp-balance-${rowId}`);

    // Balance display
    if (balanceEl && collected > 0) {
      if (accounted > collected) {
        balanceEl.style.color = '#dc2626';
        balanceEl.textContent = `⚠️ ${accounted} accounted > ${collected} collected`;
      } else if (unaccounted > 0) {
        balanceEl.style.color = '#d97706';
        balanceEl.textContent = `⚠️ ${unaccounted} embryo${unaccounted!==1?'s':''} unaccounted for`;
      } else if (accounted === collected) {
        balanceEl.style.color = '#16a34a';
        balanceEl.textContent = `✓ All ${collected} accounted (${transferred} transferred, ${frozen} frozen)`;
      }
    } else if (balanceEl) {
      balanceEl.textContent = '';
    }

    // Color borders
    const collectedEl = document.getElementById(`cp-collected-${rowId}`);
    const transferredEl = document.getElementById(`cp-transferred-${rowId}`);
    const frozenEl = document.getElementById(`cp-frozen-${rowId}`);
    const isOk = collected > 0 && accounted === collected;
    const isOver = collected > 0 && accounted > collected;
    if (collectedEl) collectedEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : '';
    if (transferredEl) transferredEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : '';
    if (frozenEl) frozenEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : (frozen > 0 ? '#3b82f6' : '');

    // Recip assigned warning
    const assignWarnId = `cp-collected-warn-${rowId}`;
    let assignWarnEl = document.getElementById(assignWarnId);
    if (collected > 0 && assigned > collected) {
      if (!assignWarnEl) {
        assignWarnEl = document.createElement('div');
        assignWarnEl.id = assignWarnId;
        assignWarnEl.style.cssText = 'font-size:0.68rem;color:#dc2626;font-weight:600;margin-top:0.15rem';
        collectedEl?.parentElement?.appendChild(assignWarnEl);
      }
      assignWarnEl.textContent = `⚠️ ${assigned} recips > ${collected} collected`;
    } else {
      if (assignWarnEl) assignWarnEl.remove();
    }
  });

  // Validate recip rows
  recipRows.forEach(row => {
    const rowId = row.id.replace('cp-row-','');
    const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
    const embryosEl = document.getElementById(`cp-embryos-${rowId}`);
    const embryos = parseInt(embryosEl?.value) || 0;
    let warnEl = document.getElementById(`cp-embryos-warn-${rowId}`);
    if (donorIdx !== '' && donorIdx !== undefined) {
      const di = parseInt(donorIdx);
      const collected = collectedByDonor[di] || 0;
      const assigned = assignedByDonor[di] || 0;
      if (collected > 0 && assigned > collected) {
        if (!warnEl) {
          warnEl = document.createElement('div');
          warnEl.id = `cp-embryos-warn-${rowId}`;
          warnEl.style.cssText = 'font-size:0.68rem;color:#dc2626;font-weight:600;margin-top:0.1rem';
          embryosEl?.parentElement?.appendChild(warnEl);
        }
        warnEl.textContent = `Over by ${assigned - collected}`;
        if (embryosEl) embryosEl.style.borderColor = '#dc2626';
      } else {
        if (warnEl) warnEl.remove();
        if (embryosEl) embryosEl.style.borderColor = collected > 0 ? '#16a34a' : '';
      }
    }
  });
}

async function confirmCompletePlanDom(groupId) {
  const isFlush = window._cpIsFlush;
  const tbody = document.getElementById('cp-tbody');
  if (!tbody) return;

  const rows = Array.from(tbody.querySelectorAll('tr'));
  const flushInserts = [];
  const breedInserts = [];
  const transferInserts = [];

  // First pass: collect donor rows and their indices for lookup
  const donorRowIds = [];
  for (const row of rows) {
    if ((row.dataset.type||'donor') === 'donor') donorRowIds.push(row.id.replace('cp-row-',''));
  }

  for (const row of rows) {
    const rowId = row.id.replace('cp-row-','');
    const include = document.getElementById(`cp-include-${rowId}`)?.checked;
    if (!include) continue;
    const rowType = row.dataset.type || 'donor';

    if (rowType === 'recip') {
      const lambId = document.getElementById(`cp-lamb-id-${rowId}`)?.value ||
                     document.getElementById(`cp-lamb-${rowId}`)?.value || null;
      const recipText = document.getElementById(`cp-lamb-name-${rowId}`)?.value?.trim() || null;
      if (!lambId && !recipText) continue;
      const transferDate = document.getElementById(`cp-transfer-date-${rowId}`)?.value || window._cpTargetDate;
      const numEmbryos = parseInt(document.getElementById(`cp-embryos-${rowId}`)?.value) || 1;
      const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
      // Store donor index — will resolve to flush ID after flush creation
      transferInserts.push({ recipient_id: lambId||null, recip_text: recipText||null, implant_date: transferDate, outcome: 'Pending', num_transferred: numEmbryos, _donorIdx: donorIdx !== '' ? parseInt(donorIdx) : null });
    } else {
      const lambId = document.getElementById(`cp-lamb-id-${rowId}`)?.value ||
                     document.getElementById(`cp-lamb-${rowId}`)?.value;
      if (!lambId) continue;
      const sireVal = document.getElementById(`cp-sire-${rowId}`)?.value || '';
      const { sire_id, ai_sire_id } = parseSireSelection(sireVal);
      const date = document.getElementById(`cp-date-${rowId}`)?.value;
      if (isFlush) {
        flushInserts.push({ donor_id: lambId, ai_sire_id: ai_sire_id||null, sire_id: sire_id||null,
          flush_date: date, flush_type: document.getElementById(`cp-type-${rowId}`)?.value||'MOET',
          embryos_collected: parseInt(document.getElementById(`cp-collected-${rowId}`)?.value)||0,
          embryos_transferred: parseInt(document.getElementById(`cp-transferred-${rowId}`)?.value)||null,
          _frozen: parseInt(document.getElementById(`cp-frozen-${rowId}`)?.value)||0 });
      } else {
        const dueDate = document.getElementById(`cp-due-${rowId}`)?.value;
        breedInserts.push({ lamb_id: lambId, ai_sire_id: ai_sire_id||null, sire_id: sire_id||null,
          breeding_date: date, expected_lamb_date: dueDate||null, outcome: 'Pending' });
      }
    }
  }

  // Check for over-assignment
  const tbody2 = document.getElementById('cp-tbody');
  const donorRows2 = Array.from((tbody2||document).querySelectorAll('tr[data-type="donor"]'));
  const collectedMap = {};
  donorRows2.forEach((row, di) => {
    const rid = row.id.replace('cp-row-','');
    collectedMap[di] = parseInt(document.getElementById('cp-collected-'+rid)?.value)||0;
  });
  const assignedMap = {};
  Array.from((tbody2||document).querySelectorAll('tr[data-type="recip"]')).forEach(row => {
    const rid = row.id.replace('cp-row-','');
    const di = document.getElementById('cp-donor-'+rid)?.value;
    const emb = parseInt(document.getElementById('cp-embryos-'+rid)?.value)||0;
    if (di!==''&&di!==undefined) assignedMap[parseInt(di)] = (assignedMap[parseInt(di)]||0) + emb;
  });
  const overAssigned = Object.keys(collectedMap).some(di => collectedMap[di]>0 && (assignedMap[di]||0) > collectedMap[di]);
  if (overAssigned) { toast('⚠️ Some donors have more embryos assigned to recips than were collected — please fix before saving'); return; }

  if (flushInserts.length === 0 && breedInserts.length === 0) { toast('No records to create'); return; }

  // Insert flush records and capture IDs for transfer linking
  let totalCreated = 0;
  const createdFlushIds = []; // index matches flushInserts order

  if (flushInserts.length > 0) {
    for (const flush of flushInserts) {
      const { data: f } = await db.from('embryo_flushes').insert(flush).select().single();
      createdFlushIds.push(f?.id || null);
      totalCreated++;
      // Create embryo inventory record if frozen > 0
      if (f?.id && flush._frozen > 0) {
        await db.from('embryo_inventory').insert({
          flush_id: f.id,
          donor_id: flush.donor_id,
          ai_sire_id: flush.ai_sire_id||null,
          sire_id: flush.sire_id||null,
          quantity: flush._frozen,
          date_frozen: flush.flush_date,
        });
      }
    }
    // Create transfers linked to correct donor flush
    for (const t of transferInserts) {
      const flushId = t._donorIdx !== null && createdFlushIds[t._donorIdx] ? createdFlushIds[t._donorIdx] : (createdFlushIds[0]||null);
      const donorId = flushId ? flushInserts[t._donorIdx ?? 0]?.donor_id : null;
      const { _donorIdx, recip_text, ...rest } = t;
      await db.from('embryo_transfers').insert({ ...rest, flush_id: flushId, donor_id: donorId, recip_text: recip_text||null });
      totalCreated++;
    }
  }
  if (breedInserts.length > 0) {
    await Promise.all(breedInserts.map(b => db.from('breeding_records').insert(b)));
    totalCreated += breedInserts.length;
  }

  await db.from('breeding_groups').update({ status: 'Complete' }).eq('id', groupId);
  window._planGroups = (window._planGroups||[]).map(g => g.id === groupId ? {...g, status:'Complete'} : g);

  toast(`${totalCreated} record${totalCreated!==1?'s':''} created!`);
  closeModal();
  renderPlanningHTML();
  setTimeout(() => { if (isFlush) showPage('flushes'); else showPage('breeding'); }, 1200);
}

  const name = document.getElementById('np-name')?.value?.trim();
  if (!name) { toast('Protocol name required'); return; }
  const type = document.getElementById('np-type')?.value || 'flush';
  const { data: prot } = await db.from('breeding_protocols').insert({ name, type }).select().single();
  if (!prot?.id) { toast('Error saving protocol'); return; }
  // Save steps
  const stepRows = document.querySelectorAll('#np-steps > div');
  const steps = [];
  stepRows.forEach((row, i) => {
    const stepName = row.querySelector('.ps-name')?.value?.trim();
    const dayOffset = parseInt(row.querySelector('.ps-day')?.value) || 0;
    const timeOfDay = row.querySelector('.ps-time')?.value || 'AM';
    if (stepName) steps.push({ protocol_id: prot.id, step_name: stepName, day_offset: dayOffset, time_of_day: timeOfDay, sort_order: i });
  });
  if (steps.length > 0) await db.from('protocol_steps').insert(steps);
  toast(`Protocol "${name}" saved with ${steps.length} steps`);
  openPlanningManager();
}


function buildScheduleRows(steps, targetDate, label, color) {
  if (!steps || steps.length === 0) return '';
  const sorted = steps.slice().sort((a,b) => b.day_offset - a.day_offset);
  const rows = sorted.map(s => {
    const stepDate = new Date(new Date(targetDate + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10);
    const isTarget = s.day_offset === 0;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.2rem 0.5rem;border-radius:0.25rem;background:${isTarget?'var(--accent-glow)':'transparent'}">
      <div style="font-size:0.78rem;color:var(--text);font-weight:${isTarget?700:400}">${s.step_name} <span style="color:var(--text3);font-size:0.7rem">${s.time_of_day||'AM'}</span></div>
      <div style="font-size:0.78rem;font-weight:600;color:${isTarget?'var(--accent)':'var(--text2)'}">${stepDate}</div>
    </div>`;
  }).join('');
  return `<div style="background:${color||'var(--surface2)'};border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem;margin-bottom:0.35rem">
    <div style="font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.3rem">${label}</div>
    ${rows}
  </div>`;
}

async function addGroupMember(groupId, role) {
  role = role || 'donor';
  if (role === 'recip') {
    const lambId = document.getElementById('gm-recip-lamb')?.value || null;
    const recipText = document.getElementById('gm-recip-text')?.value?.trim() || null;
    if (!lambId && !recipText) { toast('Select a recipient or enter a name'); return; }
    await db.from('breeding_group_members').insert({ group_id: groupId, lamb_id: lambId||null, recip_text: recipText||null, role: 'recip' });
    toast('Recipient added');
  } else {
    const lambId = document.getElementById('gm-lamb')?.value;
    if (!lambId) { toast('Select a female'); return; }
    const { sire_id, ai_sire_id } = parseSireSelection(document.getElementById('gm-sire')?.value || '');
    const sireText = document.getElementById('gm-sire-text')?.value?.trim() || null;
    await db.from('breeding_group_members').insert({ group_id: groupId, lamb_id: lambId, ai_sire_id: ai_sire_id||null, sire_text: sireText, role: 'donor' });
    toast('Donor added');
  }
  if (currentPage === 'planning') { await renderPlanning(); openManageGroupMembers(groupId, role==='recip'?'recips':'donors'); }
  else openManageGroupMembers(groupId, role==='recip'?'recips':'donors');
}

  const groupSteps = g.protocol_id ? (steps||[]).filter(s => s.protocol_id === g.protocol_id).sort((a,b) => a.day_offset - b.day_offset) : [];
  const stepRows = groupSteps.map(s => {
    const stepDate = g.target_date ? new Date(new Date(g.target_date + 'T12:00:00').getTime() - s.day_offset*24*60*60*1000).toISOString().slice(0,10) : null;
    return `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border)">
      <div style="font-size:0.85rem;color:var(--text)">${s.step_name} <span style="color:var(--text3);font-size:0.78rem">${s.day_offset===0?'Target Day':s.day_offset+' days before'} · ${s.time_of_day||'AM'}</span></div>
      <div style="font-size:0.82rem;font-weight:600;color:var(--accent)">${stepDate||'—'}</div>
    </div>`;
  }).join('');
  const memberRows = (members||[]).map(m => {
    const lamb = allLambs.find(l => l.id === m.lamb_id);
    const sire = m.ai_sire_id ? allAiRams.find(r => r.id === m.ai_sire_id) : null;
    return `<div style="font-size:0.85rem;padding:0.3rem 0;border-bottom:1px solid var(--border)">
      <span style="font-weight:600;color:var(--text)">${lamb?.name||'Unknown'}</span> <span style="color:var(--text3)">× ${sire?sire.name+' 🧬':(m.sire_text||'—')}</span>
    </div>`;
  }).join('') || `<div style="color:var(--text3);font-size:0.82rem">No members</div>`;
  showModal(`
    <div class="modal-header"><div class="modal-title">📋 ${g.name}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
      <span class="badge ${g.type==='flush'?'badge-purple':'badge-green'}">${g.type==='flush'?'🔬 Flush':'🐏 Breeding'}</span>
      <span class="badge badge-gray">${g.status}</span>
      ${g.target_date?`<span class="badge badge-blue">Target: ${g.target_date}</span>`:''}
    </div>
    ${stepRows ? `<div style="font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.35rem">Protocol Steps</div>${stepRows}<div style="margin-bottom:0.75rem"></div>` : ''}
    <div style="font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.35rem">Members (${members?.length||0})</div>
    ${memberRows}
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="closeModal();openManageGroupMembers('${groupId}')">Manage Members</button>
    </div>`);
}

// ── CALENDAR ──────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calFilter = 'all';    // 'all' | 'breeding' | 'lambing' | 'treatment'
let calLambFilter = '';   // '' = whole flock, or lamb id
let calEvents = [];

async function renderCalendar() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  await loadCalendarEvents();
  drawCalendar();
}

async function loadCalendarEvents() {
  calEvents = [];

  // Breeding dates & expected lamb dates
  const { data: breeding } = await db.from('breeding_records').select('*');
  (breeding||[]).forEach(r => {
    if (r.breeding_date) calEvents.push({ date: r.breeding_date, type: 'breeding', label: `🐏 Bred`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
    if (r.expected_lamb_date) calEvents.push({ date: r.expected_lamb_date, type: 'lambing', label: `📅 Due`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
    if (r.actual_lamb_date) calEvents.push({ date: r.actual_lamb_date, type: 'lambing', label: `🐑 Lambed`, lamb_id: r.lamb_id, sire_id: r.sire_id, ai_sire_id: r.ai_sire_id, sire_text: r.sire_text });
  });

  // Health records (treatments)
  const { data: health } = await db.from('health_records').select('*');
  (health||[]).forEach(r => {
    calEvents.push({ date: r.date, type: 'treatment', label: r.type === 'vaccine' ? `💉 ${r.product}` : `💊 ${r.product}`, lamb_id: r.lamb_id });
  });

  // Embryo flushes
  const { data: flushes } = await db.from('embryo_flushes').select('*');
  (flushes||[]).forEach(f => {
    if (f.flush_date) {
      const sire = f.sire_id ? allLambs.find(l=>l.id===f.sire_id) : (f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : null);
      const sireName = sire ? sire.name+(f.ai_sire_id?' 🧬':'') : (f.sire_text||'');
      calEvents.push({ date: f.flush_date, type: 'embryo', label: `🔬 Flush`, lamb_id: f.donor_id, sire_text: sireName, extra: `${f.embryos_collected||0} embryos` });
    }
  });

  // Embryo transfers
  const { data: transfers } = await db.from('embryo_transfers').select('*');
  (transfers||[]).forEach(t => {
    if (t.implant_date) {
      calEvents.push({ date: t.implant_date, type: 'embryo', label: `🐑 Transfer`, lamb_id: t.recipient_id||t.donor_id, extra: t.outcome||'Pending' });
    }
  });

  // Planned breeding/flush group protocol steps
  const { data: groups } = await db.from('breeding_groups').select('*');
  const { data: steps } = await db.from('protocol_steps').select('*');
  const { data: members } = await db.from('breeding_group_members').select('*');
  (groups||[]).filter(g => g.target_date && g.status !== 'Cancelled').forEach(g => {
    const donorSteps = (steps||[]).filter(s => s.protocol_id === g.protocol_id);
    const recipSteps = g.recip_protocol_id ? (steps||[]).filter(s => s.protocol_id === g.recip_protocol_id) : [];
    const allSteps = [
      ...donorSteps.map(s => ({...s, _isRecip: false})),
      ...recipSteps.map(s => ({...s, _isRecip: true})),
    ];
    const donorMembers = (members||[]).filter(m => m.group_id === g.id && (m.role||'donor') === 'donor');
    const recipMembers = (members||[]).filter(m => m.group_id === g.id && m.role === 'recip');
    const donorNames = donorMembers.map(m => allLambs.find(l => l.id === m.lamb_id)?.name || '?').join(', ');
    const recipNames = recipMembers.map(m => {
      const lamb = m.lamb_id ? allLambs.find(l => l.id === m.lamb_id) : null;
      return lamb?.name || m.recip_text || '?';
    }).join(', ');

    if (allSteps.length > 0) {
      allSteps.forEach(step => {
        const stepDate = new Date(new Date(g.target_date + 'T12:00:00').getTime() - step.day_offset*24*60*60*1000).toISOString().slice(0,10);
        const roleLabel = step._isRecip ? 'Recip' : 'Donor';
        const memberList = step._isRecip ? (recipNames||donorNames) : donorNames;
        const timeLabel = step.time_of_day && step.time_of_day !== 'AM' ? ' ' + step.time_of_day : '';
        calEvents.push({ date: stepDate, type: 'planned', label: `📋 ${roleLabel}: ${step.step_name}${timeLabel}`, group_id: g.id, group_name: g.name, extra: memberList, group_type: g.type, isRecip: step._isRecip });
      });
    } else {
      calEvents.push({ date: g.target_date, type: 'planned', label: `📋 ${g.name}`, group_id: g.id, group_name: g.name, extra: donorNames, group_type: g.type });
    }
  });
}

function jumpToMostRecentEvent() {
  const today = new Date().toISOString().slice(0, 10);
  const relevant = calEvents.filter(e => {
    if (!e.date) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  });
  if (relevant.length === 0) return;

  // Prefer the closest upcoming date, otherwise the most recent past date
  const upcoming = relevant.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  const past = relevant.filter(e => e.date < today).sort((a,b) => b.date.localeCompare(a.date));
  const best = upcoming.length > 0 ? upcoming[0] : past[0];

  const [y, m] = best.date.split('-');
  calYear = parseInt(y);
  calMonth = parseInt(m) - 1;
}

function drawCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);

  // Filter events
  let filtered = calEvents.filter(e => {
    if (!e.date) return false;
    const [y, m] = e.date.split('-');
    if (parseInt(y) !== calYear || parseInt(m) !== calMonth + 1) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  });

  // Group by date
  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  const lambOptions = allLambs.map(l => `<option value="${l.id}" ${calLambFilter===l.id?'selected':''}>${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}</option>`).join('');

  const filterBtns = [
    { key: 'all', label: 'All' },
    { key: 'breeding', label: '🐏 Breeding' },
    { key: 'lambing', label: '🐑 Lambing' },
    { key: 'treatment', label: '💉 Treatments' },
    { key: 'embryo', label: '🔬 Embryo' },
    { key: 'planned', label: '📋 Planned' },
  ].map(f => `<button class="filter-btn ${calFilter===f.key?'active':''}" onclick="calFilter='${f.key}';jumpToMostRecentEvent();drawCalendar()">${f.label}</button>`).join('');

  let html = `
    <div style="margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem;flex-wrap:wrap;gap:0.5rem">
        <div style="display:flex;align-items:center;gap:0.75rem">
          <button class="btn btn-secondary btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}drawCalendar()">‹</button>
          <span style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);min-width:160px;text-align:center">${monthNames[calMonth]} ${calYear}</span>
          <button class="btn btn-secondary btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}drawCalendar()">›</button>
          <button class="btn btn-secondary btn-sm" onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();drawCalendar()">Today</button>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <select style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.45rem 0.75rem;font-size:0.85rem" onchange="calLambFilter=this.value;drawCalendar()">
            <option value="">Whole Flock</option>
            ${lambOptions}
          </select>
        </div>
      </div>
      <div class="search-bar" style="margin-bottom:0.85rem">${filterBtns}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div style="text-align:center;font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:0.3rem 0">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px" id="cal-grid">`;

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div style="min-height:80px;background:var(--bg);border-radius:0.35rem;opacity:0.3"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const dayEvents = byDate[dateStr] || [];

    // Deduplicate treatments on same day — show count instead
    const treatments = dayEvents.filter(e => e.type === 'treatment');
    const nonTreatments = dayEvents.filter(e => e.type !== 'treatment');
    const uniqueTreatmentProducts = [...new Set(treatments.map(e => e.label))];

    html += `<div style="min-height:80px;background:var(--surface);border-radius:0.35rem;padding:0.3rem;border:1.5px solid ${isToday?'var(--accent)':'var(--border)'};position:relative;overflow:hidden">
      <div style="font-size:0.8rem;font-weight:${isToday?700:400};color:${isToday?'var(--accent)':'var(--text2)'};margin-bottom:0.2rem">${day}</div>
      ${nonTreatments.map(e => {
        const lamb = allLambs.find(l => l.id === e.lamb_id);
        const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
        const sireName = sire ? sire.name : (e.sire_text||'');
        const color = e.type==='breeding'?'#3a5a20':e.type==='lambing'?'#103a60':e.type==='embryo'?'#2a1a50':e.type==='planned'?(e.isRecip?'#1a2a5a':'#0a3a5a'):'#3a3010';
        const textColor = e.type==='breeding'?'#a8d88a':e.type==='lambing'?'#80b0f0':e.type==='embryo'?'#c090f0':e.type==='planned'?(e.isRecip?'#a0c0ff':'#60c8f8'):'#e8c040';
        return `<div onclick="${e.group_id ? `showPlanGroupDetail('${e.group_id}')` : `showCalEventDetail('${dateStr}')`}" style="font-size:0.68rem;background:${color};color:${textColor};border-radius:0.2rem;padding:0.1rem 0.3rem;margin-bottom:0.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${e.label}${e.group_name?' — '+e.group_name:''}${e.extra?' ('+e.extra+')':''}">
          ${e.label}${e.group_name?` <span style="opacity:0.8">${e.group_name}</span>`:(lamb?` <span style="opacity:0.8">${lamb.name}</span>`:'')}
        </div>`;
      }).join('')}
      ${uniqueTreatmentProducts.map(prod => {
        const count = treatments.filter(e=>e.label===prod).length;
        return `<div onclick="showCalEventDetail('${dateStr}')" style="font-size:0.68rem;background:#3a3010;color:#e8c040;border-radius:0.2rem;padding:0.1rem 0.3rem;margin-bottom:0.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${prod}">
          ${prod}${count>1?` <span style="opacity:0.7">(${count})</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  html += `</div>`;

  // Upcoming events list below calendar
  const upcoming = calEvents.filter(e => {
    if (!e.date || e.date < today) return false;
    if (calFilter !== 'all' && e.type !== calFilter) return false;
    if (calLambFilter && e.lamb_id !== calLambFilter) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 10);

  if (upcoming.length > 0) {
    html += `<div style="margin-top:1.5rem">
      <div class="section-title" style="margin-bottom:0.75rem">Upcoming Events</div>`;
    upcoming.forEach(e => {
      const lamb = allLambs.find(l => l.id === e.lamb_id);
      const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
      const sireName = sire ? sire.name+(e.ai_sire_id?' 🧬':'') : (e.sire_text||'');
      const typeBadge = e.type==='breeding'?'badge-green':e.type==='lambing'?'badge-blue':e.type==='embryo'?'badge-purple':e.type==='planned'?'badge-blue':'badge-yellow';
      html += `<div class="record-row" style="cursor:pointer" onclick="${e.group_id ? `showPlanGroupDetail('${e.group_id}')` : (lamb?`showLamb('${lamb.id}')`:``)}">
        <div style="display:flex;gap:0.75rem;align-items:center;flex:1">
          <div style="text-align:center;min-width:40px">
            <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent);font-weight:700">${parseInt(e.date.split('-')[2])}</div>
            <div style="font-size:0.65rem;color:var(--text3);text-transform:uppercase">${monthNames[parseInt(e.date.split('-')[1])-1].slice(0,3)}</div>
          </div>
          <div>
            <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
              <span style="font-weight:600;color:var(--text)">${e.label}</span>
              <span class="badge ${typeBadge}" style="font-size:0.65rem">${e.type}</span>
            </div>
            <div style="font-size:0.78rem;color:var(--text3);margin-top:0.15rem">
              ${lamb?lamb.name:''}${sireName?' × '+sireName:''}
            </div>
          </div>
        </div>
        ${lamb?`<span style="color:var(--text3);font-size:0.8rem">→</span>`:''}
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('main-content').innerHTML = html;

  // Restore lamb filter select value
  const sel = document.querySelector('#main-content select');
  if (sel) sel.value = calLambFilter;
}

function showCalEventDetail(dateStr) {
  const dayEvents = calEvents.filter(e => e.date === dateStr && (calFilter==='all'||e.type===calFilter) && (!calLambFilter||e.lamb_id===calLambFilter));
  if (dayEvents.length === 0) return;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,m,d] = dateStr.split('-');
  let html = `
    <div class="modal-header">
      <div class="modal-title">${parseInt(d)} ${monthNames[parseInt(m)-1]} ${y}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>`;
  dayEvents.forEach(e => {
    const lamb = allLambs.find(l => l.id === e.lamb_id);
    const sire = e.sire_id ? allLambs.find(l=>l.id===e.sire_id) : (e.ai_sire_id ? allAiRams.find(r=>r.id===e.ai_sire_id) : null);
    const sireName = sire ? sire.name+(e.ai_sire_id?' 🧬':'') : (e.sire_text||'');
    const typeBadge = e.type==='breeding'?'badge-green':e.type==='lambing'?'badge-blue':e.type==='embryo'?'badge-purple':'badge-yellow';
    html += `<div class="record-row" style="${lamb?'cursor:pointer':''}" onclick="${lamb?`closeModal();showLamb('${lamb.id}')`:``}">
      <div style="flex:1">
        <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
          <span style="font-weight:600;color:var(--text)">${e.label}</span>
          <span class="badge ${typeBadge}" style="font-size:0.65rem">${e.type}</span>
        </div>
        <div style="font-size:0.82rem;color:var(--text3);margin-top:0.2rem">
          ${lamb?`<span style="color:var(--text2)">${lamb.name}</span>${lamb.ear_tag?' #'+lamb.ear_tag:''}`:''} ${sireName?'× '+sireName:''} ${e.extra?`<span style="color:var(--text3)">· ${e.extra}</span>`:''}
        </div>
      </div>
      ${lamb?`<span style="color:var(--text3)">→</span>`:''}
    </div>`;
  });
  showModal(html);
}

function calcExpectedLamb() {
  const dateVal = document.getElementById('br-date')?.value;
  if (!dateVal) return;
  const d = new Date(dateVal);
  d.setDate(d.getDate() + 147);
  const el = document.getElementById('br-expected');
  if (el) el.value = d.toISOString().slice(0, 10);
}
</script>
