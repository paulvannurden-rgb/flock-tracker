      <div style="font-size:1.1rem;font-weight:700;color:var(--text)">Breeding Records</div>
    </div>

    <!-- FILTERS -->
    <div class="card" style="padding:0.75rem 1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
        <!-- Active filter chips -->
        ${[
          ...(filters.females||[]).map(v => ({ key:'females', val:v, label:'Female' })),
          ...(filters.sires||[]).map(v => ({ key:'sires', val:v, label:'Sire' })),
          ...(filters.breedFrom ? [{ key:'breedFrom', val:filters.breedFrom, label:'Bred From' }] : []),
          ...(filters.breedTo ? [{ key:'breedTo', val:filters.breedTo, label:'Bred To' }] : []),
          ...(filters.dueFrom ? [{ key:'dueFrom', val:filters.dueFrom, label:'Due From' }] : []),
          ...(filters.dueTo ? [{ key:'dueTo', val:filters.dueTo, label:'Due To' }] : []),
          ...(filters.outcome ? [{ key:'outcome', val:filters.outcome, label:'Result' }] : []),
        ].map(({key, val, label}) => `<span style="display:inline-flex;align-items:center;gap:0.35rem;background:var(--accent-glow);border:1px solid var(--accent2);color:var(--accent2);padding:0.25rem 0.5rem 0.25rem 0.65rem;border-radius:1rem;font-size:0.75rem;font-weight:600">
            ${label}: ${val}
            <button onclick="clearBreedFilter('${key}','${val}')" style="background:none;border:none;cursor:pointer;color:var(--accent2);font-size:0.9rem;line-height:1;padding:0 0.1rem">×</button>
          </span>`).join('')}

        <!-- Add filter dropdown -->
        <div style="position:relative;display:inline-block" id="filter-dropdown-wrap">
          <button onclick="toggleBreedFilterMenu()" class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:0.35rem">

        ${(filters.females?.length||filters.sires?.length||filters.breedFrom||filters.breedTo||filters.dueFrom||filters.dueTo||filters.outcome) ? `<button onclick="window._breedingFilters={females:[],sires:[],breedFrom:'',breedTo:'',dueFrom:'',dueTo:'',outcome:''};renderBreedingTable(window._breedingAllRecs,window._breedingFilters)" style="background:none;border:none;color:var(--text3);font-size:0.78rem;cursor:pointer;text-decoration:underline">Clear all</button>` : ''}

      ${(filters.females?.length||filters.sires?.length||filters.breedFrom||filters.breedTo||filters.dueFrom||filters.dueTo||filters.outcome) ? `<div style="font-size:0.72rem;color:var(--text3);margin-top:0.4rem">Showing ${recs.length} of ${allRecs.length} records</div>` : ''}
    </div>

    <!-- SUMMARY STATS -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.75rem;margin-bottom:1.25rem">
      <div class="card" style="padding:0.85rem;text-align:center">
        <div style="font-size:1.5rem;font-weight:700;color:var(--accent)">${recs.length}</div>
        <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Records</div>
      </div>
      <div class="card" style="padding:0.85rem;text-align:center">
        <div style="font-size:1.5rem;font-weight:700;color:#16a34a">${pregnant.length}</div>
        <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Pregnant</div>
      </div>
      <div class="card" style="padding:0.85rem;text-align:center">
        <div style="font-size:1.5rem;font-weight:700;color:var(--accent)">${conceptionRate}%</div>
        <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Conception Rate</div>
      </div>
      <div class="card" style="padding:0.85rem;text-align:center">
        <div style="font-size:1.5rem;font-weight:700;color:#d97706">${pending}</div>
        <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Pending</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">

            <tr style="background:var(--surface2);border-bottom:2px solid var(--border)">

              <th style="padding:0.75rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);white-space:nowrap">Bred</th>
              <th style="padding:0.75rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);white-space:nowrap">Due Date</th>
              <th style="padding:0.75rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);white-space:nowrap">Result</th>

                      <span style="width:6px;height:6px;border-radius:50%;background:${oc.dot};display:inline-block"></span>${outcome}
                    </span>
                  </td>
                  <td style="padding:0.75rem 1rem;color:var(--text3);font-size:0.82rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.notes||''}</td>

                      <button class="btn-icon btn-sm" onclick="openEditBreedingGlobal('${r.id}','${r.lamb_id}')" title="Edit">✏️</button>

                    </div>

                </tr>`;
              }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('main-content').innerHTML = html;
}

function calcGbrExpected() {
  const d = document.getElementById('gbr-date')?.value;
  if (d) {
    const exp = new Date(d + 'T12:00:00').getTime() + 147*24*60*60*1000;
    document.getElementById('gbr-expected').value = new Date(exp).toISOString().slice(0,10);
  }
}

function updateGbrSemenOpts() {
  const val = document.getElementById('gbr-sire-id')?.value || '';
  const section = document.getElementById('gbr-semen-section');
  const locSel = document.getElementById('gbr-semen-loc');
  if (!section || !locSel) return;
  if (val.startsWith('ai:')) {
    const aiId = val.replace('ai:', '');
    const hasInv = allSemenInventory.some(i => i.ai_ram_id === aiId && i.straws > 0);
    section.style.display = hasInv ? '' : 'none';
    locSel.innerHTML = getSemenOptionsForRam(aiId, '');
  } else { section.style.display = 'none'; }
}

async function saveBreedingGlobal() {
  const lambId = v('gbr-lamb-id');
  if (!lambId) { toast('Select a female'); return; }
  const { sire_id, ai_sire_id } = parseSireSelection(v('gbr-sire-id'));
  const payload = { lamb_id: lambId, sire_id, ai_sire_id, sire_text: v('gbr-sire-text'), breeding_date: v('gbr-date')||null, expected_lamb_date: v('gbr-expected')||null, outcome: v('gbr-outcome')||'Pending', notes: v('gbr-notes') };
  const { data } = await db.from('breeding_records').insert(payload).select().single();
  if (ai_sire_id && data?.id) {
    const loc = v('gbr-semen-loc'); const straws = parseFloat(v('gbr-straws-used'))||0;
    if (loc && straws > 0) await deductSemenInventory(ai_sire_id, loc, straws, 'breeding', data.id);
  }
  // Save inline costs
  if (data?.id) await saveInlineCosts('gbr-costs', 'breeding_costs', 'breeding_id', data.id);
  toast('Breeding record saved');
  closeModal();
  renderBreeding();
}

async function openEditBreedingGlobal(recId, lambId) {
  const { data: rec } = await db.from('breeding_records').select('*').eq('id', recId).single();
  if (!rec) return;
  // Temporarily set currentLambId so saveBreeding works
  const prevLambId = currentLambId;
  currentLambId = lambId;
  openAddBreeding(rec);
  // Override save button to go back to breeding page
  setTimeout(() => {
    const modal = document.querySelector('.modal');
    if (modal) {
      const btn = modal.querySelector('.btn-primary');
      if (btn) btn.onclick = async () => {
        await saveBreeding(recId);
        currentLambId = prevLambId;
        renderBreeding();
      };
    }
  }, 50);
}

async function renderFlushes() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  const [{ data: flushes }, { data: allTransfers }] = await Promise.all([
    db.from('embryo_flushes').select('*').order('flush_date', {ascending:false}),
    db.from('embryo_transfers').select('*'),
  ]);
  window._flushAllRecs = flushes || [];
  window._flushAllTransfers = allTransfers || [];
  window._flushFilters = window._flushFilters || { donor:'', sire:'', flushFrom:'', flushTo:'', type:'' };
  renderFlushTable(window._flushAllRecs, window._flushAllTransfers, window._flushFilters);
}

function renderFlushTable(allRecs, allTransfers, filters) {
  // Apply filters
  const recs = allRecs.filter(f => {
    const donor = allLambs.find(l => l.id === f.donor_id);
    const sire = f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : (f.sire_id ? allLambs.find(l=>l.id===f.sire_id) : null);
    const donorName = ((donor?.name||'') + ' ' + (donor?.ear_tag||'')).toLowerCase();
    const sireName = (sire?.name || f.sire_text || '').toLowerCase();
    const flushType = f.flush_type || 'MOET';
    if (filters.donor && !donorName.includes(filters.donor.toLowerCase())) return false;

    if (filters.type && flushType !== filters.type) return false;

// Flush filter helpers
let _flushFilterTimer = null;
let _activeFlushFilterKey = null;

function toggleFlushFilterMenu() {
  const menu = document.getElementById('flush-filter-menu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
function closeFlushFilterMenu() {
  const menu = document.getElementById('flush-filter-menu');
  if (menu) menu.style.display = 'none';
}
function showFlushFilterInput(key) {
  closeFlushFilterMenu();
  _activeFlushFilterKey = key;
  const wrap = document.getElementById('flush-filter-input-wrap');
  const input = document.getElementById('flush-filter-input');
  if (!wrap || !input) return;
  const isDate = key.includes('From') || key.includes('To');
  input.type = isDate ? 'date' : 'text';
  input.placeholder = key === 'donor' ? 'Donor name or tag…' : key === 'sire' ? 'Sire name…' : '';
  input.value = window._flushFilters[key] || '';
  wrap.style.display = 'inline-flex';
  input.focus();
}
function applyFlushFilterInput() {
  if (!_activeFlushFilterKey) return;
  window._flushFilters[_activeFlushFilterKey] = document.getElementById('flush-filter-input')?.value || '';
  document.getElementById('flush-filter-input-wrap').style.display = 'none';
  _activeFlushFilterKey = null;
  renderFlushTable(window._flushAllRecs, window._flushAllTransfers||[], window._flushFilters);
}

function updateGflSemenOpts() {
  const val = document.getElementById('gfl-sire-id')?.value || '';
  const section = document.getElementById('gfl-semen-section');
  const locSel = document.getElementById('gfl-semen-loc');
  if (!section || !locSel) return;
  if (val.startsWith('ai:')) {
    const aiId = val.replace('ai:', '');
    const hasInv = allSemenInventory.some(i => i.ai_ram_id === aiId && i.straws > 0);
    section.style.display = hasInv ? '' : 'none';
    locSel.innerHTML = getSemenOptionsForRam(aiId, '');
  } else { section.style.display = 'none'; }
}

async function saveFlushGlobal() {
  const donorId = v('gfl-donor-id');
  const date = v('gfl-date');
  if (!donorId) { toast('Select a donor'); return; }
  if (!date) { toast('Date required'); return; }
  const { sire_id, ai_sire_id } = parseSireSelection(v('gfl-sire-id'));
  const payload = { donor_id: donorId, flush_date: date, flush_type: v('gfl-type')||'MOET', embryos_collected: parseInt(v('gfl-collected'))||0, embryos_transferred: v('gfl-transferred') ? parseInt(v('gfl-transferred')) : null, sire_id, ai_sire_id, sire_text: v('gfl-sire-text'), notes: v('gfl-notes') };
  const { data } = await db.from('embryo_flushes').insert(payload).select().single();
  if (ai_sire_id && data?.id) {
    const loc = v('gfl-semen-loc'); const straws = parseFloat(v('gfl-straws-used'))||0;
    if (loc && straws > 0) await deductSemenInventory(ai_sire_id, loc, straws, 'flush', data.id);
  }
  // Save inline costs
  if (data?.id) await saveInlineCosts('gfl-costs', 'flush_costs', 'flush_id', data.id);
  toast('Flush record saved');
  closeModal();
  renderFlushes();
}

async function openEditFlushGlobal(flushId, donorId) {
  const { data: flush } = await db.from('embryo_flushes').select('*').eq('id', flushId).single();
  if (!flush) return;
  const prevLambId = currentLambId;
  currentLambId = donorId;
  showFlushModal(flush);
  setTimeout(() => {
    const modal = document.querySelector('.modal');
    if (modal) {
      const btn = modal.querySelector('.btn-primary');
      if (btn) btn.onclick = async () => {
        await saveFlush(flushId);
        currentLambId = prevLambId;
        renderFlushes();
      };
    }
  }, 50);
}

document.addEventListener('click', function(e) {
  const wrap = document.getElementById('flush-filter-dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) closeFlushFilterMenu();
});

// ── ANALYTICS PAGE ────────────────────────────────────
async function renderAnalytics() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading analytics…</div>`;

  // Load all data needed
  const [{ data: breedingRecs }, { data: breedingResults }, { data: transfers }, { data: flushes }, { data: transferLambs }, { data: resultLambs }] = await Promise.all([
    db.from('breeding_records').select('*'),
    db.from('breeding_results').select('*'),
    db.from('embryo_transfers').select('*'),
    db.from('embryo_flushes').select('*'),
    db.from('embryo_transfer_lambs').select('*'),
    db.from('breeding_result_lambs').select('*'),
  ]);

  const today = new Date().toISOString().slice(0,10);
  const defaultFrom = new Date(new Date().setFullYear(new Date().getFullYear()-2)).toISOString().slice(0,10);

  // Render with filters
  function buildAnalyticsHTML(fromDate, toDate) {
    const filterBreed = (breedingRecs||[]).filter(r => (!fromDate||r.breeding_date>=fromDate) && (!toDate||r.breeding_date<=toDate));
    const filterTransfer = (transfers||[]).filter(t => (!fromDate||t.implant_date>=fromDate) && (!toDate||t.implant_date<=toDate));

    const conceivedOutcomes = ['Confirmed Pregnant','Lamb Born'];
    const decidedOutcomes = ['Confirmed Pregnant','Lamb Born','Not Pregnant','Failed'];

    // Only include records with a decided outcome (exclude Pending)
    const filterBreedDecided = filterBreed.filter(r => decidedOutcomes.includes(r.outcome));
    const filterTransferDecided = filterTransfer.filter(t => decidedOutcomes.includes(t.outcome));

    // Needs update — ALL pending records (not just overdue)
    const today = new Date().toISOString().slice(0,10);
    const overdueBreeding = (breedingRecs||[]).filter(r =>
      (r.outcome === 'Pending' || !r.outcome)
    ).sort((a,b) => (a.breeding_date||'').localeCompare(b.breeding_date||''));
    const overdueTransfer = (transfers||[]).filter(t =>
      (t.outcome === 'Pending' || !t.outcome)
    ).sort((a,b) => (a.implant_date||'').localeCompare(b.implant_date||''));
    const pendingBreeding = filterBreed.filter(r => r.outcome === 'Pending' || !r.outcome);
    const pendingTransfer = filterTransfer.filter(t => t.outcome === 'Pending' || !t.outcome);

    // ── FLUSH TYPE ANALYTICS ──
    const filterFlushes = (flushes||[]).filter(f => (!fromDate||f.flush_date>=fromDate) && (!toDate||f.flush_date<=toDate));

    function flushTypeStats(type) {
      const typeFlushes = filterFlushes.filter(f => type === 'IVF' ? f.flush_type === 'IVF' : (f.flush_type === 'MOET' || !f.flush_type));
      const count = typeFlushes.length;
      if (count === 0) return null;
      const totalCollected = typeFlushes.reduce((s,f) => s + (f.embryos_collected||0), 0);
      const totalTransferred = typeFlushes.reduce((s,f) => s + (f.embryos_transferred||0), 0);
      const avgCollected = count ? (totalCollected/count).toFixed(1) : '—';
      const avgTransferred = count ? (totalTransferred/count).toFixed(1) : '—';

      // Transfers for these flushes (decided only)
      const flushIds = new Set(typeFlushes.map(f => f.id));
      const relatedTransfers = filterTransferDecided.filter(t => flushIds.has(t.flush_id));
      const pregnantTransfers = relatedTransfers.filter(t => conceivedOutcomes.includes(t.outcome));
      const retained = pregnantTransfers.length;

      // Conception rate = % of recipients that got pregnant
      const conceptionRate = relatedTransfers.length ? Math.round(retained/relatedTransfers.length*100)+'%' : '—';

      // Embryo retention rate = total born / embryos transferred
      const totalBorn = relatedTransfers.reduce((s,t) => s + (t.lamb_born ? (t.lamb_count||0) : 0), 0);
      const totalEmbryosTransferred = relatedTransfers.reduce((s,t) => s + (t.num_transferred||1), 0);
      const embryoRetentionRate = totalEmbryosTransferred > 0 ? Math.round(totalBorn/totalEmbryosTransferred*100)+'%' : '—';

      const totalLambs = relatedTransfers.reduce((s,t) => s + (t.lamb_born ? (t.lamb_count||0) : 0), 0);

      return { type, count, avgCollected, avgTransferred, totalCollected, totalTransferred, relatedTransfers: relatedTransfers.length, retained, conceptionRate, embryoRetentionRate, totalLambs, totalBorn };
    }

    const ivfStats = flushTypeStats('IVF');
    const moetStats = flushTypeStats('MOET');

    function flushTypeCard(stats, typeFlushes) {
      if (!stats) return '';
      const concColor = stats.relatedTransfers === 0 ? 'var(--text3)' : (stats.retained/stats.relatedTransfers >= 0.6 ? 'var(--green)' : stats.retained/stats.relatedTransfers >= 0.4 ? 'var(--warn)' : 'var(--danger)');
      const flushData = JSON.stringify(typeFlushes.map(f => f.id)).replace(/"/g, '&quot;');
      return `<div class="card" style="padding:1rem;cursor:pointer;transition:border-color 0.15s" onclick="showFlushTypeDetail('${stats.type}','${stats.type==='IVF'?'badge-purple':'badge-blue'}',${flushData})" onmouseenter="this.style.borderColor='var(--border2)'" onmouseleave="this.style.borderColor='var(--border)'">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <div style="font-size:1rem;font-weight:700;color:var(--text)">${stats.type} <span style="font-size:0.7rem;color:var(--text3)">→</span></div>
          <span class="badge ${stats.type==='IVF'?'badge-purple':'badge-blue'}">${stats.count} flush${stats.count!==1?'es':''}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-bottom:0.5rem">
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.5rem;text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--accent)">${stats.avgCollected}</div>
            <div style="font-size:0.65rem;color:var(--text3);margin-top:0.1rem">Avg Collected</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.5rem;text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--blue)">${stats.avgTransferred}</div>
            <div style="font-size:0.65rem;color:var(--text3);margin-top:0.1rem">Avg Transferred</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.5rem;text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--green)">${stats.totalLambs}</div>
            <div style="font-size:0.65rem;color:var(--text3);margin-top:0.1rem">Live Born</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.5rem;text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:${concColor}">${stats.conceptionRate}</div>
            <div style="font-size:0.65rem;color:var(--text3);margin-top:0.1rem">Recip Conception Rate</div>
          </div>
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.5rem;text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:${concColor}">${stats.embryoRetentionRate}</div>
            <div style="font-size:0.65rem;color:var(--text3);margin-top:0.1rem">Embryo Retention (Born/Transferred)</div>
          </div>
        </div>
        <div style="font-size:0.72rem;color:var(--text3);margin-top:0.5rem">${stats.totalCollected} collected · ${stats.totalTransferred} transferred · ${stats.relatedTransfers} transfers checked</div>
      </div>`;
    }

    // Store flushes for modal use
    const ivfFlushes = filterFlushes.filter(f => f.flush_type === 'IVF');
    const moetFlushes = filterFlushes.filter(f => f.flush_type === 'MOET' || !f.flush_type);
    window._analyticsFlushes = flushes || [];
    window._analyticsTransfers = transfers || [];
    const eweConception = {};
    filterBreedDecided.forEach(r => {
      if (!r.lamb_id) return;
      if (!eweConception[r.lamb_id]) eweConception[r.lamb_id] = { total:0, conceived:0, lambs:0 };
      eweConception[r.lamb_id].total++;
      if (conceivedOutcomes.includes(r.outcome)) eweConception[r.lamb_id].conceived++;
    });
    // Count live born lambs per ewe from breeding_results
    (breedingResults||[]).forEach(res => {
      const rec = (breedingRecs||[]).find(r => r.id === res.breeding_id);
      if (rec && eweConception[rec.lamb_id]) eweConception[rec.lamb_id].lambs += (res.num_alive||0);
    });

    // ── CONCEPTION RATE BY AI SIRE (breeding) ──
    const sireConception = {};
    filterBreedDecided.forEach(r => {
      const sireKey = r.ai_sire_id || ('text:' + (r.sire_text||'Unknown'));
      if (!sireConception[sireKey]) sireConception[sireKey] = { total:0, conceived:0, lambs:0, isAi: !!r.ai_sire_id };
      sireConception[sireKey].total++;
      if (conceivedOutcomes.includes(r.outcome)) sireConception[sireKey].conceived++;
    });
    (breedingResults||[]).forEach(res => {
      const rec = (breedingRecs||[]).find(r => r.id === res.breeding_id);
      if (!rec) return;
      const sireKey = rec.ai_sire_id || ('text:' + (rec.sire_text||'Unknown'));
      if (sireConception[sireKey]) sireConception[sireKey].lambs += (res.num_alive||0);
    });

    // ── RETENTION RATE BY DONOR ──
    const donorRetention = {};
    filterTransferDecided.forEach(t => {
      const flushRec = (flushes||[]).find(f => f.id === t.flush_id);
      const donorId = flushRec?.donor_id || t.donor_id;
      if (!donorId) return;
      if (!donorRetention[donorId]) donorRetention[donorId] = { total:0, retained:0, lambs:0 };
      donorRetention[donorId].total++;
      if (conceivedOutcomes.includes(t.outcome)) donorRetention[donorId].retained++;
      if (t.lamb_born) donorRetention[donorId].lambs += (t.lamb_count||0);
    });
    (transferLambs||[]).forEach(tl => {
      const transfer = (transfers||[]).find(t => t.id === tl.transfer_id);
      const flushRec = transfer ? (flushes||[]).find(f => f.id === transfer.flush_id) : null;
      const donorId = flushRec?.donor_id;
    });

    // ── RETENTION RATE BY RECIPIENT ──
    const recipRetention = {};
    filterTransferDecided.forEach(t => {
      const recipKey = t.recipient_id || ('text:' + (t.recipient_text||'Unknown'));
      if (!recipRetention[recipKey]) recipRetention[recipKey] = { total:0, retained:0, lambs:0, isLinked: !!t.recipient_id };
      recipRetention[recipKey].total++;
      if (conceivedOutcomes.includes(t.outcome)) recipRetention[recipKey].retained++;
      if (t.lamb_born) recipRetention[recipKey].lambs += (t.lamb_count||0);
    });

    // ── RETENTION RATE BY AI SIRE (flush) ──
    const flushSireRetention = {};
    filterTransferDecided.forEach(t => {
      const flushRec = (flushes||[]).find(f => f.id === t.flush_id);
      const sireKey = flushRec?.ai_sire_id || ('text:' + (flushRec?.sire_text||'Unknown'));
      if (!flushSireRetention[sireKey]) flushSireRetention[sireKey] = { total:0, retained:0, lambs:0, isAi: !!flushRec?.ai_sire_id };
      flushSireRetention[sireKey].total++;
      if (conceivedOutcomes.includes(t.outcome)) flushSireRetention[sireKey].retained++;
      if (t.lamb_born) flushSireRetention[sireKey].lambs += (t.lamb_count||0);
    });

    function pct(n, d) { return d === 0 ? '—' : Math.round(n/d*100) + '%'; }
    function rateColor(n, d) { if (d===0) return 'var(--text3)'; const p = n/d; return p>=0.6?'var(--green)':p>=0.4?'var(--warn)':'var(--danger)'; }

    function statCard(name, tag, total, success, lambs, label, lambId) {
      const rate = pct(success, total);
      const color = rateColor(success, total);
      const clickable = lambId ? `onclick="showLamb('${lambId}')" style="cursor:pointer"` : '';
      return `<div class="card" style="padding:1rem;transition:border-color 0.15s${lambId?';cursor:pointer':''}" ${clickable} ${lambId?'onmouseenter="this.style.borderColor=\'var(--border2)\'" onmouseleave="this.style.borderColor=\'var(--border)\'"':''}>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem">
          <div>
            <div style="font-weight:600;font-size:0.9rem;color:var(--text)">${name}${lambId?` <span style="font-size:0.7rem;color:var(--text3)">→</span>`:''}</div>
            ${tag?`<div style="font-size:0.72rem;color:var(--text3)">${tag}</div>`:''}
          </div>
          <div style="text-align:right">
            <div style="font-size:1.4rem;font-weight:700;color:${color}">${rate}</div>
            <div style="font-size:0.68rem;color:var(--text3)">${label}</div>
          </div>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <span class="badge badge-gray">${total} attempts</span>
          <span class="badge badge-green">${success} success</span>
          ${lambs>0?`<span class="badge badge-blue">🐑 ${lambs} live born</span>`:''}
        </div>
      </div>`;
    }

    // Sort by rate descending
    function sortByRate(obj) {
      return Object.entries(obj).sort((a,b) => {
        const ra = a[1].total ? (a[1].conceived||a[1].retained)/a[1].total : -1;
        const rb = b[1].total ? (b[1].conceived||b[1].retained)/b[1].total : -1;
        return rb - ra;
      });
    }

    const eweCards = sortByRate(eweConception).map(([id, d]) => {
      const lamb = allLambs.find(l=>l.id===id);
      return statCard(lamb?.name||'Unknown', lamb?.ear_tag?'#'+lamb.ear_tag:'', d.total, d.conceived, d.lambs, 'Conception Rate', id);
    }).join('');

    const sireCards = sortByRate(sireConception).map(([key, d]) => {
      const ram = d.isAi ? allAiRams.find(r=>r.id===key) : null;
      const name = ram ? ram.name+' 🧬' : key.replace('text:','');
      return statCard(name, '', d.total, d.conceived, d.lambs, 'Conception Rate', null);
    }).join('');

    const donorCards = sortByRate(donorRetention).map(([id, d]) => {
      const lamb = allLambs.find(l=>l.id===id);
      return statCard(lamb?.name||'Unknown', lamb?.ear_tag?'#'+lamb.ear_tag:'', d.total, d.retained, d.lambs, 'Conception Rate', id);
    }).join('');

    const recipCards = sortByRate(recipRetention).map(([key, d]) => {
      const lamb = d.isLinked ? allLambs.find(l=>l.id===key) : null;
      const name = lamb ? lamb.name : key.replace('text:','');
      const tag = lamb?.ear_tag ? '#'+lamb.ear_tag : '';
      return statCard(name, tag, d.total, d.retained, d.lambs, 'Conception Rate', d.isLinked ? key : null);
    }).join('');

    const flushSireCards = sortByRate(flushSireRetention).map(([key, d]) => {
      const ram = d.isAi ? allAiRams.find(r=>r.id===key) : null;
      const name = ram ? ram.name+' 🧬' : key.replace('text:','');
      return statCard(name, '', d.total, d.retained, d.lambs, 'Conception Rate', null);
    }).join('');

    return `
      <div class="section-header"><div class="section-title" style="font-size:1.15rem">📈 Analytics</div></div>

      <!-- Date Range Filter -->
      <div class="card" style="margin-bottom:1.25rem;padding:1rem">
        <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap">
          <div class="field" style="margin:0;flex:1;min-width:130px"><label>From</label><input type="date" id="analytics-from" value="${fromDate}" onchange="applyAnalyticsFilter()"></div>
          <div class="field" style="margin:0;flex:1;min-width:130px"><label>To</label><input type="date" id="analytics-to" value="${toDate}" onchange="applyAnalyticsFilter()"></div>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('analytics-from').value='';document.getElementById('analytics-to').value='';applyAnalyticsFilter()">Clear</button>
        </div>
        <div style="font-size:0.72rem;color:var(--text3);margin-top:0.5rem">Pending outcomes are excluded from rate calculations.</div>
      </div>

      <!-- NEEDS UPDATE -->
      ${(overdueBreeding.length > 0 || overdueTransfer.length > 0) ? `
      <div style="background:#fffbeb;border:1px solid #fcd68a;border-radius:var(--radius);padding:1rem;margin-bottom:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
          <div style="font-size:0.78rem;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:0.08em">⚠️ Pending Records (${overdueBreeding.length + overdueTransfer.length} need outcome)</div>
          <div style="display:flex;gap:0.35rem">
            <button class="filter-btn active" id="pending-filter-all" onclick="setPendingFilter('all')" style="font-size:0.7rem;padding:0.2rem 0.5rem">All</button>
            <button class="filter-btn" id="pending-filter-pastdue" onclick="setPendingFilter('pastdue')" style="font-size:0.7rem;padding:0.2rem 0.5rem">Past Due</button>
          </div>
        </div>
        <div id="pending-records-list">
          ${overdueBreeding.map(r => {
            const lamb = allLambs.find(l=>l.id===r.lamb_id);
            const sire = r.ai_sire_id ? allAiRams.find(x=>x.id===r.ai_sire_id) : null;
            const isPastDue = r.expected_lamb_date && r.expected_lamb_date < today;
            return `<div class="pending-record-row" data-pastdue="${isPastDue}" style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid #fde68a;cursor:pointer" onclick="showLambAtTab('${r.lamb_id}','breeding')">
              <div>
                <span style="font-weight:600;font-size:0.85rem">${lamb?.name||'Unknown'}</span>
                <span style="color:var(--text3);font-size:0.78rem"> · Breeding ${r.breeding_date} · ${sire?.name||r.sire_text||'—'}</span>
              </div>
              <div style="display:flex;gap:0.4rem;align-items:center;flex-shrink:0">
                ${isPastDue?'<span class="badge badge-red" style="font-size:0.65rem">Past Due</span>':''}
                <span style="color:var(--warn);font-size:0.75rem">${r.expected_lamb_date?'Due '+r.expected_lamb_date:''} →</span>
              </div>
            </div>`;
          }).join('')}
          ${overdueTransfer.map(t => {
            const flush = (flushes||[]).find(f=>f.id===t.flush_id);
            const donor = allLambs.find(l=>l.id===(flush?.donor_id||t.donor_id));
            const recip = t.recipient_id ? allLambs.find(l=>l.id===t.recipient_id) : null;
            const recipName = recip?.name || t.recipient_text || '—';
            const checkDate = t.implant_date ? new Date(new Date(t.implant_date).getTime()+45*24*60*60*1000).toISOString().slice(0,10) : null;
            const isPastDue = checkDate && checkDate < today;
            return `<div class="pending-record-row" data-pastdue="${isPastDue}" style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid #fde68a;cursor:pointer" onclick="showLambAtTab('${flush?.donor_id||t.donor_id}','embryo')">
              <div>
                <span style="font-weight:600;font-size:0.85rem">${recipName}</span>
                <span style="color:var(--text3);font-size:0.78rem"> · Transfer ${t.implant_date||'—'} · Donor: ${donor?.name||'—'}</span>
              </div>
              <div style="display:flex;gap:0.4rem;align-items:center;flex-shrink:0">
                ${isPastDue?'<span class="badge badge-red" style="font-size:0.65rem">Past Due</span>':''}
                <span style="color:var(--warn);font-size:0.75rem">🔬 →</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      <!-- FLUSH TYPE COMPARISON -->
      ${(ivfStats || moetStats) ? `
      <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Flush Type Comparison</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:1.5rem">
        ${flushTypeCard(moetStats, moetFlushes)}
        ${flushTypeCard(ivfStats, ivfFlushes)}
      </div>` : ''}

      <!-- TWO COLUMN LAYOUT -->
      <div>
        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🐏 Conception Rate — By Ewe</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">${eweCards||'<div style="color:var(--text3);font-size:0.85rem">No breeding records in range</div>'}</div>

        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🐏 Conception Rate — By Sire</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">${sireCards||'<div style="color:var(--text3);font-size:0.85rem">No breeding records in range</div>'}</div>

        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Recip Conception Rate — By Donor</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">${donorCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>

        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Recip Conception Rate — By Recipient</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">${recipCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>

        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem">🔬 Recip Conception Rate — By Sire</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">${flushSireCards||'<div style="color:var(--text3);font-size:0.85rem">No transfer records in range</div>'}</div>
      </div>`;
  }

  window._buildAnalyticsHTML = buildAnalyticsHTML;
  document.getElementById('main-content').innerHTML = buildAnalyticsHTML(defaultFrom, today);
}

function setPendingFilter(mode) {
  document.getElementById('pending-filter-all')?.classList.toggle('active', mode==='all');
  document.getElementById('pending-filter-pastdue')?.classList.toggle('active', mode==='pastdue');
  document.querySelectorAll('.pending-record-row').forEach(row => {
    if (mode === 'all') row.style.display = '';
    else row.style.display = row.dataset.pastdue === 'true' ? '' : 'none';
  });
}

function applyAnalyticsFilter() {
  const from = document.getElementById('analytics-from')?.value || '';
  const to = document.getElementById('analytics-to')?.value || '';
  if (!window._buildAnalyticsHTML) return;
  const scrollPos = document.getElementById('main-content').scrollTop;
  document.getElementById('main-content').innerHTML = window._buildAnalyticsHTML(from, to);
  document.getElementById('main-content').scrollTop = scrollPos;
}

function showFlushTypeDetail(type, badgeClass, flushIds) {
  const flushList = (window._analyticsFlushes||[]).filter(f => flushIds.includes(f.id));
  const allTransfers = window._analyticsTransfers || [];
  const conceivedOutcomes = ['Confirmed Pregnant','Lamb Born'];

  const rows = flushList.sort((a,b) => b.flush_date.localeCompare(a.flush_date)).map(f => {
    const donor = allLambs.find(l => l.id === f.donor_id);
    const sire = f.ai_sire_id ? allAiRams.find(r=>r.id===f.ai_sire_id) : null;
    const sireName = sire ? sire.name+' 🧬' : (f.sire_text||'—');
    const fTransfers = allTransfers.filter(t => t.flush_id === f.id && ['Confirmed Pregnant','Lamb Born','Not Pregnant','Failed'].includes(t.outcome));
    const retained = fTransfers.filter(t => conceivedOutcomes.includes(t.outcome)).length;
    const rate = fTransfers.length ? Math.round(retained/fTransfers.length*100)+'%' : '—';
    const lambs = allTransfers.filter(t=>t.flush_id===f.id&&t.lamb_born).reduce((s,t)=>s+(t.lamb_count||0),0);

    return `<div style="padding:0.65rem 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="closeModal();showLamb('${f.donor_id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:600;font-size:0.88rem;color:var(--text)">${donor?.name||'Unknown'}${donor?.ear_tag?' <span style="color:var(--text3)">#'+donor.ear_tag+'</span>':''}</div>
          <div style="font-size:0.72rem;color:var(--text3);margin-top:0.2rem">📅 ${f.flush_date} · Sire: ${sireName}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:0.5rem">
          <div style="font-size:0.78rem;color:var(--text2)">${f.embryos_collected||0} collected · ${f.embryos_transferred||0} transferred</div>
          <div style="font-size:0.72rem;margin-top:0.15rem;display:flex;gap:0.4rem;justify-content:flex-end;flex-wrap:wrap">
            ${fTransfers.length>0?`<span class="badge badge-gray">${rate} retention</span>`:'<span style="color:var(--text3)">No transfers</span>'}
            ${lambs>0?`<span class="badge badge-green">🐑 ${lambs} born</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title"><span class="badge ${badgeClass}" style="margin-right:0.5rem">${type}</span> ${flushList.length} Flush${flushList.length!==1?'es':''}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="max-height:480px;overflow-y:auto">
      ${rows || '<div class="empty"><p>No flushes in this range</p></div>'}
    </div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`, true);
}
// ── COSTS PAGE ────────────────────────────────────────

const COST_CATEGORIES = ['Semen', 'Vet', 'Lab', 'Transport', 'Drugs', 'Other'];

async function renderCosts() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading…</div>`;
  const [{ data: flushCosts }, { data: breedCosts }, { data: flushes }, { data: breeds }, { data: transfers }] = await Promise.all([
    db.from('flush_costs').select('*').order('date', {ascending:false}),
    db.from('breeding_costs').select('*').order('date', {ascending:false}),
    db.from('embryo_flushes').select('*'),
    db.from('breeding_records').select('*'),
    db.from('embryo_transfers').select('*'),
  ]);
  window._costsAllFlush = flushCosts || [];
  window._costsAllBreed = breedCosts || [];
  window._costsFlushRecs = flushes || [];
  window._costsBreedRecs = breeds || [];
  window._costsTransfers = transfers || [];
  window._costFilters = window._costFilters || { animal:'', category:'', dateFrom:'', dateTo:'' };
  renderCostTables(window._costsAllFlush, window._costsAllBreed, window._costsFlushRecs, window._costsBreedRecs, window._costsTransfers, window._costFilters);
}

function renderCostTables(allFc, allBc, flushRecs, breedRecs, transfers, filters) {
  // Apply filters to both tables
  function applyFilter(costs, type) {
    return costs.filter(c => {
      const rec = type === 'flush'
        ? flushRecs.find(r => r.id === c.flush_id)
        : breedRecs.find(r => r.id === c.breeding_id);
      const animal = type === 'flush'
        ? (allLambs.find(l => l.id === rec?.donor_id)?.name || '')
        : (allLambs.find(l => l.id === rec?.lamb_id)?.name || '');
      if (filters.animal && !animal.toLowerCase().includes(filters.animal.toLowerCase())) return false;
      if (filters.category && c.category !== filters.category) return false;
      if (filters.dateFrom && c.date && c.date < filters.dateFrom) return false;
      if (filters.dateTo && c.date && c.date > filters.dateTo) return false;
      return true;
    });
  }

  const fc = applyFilter(allFc, 'flush');
  const bc = applyFilter(allBc, 'breeding');

  // Summary stats from filtered
  const flushTotal = fc.reduce((s,c) => s+(c.amount||0), 0);
  const breedTotal = bc.reduce((s,c) => s+(c.amount||0), 0);
  const totalCost = flushTotal + breedTotal;
  const totalEmbryos = flushRecs.reduce((s,f) => s+(f.embryos_collected||0), 0);
  const costPerEmbryo = totalEmbryos > 0 ? (flushTotal/totalEmbryos).toFixed(2) : '—';
  const totalLambs = transfers.filter(t=>t.lamb_born).reduce((s,t)=>s+(t.lamb_count||0),0);
  const costPerLamb = totalLambs > 0 ? (flushTotal/totalLambs).toFixed(2) : '—';
  const byCat = {};
  [...fc,...bc].forEach(c => { byCat[c.category] = (byCat[c.category]||0) + (c.amount||0); });

  const hasFilters = filters.animal || filters.category || filters.dateFrom || filters.dateTo;
  const totalAll = allFc.length + allBc.length;
  const totalFiltered = fc.length + bc.length;

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem">
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-primary btn-sm" onclick="openAddCost('breeding')">+ Breeding Cost</button>
        <button class="btn btn-secondary btn-sm" onclick="openAddCost('flush')">+ Flush Cost</button>
      </div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--text)">💰 Breeding & Flush Costs</div>
    </div>

    <!-- FILTERS -->
    <div class="card" style="padding:0.75rem 1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
        ${[
          ...(filters.animal ? [{ key:'animal', val:filters.animal, label:'Animal' }] : []),
          ...(filters.category ? [{ key:'category', val:filters.category, label:'Category' }] : []),
          ...(filters.dateFrom ? [{ key:'dateFrom', val:filters.dateFrom, label:'From' }] : []),
          ...(filters.dateTo ? [{ key:'dateTo', val:filters.dateTo, label:'To' }] : []),
        ].map(({key,val,label}) => `<span style="display:inline-flex;align-items:center;gap:0.35rem;background:var(--accent-glow);border:1px solid var(--accent2);color:var(--accent2);padding:0.25rem 0.5rem 0.25rem 0.65rem;border-radius:1rem;font-size:0.75rem;font-weight:600">
          ${label}: ${val}
          <button onclick="clearCostFilter('${key}')" style="background:none;border:none;cursor:pointer;color:var(--accent2);font-size:0.9rem;line-height:1;padding:0 0.1rem">×</button>
        </span>`).join('')}

        <div style="position:relative;display:inline-block" id="cost-filter-dropdown-wrap">
          <button onclick="toggleCostFilterMenu()" class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:0.35rem">
            <span style="font-size:0.9rem">＋</span> Add Filter
          </button>
          <div id="cost-filter-menu" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow);z-index:100;min-width:200px;padding:0.5rem">
            ${!filters.animal ? `<div class="filter-menu-item" onclick="showCostFilterInput('animal')">Animal name</div>` : ''}
            ${!filters.dateFrom ? `<div class="filter-menu-item" onclick="showCostFilterInput('dateFrom')">Date from</div>` : ''}
            ${!filters.dateTo ? `<div class="filter-menu-item" onclick="showCostFilterInput('dateTo')">Date to</div>` : ''}
            ${!filters.category ? `<div style="border-top:1px solid var(--border);margin:0.25rem 0;padding-top:0.35rem">
              <div style="font-size:0.68rem;color:var(--text3);padding:0 0.5rem;margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.06em">Category</div>
              ${COST_CATEGORIES.map(cat=>`<div class="filter-menu-item" onclick="window._costFilters.category='${cat}';closeCostFilterMenu();renderCostTables(window._costsAllFlush,window._costsAllBreed,window._costsFlushRecs,window._costsBreedRecs,window._costsTransfers,window._costFilters)">${cat}</div>`).join('')}
            </div>` : ''}
          </div>
        </div>

        <div id="cost-filter-input-wrap" style="display:none;align-items:center;gap:0.35rem">
          <input id="cost-filter-input" style="width:160px;padding:0.3rem 0.6rem;font-size:0.82rem" placeholder="" onkeydown="if(event.key==='Enter')applyCostFilterInput();if(event.key==='Escape'){document.getElementById('cost-filter-input-wrap').style.display='none';}">
          <button class="btn btn-primary btn-sm" onclick="applyCostFilterInput()">Apply</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('cost-filter-input-wrap').style.display='none'">✕</button>
        </div>

        ${hasFilters ? `<button onclick="window._costFilters={animal:'',category:'',dateFrom:'',dateTo:''};renderCostTables(window._costsAllFlush,window._costsAllBreed,window._costsFlushRecs,window._costsBreedRecs,window._costsTransfers,window._costFilters)" style="background:none;border:none;color:var(--text3);font-size:0.78rem;cursor:pointer;text-decoration:underline">Clear all</button>` : ''}
      </div>
      ${hasFilters ? `<div style="font-size:0.72rem;color:var(--text3);margin-top:0.4rem">Showing ${totalFiltered} of ${totalAll} records</div>` : ''}
    </div>

    <!-- SUMMARY STATS -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.75rem;margin-bottom:1.25rem">
      <div class="card" style="padding:0.85rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)">$${totalCost.toFixed(0)}</div><div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Total</div></div>
      <div class="card" style="padding:0.85rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--purple)">$${flushTotal.toFixed(0)}</div><div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Flush</div></div>
      <div class="card" style="padding:0.85rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--blue)">$${breedTotal.toFixed(0)}</div><div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Breeding</div></div>
      <div class="card" style="padding:0.85rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)">$${costPerEmbryo}</div><div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Per Embryo</div></div>
      <div class="card" style="padding:0.85rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--green)">$${costPerLamb}</div><div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem">Per Live Lamb</div></div>
    </div>

    ${Object.keys(byCat).length > 0 ? `<div class="card" style="padding:1rem;margin-bottom:1.25rem">
      <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.75rem">By Category</div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
        ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.4rem 0.75rem;display:inline-flex;gap:0.5rem;align-items:center;cursor:pointer" onclick="window._costFilters.category='${cat}';renderCostTables(window._costsAllFlush,window._costsAllBreed,window._costsFlushRecs,window._costsBreedRecs,window._costsTransfers,window._costFilters)"><span style="font-size:0.82rem;font-weight:600;color:var(--text)">${cat}</span><span style="font-size:0.82rem;color:var(--accent);font-weight:700">$${amt.toFixed(0)}</span></div>`).join('')}
      </div>
    </div>` : ''}

    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem">
      <button class="tab active" id="costs-tab-flush" onclick="switchCostsTab('flush')">🔬 Flush Costs (${fc.length})</button>
      <button class="tab" id="costs-tab-breeding" onclick="switchCostsTab('breeding')">🐏 Breeding Costs (${bc.length})</button>
    </div>
    <div id="costs-panel-flush">${renderCostTable(fc,'flush',flushRecs)}</div>
    <div id="costs-panel-breeding" style="display:none">${renderCostTable(bc,'breeding',breedRecs)}</div>`;

  document.getElementById('main-content').innerHTML = html;
}

// Cost filter helpers
let _activeCostFilterKey = null;
function toggleCostFilterMenu() { const m=document.getElementById('cost-filter-menu'); if(m) m.style.display=m.style.display==='none'?'block':'none'; }
function closeCostFilterMenu() { const m=document.getElementById('cost-filter-menu'); if(m) m.style.display='none'; }
function clearCostFilter(key) { window._costFilters[key]=''; renderCostTables(window._costsAllFlush,window._costsAllBreed,window._costsFlushRecs,window._costsBreedRecs,window._costsTransfers,window._costFilters); }
function showCostFilterInput(key) {
  closeCostFilterMenu();
  _activeCostFilterKey = key;
  const wrap=document.getElementById('cost-filter-input-wrap');
  const input=document.getElementById('cost-filter-input');
  if(!wrap||!input) return;
  input.type = (key.includes('date')||key.includes('Date')) ? 'date' : 'text';
  input.placeholder = key==='animal' ? 'Animal name…' : '';
  input.value = window._costFilters[key]||'';
  wrap.style.display='inline-flex';
  input.focus();
}
function applyCostFilterInput() {
  if(!_activeCostFilterKey) return;
  window._costFilters[_activeCostFilterKey] = document.getElementById('cost-filter-input')?.value||'';
  document.getElementById('cost-filter-input-wrap').style.display='none';
  _activeCostFilterKey=null;
  renderCostTables(window._costsAllFlush,window._costsAllBreed,window._costsFlushRecs,window._costsBreedRecs,window._costsTransfers,window._costFilters);
}
document.addEventListener('click', function(e) {
  const wrap=document.getElementById('cost-filter-dropdown-wrap');
  if(wrap&&!wrap.contains(e.target)) closeCostFilterMenu();
});

function renderCostTable(costs, type, records) {
  if (costs.length === 0) return `<div class="empty"><div class="empty-icon">💰</div><h3>No ${type} costs yet</h3></div>`;
  const idField = type === 'flush' ? 'flush_id' : 'breeding_id';
  const total = costs.reduce((s,c)=>s+(c.amount||0),0);
  return `<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.85rem">
    <thead><tr style="background:var(--surface2);border-bottom:2px solid var(--border)">
      <th style="padding:0.65rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)">${type==='flush'?'Flush':'Breeding'}</th>
      <th style="padding:0.65rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)">Description</th>
      <th style="padding:0.65rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)">Category</th>
      <th style="padding:0.65rem 1rem;text-align:left;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)">Date</th>
      <th style="padding:0.65rem 1rem;text-align:right;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)">Amount</th>
      <th style="padding:0.65rem 1rem"></th>
    </tr></thead>
    <tbody>
      ${costs.map(c => {
        const rec = records.find(r => r.id === c[idField]);
        const label = type==='flush'
          ? (()=>{ const d=allLambs.find(l=>l.id===rec?.donor_id); return (d?d.name:'')+' '+(rec?.flush_date||''); })()
          : (()=>{ const l=allLambs.find(x=>x.id===rec?.lamb_id); return (l?l.name:'')+' '+(rec?.breeding_date||''); })();
        return `<tr style="border-bottom:1px solid var(--border)" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
          <td style="padding:0.65rem 1rem;color:var(--text2);font-size:0.82rem;white-space:nowrap">${label.trim()||'—'}</td>
          <td style="padding:0.65rem 1rem;color:var(--text);font-weight:500">${c.description}</td>
          <td style="padding:0.65rem 1rem"><span style="background:var(--surface2);border:1px solid var(--border);border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.75rem;color:var(--text2)">${c.category||'Other'}</span></td>
          <td style="padding:0.65rem 1rem;color:var(--text2);white-space:nowrap">${c.date||'—'}</td>
          <td style="padding:0.65rem 1rem;text-align:right;font-weight:700;color:var(--accent)">$${(c.amount||0).toFixed(2)}</td>
          <td style="padding:0.65rem 1rem;text-align:center"><button class="btn-icon btn-sm" onclick="deleteCost('${c.id}','${type}')" style="color:var(--danger)">🗑</button></td>
        </tr>`;
      }).join('')}
      <tr style="background:var(--surface2);border-top:2px solid var(--border)">
        <td colspan="4" style="padding:0.65rem 1rem;font-weight:700">Total</td>
        <td style="padding:0.65rem 1rem;text-align:right;font-weight:700;color:var(--accent)">$${total.toFixed(2)}</td>
        <td></td>
      </tr>
    </tbody>
  </table></div></div>`;
}

function switchCostsTab(tab) {
  document.getElementById('costs-panel-flush').style.display = tab==='flush'?'':'none';
  document.getElementById('costs-panel-breeding').style.display = tab==='breeding'?'':'none';
  document.getElementById('costs-tab-flush').classList.toggle('active', tab==='flush');
  document.getElementById('costs-tab-breeding').classList.toggle('active', tab==='breeding');
}

async function openAddCost(type) {
  const isFlush = type==='flush';
  const { data: records } = await db.from(isFlush?'embryo_flushes':'breeding_records').select('*').order(isFlush?'flush_date':'breeding_date',{ascending:false});
  const recOpts = (records||[]).map(r => {
    if (isFlush) { const d=allLambs.find(l=>l.id===r.donor_id); return `<option value="${r.id}">${d?.name||'?'} — ${r.flush_date} (${r.flush_type||'MOET'})</option>`; }
    const l=allLambs.find(x=>x.id===r.lamb_id); const s=r.ai_sire_id?allAiRams.find(x=>x.id===r.ai_sire_id):null;
    return `<option value="${r.id}">${l?.name||'?'} × ${s?.name||r.sire_text||'?'} — ${r.breeding_date}</option>`;
  }).join('');
  showModal(`
    <div class="modal-header"><div class="modal-title">💰 Add ${isFlush?'Flush':'Breeding'} Cost</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>${isFlush?'Flush':'Breeding'} Record *</label><select id="cost-rec-id"><option value="">— Select —</option>${recOpts}</select></div>
    <div class="field"><label>Description *</label><input id="cost-desc" placeholder="e.g. Semen straws, Vet fee, Lab processing"></div>
    <div class="row">
      <div class="field"><label>Category</label><select id="cost-cat">${COST_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Amount ($) *</label><input type="number" id="cost-amount" step="0.01" min="0" placeholder="0.00"></div>
    </div>
    <div class="field"><label>Date</label><input type="date" id="cost-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>Notes</label><textarea id="cost-notes" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCost('${type}')">Save Cost</button>
    </div>`);
}

async function saveCost(type) {
  const recId=v('cost-rec-id'), desc=v('cost-desc'), amount=parseFloat(v('cost-amount'));
  if (!recId){toast('Select a record');return;} if(!desc){toast('Description required');return;}
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  const table=type==='flush'?'flush_costs':'breeding_costs';
  const idField=type==='flush'?'flush_id':'breeding_id';
  await db.from(table).insert({[idField]:recId,description:desc,category:v('cost-cat'),amount,date:v('cost-date')||null,notes:v('cost-notes')});
  toast('Cost saved'); closeModal(); renderCosts();
}

async function deleteCost(id, type) {
  await db.from(type==='flush'?'flush_costs':'breeding_costs').delete().eq('id',id);
  // Update the in-memory store
  if (type === 'flush') window._costsAllFlush = (window._costsAllFlush||[]).filter(c=>c.id!==id);
  else window._costsAllBreed = (window._costsAllBreed||[]).filter(c=>c.id!==id);
  const activeTab = document.getElementById('costs-tab-breeding')?.classList.contains('active') ? 'breeding' : 'flush';
  renderCostTables(window._costsAllFlush||[],window._costsAllBreed||[],window._costsFlushRecs||[],window._costsBreedRecs||[],window._costsTransfers||[],window._costFilters||{});
  setTimeout(()=>switchCostsTab(activeTab), 0);
  toast('Deleted');
}

const SUPPLY_UNITS = ['bags', 'bales', 'lbs', 'tons', 'gallons', 'tubs', 'pails', 'units'];
function getSupplyUnits() {
  const custom = JSON.parse(localStorage.getItem('flock_supply_units') || '[]');

}

function filterSupplyLog() {
  const item = document.getElementById('sup-filter-item')?.value?.toLowerCase() || '';
  const supplier = document.getElementById('sup-filter-supplier')?.value?.toLowerCase() || '';
  const cat = document.getElementById('sup-filter-cat')?.value || '';
  const from = document.getElementById('sup-filter-from')?.value || '';
  const to = document.getElementById('sup-filter-to')?.value || '';
  const logs = window._supplyLogs || [];

  const filtered = logs.filter(l => {
    if (item && !l.item?.toLowerCase().includes(item)) return false;
    if (supplier && !(l.supplier||'').toLowerCase().includes(supplier)) return false;
    if (cat && l.category !== cat) return false;
    if (from && l.date < from) return false;
    if (to && l.date > to) return false;
    return true;
  });

  // Update count
  const countEl = document.getElementById('sup-filter-count');
  if (countEl) countEl.textContent = filtered.length < logs.length ? `${filtered.length} of ${logs.length} shown` : '';

  // Rebuild overview from filtered logs
  const today = new Date().toISOString().slice(0,10);
  const byItem = {};
  filtered.forEach(l => {
    if (!byItem[l.item]) byItem[l.item] = { item: l.item, category: l.category, unit: l.unit, entries: [] };
    byItem[l.item].entries.push(l);
  });
  const predictions = Object.values(byItem).map(it => {
    const sorted = [...it.entries].sort((a,b) => a.date > b.date ? 1 : -1);
    const totalQty = sorted.reduce((s,e) => s+(e.quantity||0), 0);
    const totalCost = sorted.reduce((s,e) => s+(e.cost||0), 0);
    let avgDays=null, nextPurchase=null;
    if (sorted.length >= 2) {
      const gaps = [];
      for (let i=1; i<sorted.length; i++) {
        const d1=new Date(sorted[i-1].date), d2=new Date(sorted[i].date);
        gaps.push((d2-d1)/(1000*60*60*24));
      }
      avgDays = Math.round(gaps.reduce((s,g)=>s+g,0)/gaps.length);
      nextPurchase = new Date(new Date(sorted[sorted.length-1].date).getTime()+avgDays*24*60*60*1000).toISOString().slice(0,10);
    }
    return {...it, totalQty, totalCost, avgDays, nextPurchase, lastDate: sorted[sorted.length-1]?.date};
  });
  const dueSoon = predictions.filter(p => p.nextPurchase && p.nextPurchase <= today);

  const overviewEl = document.getElementById('sup-overview');
  if (overviewEl) {
    overviewEl.innerHTML = `
      ${dueSoon.length>0?`<div style="background:#fffbeb;border:1px solid #fcd68a;border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:1.25rem">
        <div style="font-size:0.78rem;font-weight:700;color:#92560a;margin-bottom:0.4rem">⚠️ Due for Reorder (${dueSoon.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:0.4rem">${dueSoon.map(p=>`<span style="background:#fef3cd;border:1px solid #fcd68a;border-radius:0.25rem;padding:0.2rem 0.6rem;font-size:0.78rem;font-weight:600;color:#92560a">${p.item}</span>`).join('')}</div>
      </div>`:''}
      ${predictions.length>0?`
        <div style="font-size:0.78rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.6rem">Overview${item||supplier||cat||from||to?' (filtered)':''}</div>
        <div class="flock-grid" style="margin-bottom:1.25rem">
          ${predictions.map(p => {
            const isDue = p.nextPurchase && p.nextPurchase <= today;
            const isSoon = p.nextPurchase && p.nextPurchase > today && p.nextPurchase <= new Date(Date.now()+7*24*60*60*1000).toISOString().slice(0,10);
            return `<div class="card" style="padding:1rem${isDue?';border-color:#fcd68a':isSoon?';border-color:#fde68a':''}">
              <div style="font-weight:700;color:var(--text)">${p.item}</div>
              <div style="font-size:0.72rem;color:var(--text3);margin-top:0.1rem">${p.category||''}</div>
              <div style="margin-top:0.6rem;display:flex;flex-direction:column;gap:0.2rem">
                <div style="display:flex;justify-content:space-between;font-size:0.8rem"><span style="color:var(--text3)">Total purchased</span><span style="font-weight:600">${p.totalQty} ${p.unit||''}</span></div>
                <div style="display:flex;justify-content:space-between;font-size:0.8rem"><span style="color:var(--text3)">Total spent</span><span style="font-weight:600;color:var(--accent)">$${p.totalCost.toFixed(0)}</span></div>
                ${p.avgDays?`<div style="display:flex;justify-content:space-between;font-size:0.8rem"><span style="color:var(--text3)">Avg reorder</span><span style="font-weight:600">every ${p.avgDays}d</span></div>`:''}
                ${p.nextPurchase?`<div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-top:0.1rem"><span style="color:var(--text3)">Next est.</span><span style="font-weight:600;color:${isDue?'#dc2626':isSoon?'#d97706':'var(--text)'}">${p.nextPurchase}${isDue?' ⚠️':isSoon?' 🔔':''}</span></div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>`:''}`;
  }

  // Rebuild log table
  const tbody = document.getElementById('sup-log-tbody');
  if (!tbody) return;
  tbody.innerHTML = filtered.length === 0
    ? `<tr><td colspan="8" style="padding:2rem;text-align:center;color:var(--text3)">No matching purchases</td></tr>`
    : filtered.map(l => `<tr style="border-bottom:1px solid var(--border)" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <td style="padding:0.65rem 1rem;color:var(--text2);white-space:nowrap">${l.date}</td>
        <td style="padding:0.65rem 1rem;font-weight:600;color:var(--text)">${l.item}</td>
        <td style="padding:0.65rem 1rem"><span style="background:var(--surface2);border:1px solid var(--border);border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.75rem;color:var(--text2)">${l.category||'—'}</span></td>
        <td style="padding:0.65rem 1rem;color:var(--text2)">${l.quantity?l.quantity+' '+(l.unit||''):'—'}</td>
        <td style="padding:0.65rem 1rem;text-align:right;font-weight:700;color:var(--accent)">${l.cost?'$'+parseFloat(l.cost).toFixed(2):'—'}</td>
        <td style="padding:0.65rem 1rem;text-align:right;color:var(--text3);font-size:0.82rem">${l.cost&&l.quantity?'$'+(parseFloat(l.cost)/parseFloat(l.quantity)).toFixed(2)+'/'+(l.unit||'unit'):'—'}</td>
        <td style="padding:0.65rem 1rem;color:var(--text3);font-size:0.82rem">${l.supplier||''}</td>
        <td style="padding:0.65rem 1rem;text-align:center;white-space:nowrap">
          <button class="btn-icon btn-sm" onclick="openEditSupply('${l.id}')" style="margin-right:0.25rem">✏️</button>
          <button class="btn-icon btn-sm" onclick="deleteSupply('${l.id}')" style="color:var(--danger)">🗑</button>
        </td>
      </tr>`).join('');
}

function supCostChanged(source) {
  const qty = parseFloat(document.getElementById('sup-qty')?.value) || 0;
  const totalEl = document.getElementById('sup-cost');
  const cpuEl = document.getElementById('sup-cpu');
  const cpu = parseFloat(cpuEl?.value) || 0;
  const total = parseFloat(totalEl?.value) || 0;

  if (source === 'unit') {
    // Entered cost per unit — calc total if qty known
    if (totalEl && qty > 0 && cpu > 0) totalEl.value = (cpu * qty).toFixed(2);
  } else if (source === 'total') {
    // Entered total cost — calc cpu if qty known
    if (cpuEl && qty > 0 && total > 0 && !cpuEl.matches(':focus')) cpuEl.value = (total / qty).toFixed(2);
  } else if (source === 'qty') {
    // Qty changed — prefer cpu to recalc total, else recalc cpu from total
    if (cpu > 0 && totalEl && qty > 0) totalEl.value = (cpu * qty).toFixed(2);
    else if (total > 0 && cpuEl && qty > 0 && !cpuEl.matches(':focus')) cpuEl.value = (total / qty).toFixed(2);
  }
  updateSupplyCostPerUnit();
}

function updateSupplyCostPerUnit() {
  const cost = parseFloat(document.getElementById('sup-cost')?.value) || 0;
  const qty = parseFloat(document.getElementById('sup-qty')?.value) || 0;
  const unitSel = document.getElementById('sup-unit');
  const unit = unitSel?.value === '__custom__' ? (document.getElementById('sup-unit-custom')?.value || 'unit') : (unitSel?.value || 'unit');
  const lbsPerUnit = parseFloat(document.getElementById('sup-lbs-per-unit')?.value) || 0;
  const cpuEl = document.getElementById('sup-cost-per-unit');
  const cplEl = document.getElementById('sup-cost-per-lb');
  if (cpuEl) cpuEl.textContent = cost > 0 && qty > 0 ? `$${(cost/qty).toFixed(2)} / ${unit}` : '—';
  if (cplEl) {
    const totalLbs = qty * lbsPerUnit;
    cplEl.textContent = cost > 0 && totalLbs > 0 ? `$${(cost/totalLbs).toFixed(3)} / lb` : '—';
  }
  // Also sync cpu input if qty changes
  const cpuInput = document.getElementById('sup-cpu');
  if (cpuInput && cost > 0 && qty > 0 && !cpuInput.matches(':focus')) {
    cpuInput.value = (cost/qty).toFixed(2);
  }
  // Show/hide custom unit input
  const customInput = document.getElementById('sup-unit-custom');
  if (customInput) customInput.style.display = unitSel?.value === '__custom__' ? '' : 'none';
}

function saveCustomSupplyUnit() {
  const val = document.getElementById('sup-unit-custom')?.value?.trim();
  if (!val) return;
  const existing = JSON.parse(localStorage.getItem('flock_supply_units') || '[]');
  if (!existing.includes(val)) {
    existing.push(val);
    localStorage.setItem('flock_supply_units', JSON.stringify(existing));
  }
  // Switch select to new value
  const sel = document.getElementById('sup-unit');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val; opt.selected = true;
    sel.insertBefore(opt, sel.lastChild);
    sel.value = val;
  }
  document.getElementById('sup-unit-custom').style.display = 'none';
  toast(`"${val}" added as unit`);
}

async function saveSupplyItem() {
  const item = document.getElementById('sup-item')?.value?.trim();
  if (!item) return;
  const existing = window._supplyItems || [];
  if (!existing.includes(item)) {
    await db.from('custom_products').insert({ name: item, type: 'supply_item' });
    window._supplyItems = [...existing, item];
    // Refresh datalist
    const dl = document.getElementById('sup-item-list');
    if (dl) dl.innerHTML = window._supplyItems.map(i=>`<option value="${i}">`).join('');
  }
  toast(`"${item}" saved to list`);
}

async function saveSupplySupplier() {
  const supplier = document.getElementById('sup-supplier')?.value?.trim();
  if (!supplier) return;
  const existing = window._supplySuppliers || [];
  if (!existing.includes(supplier)) {
    await db.from('custom_products').insert({ name: supplier, type: 'supply_supplier' });
    window._supplySuppliers = [...existing, supplier];
    const dl = document.getElementById('sup-supplier-list');
    if (dl) dl.innerHTML = window._supplySuppliers.map(s=>`<option value="${s}">`).join('');
  }
  toast(`"${supplier}" saved to list`);
}

async function openAddSupply() {
  const [{ data: items }, { data: suppliers }] = await Promise.all([
    db.from('custom_products').select('*').eq('type', 'supply_item'),
    db.from('custom_products').select('*').eq('type', 'supply_supplier'),
  ]);
  window._supplyItems = (items||[]).map(p=>p.name);
  window._supplySuppliers = (suppliers||[]).map(p=>p.name);
  showModal(_supplyModalHtml('🌾 Log Purchase', 'saveSupply()'));
}

async function saveSupply() {
  const item = document.getElementById('sup-item')?.value?.trim();
  const date = document.getElementById('sup-date')?.value;
  if (!item) { toast('Item required'); return; }
  if (!date) { toast('Date required'); return; }
  // Resolve custom unit
  const supUnitSel = document.getElementById('sup-unit');
  const supUnit = supUnitSel?.value === '__custom__' ? (document.getElementById('sup-unit-custom')?.value?.trim() || null) : (supUnitSel?.value || null);
  if (supUnitSel?.value === '__custom__' && supUnit) saveCustomSupplyUnit();
  await db.from('supply_log').insert({
    item, category: document.getElementById('sup-cat')?.value||null,
    date, quantity: document.getElementById('sup-qty')?.value ? parseFloat(document.getElementById('sup-qty').value) : null,
    unit: supUnit,
    lbs_per_unit: document.getElementById('sup-lbs-per-unit')?.value ? parseFloat(document.getElementById('sup-lbs-per-unit').value) : null,
    cost: document.getElementById('sup-cost')?.value ? parseFloat(document.getElementById('sup-cost').value) : null,
    supplier: document.getElementById('sup-supplier')?.value?.trim()||null,
    notes: document.getElementById('sup-notes')?.value?.trim()||null,
  });
  toast('Logged'); closeModal(); renderSupplies();
}

async function openEditSupply(id) {
  const [{ data: log }, { data: items }, { data: suppliers }] = await Promise.all([
    db.from('supply_log').select('*').eq('id', id).single(),
    db.from('custom_products').select('*').eq('type', 'supply_item'),
    db.from('custom_products').select('*').eq('type', 'supply_supplier'),
  ]);
  if (!log) return;
  window._supplyItems = (items||[]).map(p=>p.name);
  window._supplySuppliers = (suppliers||[]).map(p=>p.name);
  showModal(_supplyModalHtml('✏️ Edit Purchase', `saveEditSupply('${id}')`, log));
  setTimeout(() => updateSupplyCostPerUnit(), 0);
}

async function saveEditSupply(id) {
  const item = document.getElementById('sup-item')?.value?.trim();

async function deleteSupply(id) {

async function openNewInvoice() {
  const { data: last } = await db.from('invoices').select('invoice_number').order('created_at', {ascending:false}).limit(1).single();
  let nextNum = 'INV-001';
  if (last?.invoice_number) {
    const match = last.invoice_number.match(/(\d+)$/);
    if (match) nextNum = 'INV-' + String(parseInt(match[1]) + 1).padStart(3, '0');
  }
  const today = new Date().toISOString().slice(0,10);
  const { data: inv } = await db.from('invoices').insert({
    invoice_number: nextNum, invoice_date: today, status: 'Draft', total: 0, subtotal: 0, tax_rate: 0, tax_amount: 0
  }).select().single();
  if (inv?.id) openInvoice(inv.id);
}

async function openInvoice(id) {
  const [{ data: inv }, { data: items }] = await Promise.all([
    db.from('invoices').select('*').eq('id', id).single(),
    db.from('invoice_items').select('*').eq('invoice_id', id),
  ]);
  if (!inv) return;
  window._currentInvoice = inv;
  window._currentInvoiceItems = items || [];
  renderInvoiceEditor();
}

async function saveInvoiceField(field, value) {
  if (!window._currentInvoice) return;
  await db.from('invoices').update({ [field]: value }).eq('id', window._currentInvoice.id);
  window._currentInvoice[field] = value;
}

function invFillFrom() {
  const p = getFarmProfile();
  const name = p.type==='business' ? (p.bizname||p.name||'') : (p.name||'');
  const addr = [p.street, [p.city,p.state,p.zip].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val||''; };
  set('inv-from-name', name);
  set('inv-from-contact', p.owner||'');
  set('inv-from-address', addr);
  set('inv-from-phone', p.phone||'');
  set('inv-from-email', p.email||'');
  set('inv-from-ein', p.ein||'');
}

async function saveInvoiceAll() {
  if (!window._currentInvoice) return;
  const id = window._currentInvoice.id;
  const items = window._currentInvoiceItems || [];
  const subtotal = items.reduce((s,i) => s+(i.total||0), 0);
  const taxRate = parseFloat(document.getElementById('inv-tax')?.value) || 0;
  const taxAmt = subtotal * (taxRate/100);
  const total = subtotal + taxAmt;
  await db.from('invoices').update({
    invoice_number: document.getElementById('inv-number')?.value,
    invoice_date: document.getElementById('inv-date')?.value,
    from_name: document.getElementById('inv-from-name')?.value,
    from_contact: document.getElementById('inv-from-contact')?.value,
    from_address: document.getElementById('inv-from-address')?.value,
    from_phone: document.getElementById('inv-from-phone')?.value,
    from_email: document.getElementById('inv-from-email')?.value,
    from_ein: document.getElementById('inv-from-ein')?.value,
    buyer_name: document.getElementById('inv-buyer')?.value,
    buyer_address: document.getElementById('inv-address')?.value,
    buyer_email: document.getElementById('inv-email')?.value,
    buyer_phone: document.getElementById('inv-phone')?.value,
    notes: document.getElementById('inv-notes')?.value,
    status: document.getElementById('inv-status')?.value,
    tax_rate: taxRate, tax_amount: taxAmt, subtotal, total,
  }).eq('id', id);
  Object.assign(window._currentInvoice, {
    invoice_number: document.getElementById('inv-number')?.value,
    invoice_date: document.getElementById('inv-date')?.value,
    from_name: document.getElementById('inv-from-name')?.value,
    from_contact: document.getElementById('inv-from-contact')?.value,
    from_address: document.getElementById('inv-from-address')?.value,
    from_phone: document.getElementById('inv-from-phone')?.value,
    from_email: document.getElementById('inv-from-email')?.value,
    from_ein: document.getElementById('inv-from-ein')?.value,
    buyer_name: document.getElementById('inv-buyer')?.value,
    buyer_address: document.getElementById('inv-address')?.value,
    buyer_email: document.getElementById('inv-email')?.value,
    buyer_phone: document.getElementById('inv-phone')?.value,
    notes: document.getElementById('inv-notes')?.value,
    status: document.getElementById('inv-status')?.value,
    subtotal, tax_rate: taxRate, tax_amount: taxAmt, total,
  });
  toast('Invoice saved!');
  renderInvoiceEditor();
}

async function updateInvoiceTax(rate) {
  if (!window._currentInvoice) return;
  const items = window._currentInvoiceItems || [];
  const subtotal = items.reduce((s,i) => s+(i.total||0),0);
  const taxAmt = subtotal * (parseFloat(rate)||0) / 100;
  const total = subtotal + taxAmt;
  Object.assign(window._currentInvoice, { tax_rate: parseFloat(rate)||0, tax_amount: taxAmt, total });
  await db.from('invoices').update({ tax_rate: parseFloat(rate)||0, tax_amount: taxAmt, subtotal, total }).eq('id', window._currentInvoice.id);
  renderInvoiceEditor();
}

  // Load saved invoice items from localStorage

  const savedOpts = savedItems.map(s=>`<option value="${s.desc}|||${s.price}">${s.desc}${s.price?' — $'+parseFloat(s.price).toFixed(2):''}</option>`).join('');

  showModal(`
    <div class="modal-header"><div class="modal-title">${editItem?'✏️ Edit Item':'+ Add Item'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>

    </div>
    <div id="ii-animal-section" style="${!isAnimal?'display:none':''}">
      <div class="field"><label>Select Animal</label>
        <select id="ii-lamb" onchange="iiLambSelected()" style="font-size:0.85rem"><option value="">— Select —</option>${lambOpts}</select>

          <select id="ii-saved-pick" onchange="iiPickSaved()" style="flex:1;font-size:0.85rem">

      </div>` : ''}

      <div style="display:flex;gap:0.35rem;align-items:center">

        <button type="button" id="ii-save-btn" onclick="iiSaveItem()" title="Save as default item" style="background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.35rem 0.5rem;cursor:pointer;color:var(--accent);font-size:0.85rem" ${isAnimal?'style="display:none"':''}>💾</button>
      </div>
    </div>
    <div class="row">

function iiSetType(type) {
  const sec = document.getElementById('ii-animal-section');
  const savedSec = document.getElementById('ii-saved-section');
  const saveBtn = document.getElementById('ii-save-btn');
  if (sec) sec.style.display = type==='animal' ? '' : 'none';
  if (savedSec) savedSec.style.display = type==='other' ? '' : 'none';
  if (saveBtn) saveBtn.style.display = type==='other' ? '' : 'none';
  ['animal','other'].forEach(t => {
    const btn = document.getElementById(`ii-type-${t}`);
    if (btn) { btn.style.background = t===type?'var(--accent)':'var(--surface2)'; btn.style.color = t===type?'#fff':'var(--text)'; }
  });
}

function iiPickSaved() {
  const val = document.getElementById('ii-saved-pick')?.value;
  if (!val) return;
  const [desc, price] = val.split('|||');
  const descEl = document.getElementById('ii-desc');
  const priceEl = document.getElementById('ii-price');
  if (descEl) descEl.value = desc || '';
  if (priceEl && price && price !== 'undefined') priceEl.value = price;
  iiUpdateTotal();
}

function iiSaveItem() {
  const desc = document.getElementById('ii-desc')?.value?.trim();
  const price = document.getElementById('ii-price')?.value?.trim();
  if (!desc) { toast('Enter a description first'); return; }
  const saved = JSON.parse(localStorage.getItem('flock_invoice_items') || '[]');
  if (saved.find(s => s.desc === desc)) { toast('Already saved'); return; }
  saved.push({ desc, price: price||'' });
  localStorage.setItem('flock_invoice_items', JSON.stringify(saved));
  toast(`"${desc}" saved as default item`);
  // Refresh the dropdown
  const sel = document.getElementById('ii-saved-pick');
  if (sel) {

function iiDeleteSaved() {

  const updated = saved.filter(s => s.desc !== desc);
