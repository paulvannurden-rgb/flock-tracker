async function saveInvoiceItem(editId) {
  const lambId = document.getElementById('ii-lamb')?.value || null;
  const desc = document.getElementById('ii-desc')?.value?.trim();
  if (!desc) { toast('Description required'); return; }
  const qty = parseInt(document.getElementById('ii-qty')?.value) || 1;
  const price = parseFloat(document.getElementById('ii-price')?.value) || 0;
  const total = qty * price;

  if (editId) {
    await db.from('invoice_items').update({ lamb_id: lambId||null, description: desc, quantity: qty, unit_price: price, total }).eq('id', editId);
    window._currentInvoiceItems = (window._currentInvoiceItems||[]).map(i => i.id===editId ? {...i, lamb_id:lambId||null, description:desc, quantity:qty, unit_price:price, total} : i);
  } else {
    const { data: item } = await db.from('invoice_items').insert({ invoice_id: window._currentInvoice.id, lamb_id: lambId||null, description: desc, quantity: qty, unit_price: price, total }).select().single();
    if (item) window._currentInvoiceItems = [...(window._currentInvoiceItems||[]), item];
  }
  // Recalc totals
  const subtotal = (window._currentInvoiceItems||[]).reduce((s,i)=>s+(i.total||0),0);
  const taxRate = window._currentInvoice.tax_rate || 0;
  const taxAmt = subtotal * (taxRate/100);
  const invTotal = subtotal + taxAmt;
  await db.from('invoices').update({ subtotal, tax_amount: taxAmt, total: invTotal }).eq('id', window._currentInvoice.id);
  Object.assign(window._currentInvoice, { subtotal, tax_amount: taxAmt, total: invTotal });
  toast(editId ? 'Item updated' : 'Item added');
  closeModal();
  renderInvoiceEditor();
}

}

function openPrintWindow(html, title) {
  const win = window.open('', '_blank');
  if (win) {
    win.document.write(html);
    win.document.close();
    setTimeout(() => win.print(), 400);
  } else {
    // Popup blocked — open in same tab via blob URL
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.click();
    // Fallback: write to current page in a print overlay
    setTimeout(() => {
      if (!document.hidden) {
        const overlay = document.createElement('div');
        overlay.id = 'print-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:0';
        overlay.innerHTML = `<div style="position:fixed;top:10px;right:10px;z-index:10000;display:flex;gap:0.5rem">
          <button onclick="window.print()" style="padding:0.5rem 1rem;background:#2e7d4f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px">🖨️ Print</button>
          <button onclick="document.getElementById('print-overlay').remove()" style="padding:0.5rem 1rem;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px">✕ Close</button>
        </div>
        <iframe srcdoc="" id="print-frame" style="width:100%;height:100vh;border:none"></iframe>`;
        document.body.appendChild(overlay);
        document.getElementById('print-frame').srcdoc = html;
      }
    }, 300);
  }
}

function feCheckVisible(checked) {

function feSelFilter(filter) {
  ['all','show','breeding'].forEach(f => {
    const btn = document.getElementById(`fe-sel-${f}-btn`);
    if (btn) { btn.style.background = f===filter?'var(--accent)':'var(--surface2)'; btn.style.color = f===filter?'#fff':'var(--text)'; }
  });
  allLambs.forEach(l => {
    const row = document.getElementById(`fe-row-${l.id}`);
    if (!row) return;
    const ft = l.flock_type || '';
    const show = filter==='all'
      || (filter==='show' && (ft==='Show'||ft==='Both'||(!ft&&l.sex==='Wether')))
      || (filter==='breeding' && (ft==='Breeding'||ft==='Both'||(!ft&&l.sex!=='Wether')));
    row.style.display = show ? 'flex' : 'none';
  });
  updateFePreview();
}

function feFilterList() {
  const q = document.getElementById('fe-search')?.value?.toLowerCase() || '';
  allLambs.forEach(l => {
    const row = document.getElementById(`fe-row-${l.id}`);
    if (!row) return;
    const match = !q || l.name.toLowerCase().includes(q) || (l.ear_tag||'').toLowerCase().includes(q) || (l.alt_id||'').toLowerCase().includes(q) || (l.scrapie_id||'').toLowerCase().includes(q);
    row.style.display = match ? 'flex' : 'none';
  });
  updateFePreview();
}

}

function getFlockExportFiltered() {
  const flock = document.getElementById('fe-flock')?.value || '';
  const status = document.getElementById('fe-status')?.value || '';
  const sex = document.getElementById('fe-sex')?.value || '';
  const breed = document.getElementById('fe-breed')?.value || '';
  const role = document.getElementById('fe-role')?.value || '';
  const dobFrom = document.getElementById('fe-dob-from')?.value || '';
  const dobTo = document.getElementById('fe-dob-to')?.value || '';

  return allLambs.filter(l => {
    const ft = l.flock_type || '';
    if (flock === 'Show' && !(ft==='Show' || ft==='Both' || (!ft && l.sex==='Wether'))) return false;
    if (flock === 'Breeding' && !(ft==='Breeding' || ft==='Both' || (!ft && l.sex!=='Wether'))) return false;
    if (flock === 'Both' && ft !== 'Both') return false;
    if (status && (l.status||'Active') !== status) return false;
    if (sex && l.sex !== sex) return false;
    if (breed && l.breed !== breed) return false;
    if (role && (l.role||'Standard') !== role) return false;
    if (dobFrom && l.dob && l.dob < dobFrom) return false;
    if (dobTo && l.dob && l.dob > dobTo) return false;
    return true;
  });
}

async function exportFlock() {

    const selectedIds = new Set(Array.from(document.querySelectorAll('.fe-cb:checked')).map(c => c.value));

    filtered = getFlockExportFiltered();

    filtered = allLambs;

  const rows = filtered.map(l => {
    const sire = l.sire_id ? allLambs.find(x=>x.id===l.sire_id) : null;
    const dam = l.dam_id ? allLambs.find(x=>x.id===l.dam_id) : null;
    return { Name:l.name, 'Ear Tag':l.ear_tag||'', 'Alt ID':l.alt_id||'', 'Scrapie ID':l.scrapie_id||'', 'Genetic Code':l.genetic_code||'', DOB:l.dob||'', Sex:l.sex||'', Breed:l.breed||'', 'Flock Type':l.flock_type||'', Role:l.role||'Standard', Status:l.status||'Active', 'Status Date':l.status_date||'', 'Status Note':l.status_note||'', Sire:sire?sire.name:(l.sire_text||''), Dam:dam?dam.name:(l.dam_text||''), Notes:l.notes||'' };

}

function updateRePreview(type) {
  const flock = document.getElementById('re-flock')?.value || '';
  const status = document.getElementById('re-status')?.value || '';
  const sex = document.getElementById('re-sex')?.value || '';
  const breed = document.getElementById('re-breed')?.value || '';

  // Apply dropdown filters to animal list visibility
  allLambs.forEach(l => {
    const row = document.getElementById(`re-row-${l.id}`);
    if (!row) return;
    const ft = l.flock_type || '';
    let show = true;
    if (flock === 'Show' && !(ft==='Show'||ft==='Both'||(!ft&&l.sex==='Wether'))) show = false;
    if (flock === 'Breeding' && !(ft==='Breeding'||ft==='Both'||(!ft&&l.sex!=='Wether'))) show = false;
    if (flock === 'Both' && ft !== 'Both') show = false;
    if (status && (l.status||'Active') !== status) show = false;
    if (sex && l.sex !== sex) show = false;
    if (breed && l.breed !== breed) show = false;
    row.style.display = show ? 'flex' : 'none';
  });

  const checked = document.querySelectorAll('.re-cb:checked').length;
  const el = document.getElementById('re-preview');
  if (el) el.textContent = `Records for ${checked} animal${checked!==1?'s':''} will be exported`;
}

  const { data } = await db.from('health_records').select('*, lambs(name,ear_tag)').order('date',{ascending:false});

    .filter(r => !filterIds || filterIds.has(r.lamb_id))
    .map(r=>({ Lamb:r.lambs?.name||'', 'Ear Tag':r.lambs?.ear_tag||'', Type:r.type, Product:r.product, 'Start Date':r.date, 'End Date':r.end_date||'', Dose:r.dose||'', Route:r.route||'', Notes:r.notes||'' }));

}

function downloadXLSX(rows, filename) {
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, `${filename}-${new Date().toISOString().slice(0,10)}.xlsx`);
}

function showModal(html, wide=false) {
  let overlay = document.getElementById('modal-overlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.id='modal-overlay'; overlay.className='modal-overlay'; overlay.onclick=e=>{if(e.target===overlay)closeModal();}; document.body.appendChild(overlay); }
  overlay.innerHTML = `<div class="modal" style="${wide?'max-width:680px':''}">${html}</div>`;
  overlay.style.display = 'flex';
}
function closeModal() {
  const o = document.getElementById('modal-overlay');
  if (o) o.style.display = 'none';
}

// ── ADD/EDIT LAMB ─────────────────────────────────────
function openAddLamb() { showLambModal(null); }
function openEditLamb(id) { showLambModal(allLambs.find(l=>l.id===id)); }

function showLambModal(lamb) {
  const isEdit = !!lamb;
  const lambOptions = allLambs.map(l=>`<option value="${l.id}" ${lamb&&lamb.dam_id===l.id?'selected':''}>${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}</option>`).join('');
  const sireOpts = sireOptions(lamb?.sire_id ? 'lamb:'+lamb.sire_id : (lamb?.ai_sire_id ? 'ai:'+lamb.ai_sire_id : ''));
  const defaultFlockType = lamb?.flock_type || (lamb?.sex === 'Wether' ? 'Show' : 'Breeding');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Edit Lamb':'Add Lamb to Flock'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="row"><div class="field"><label>Name *</label><input id="lm-name" value="${lamb?.name||''}" placeholder="e.g. Daisy"></div>
    <div class="field"></div></div>
    <div class="row"><div class="field"><label>Ear Tag</label><input id="lm-tag" value="${lamb?.ear_tag||''}" placeholder="e.g. A04"></div>
    <div class="field"><label>Alt ID</label><input id="lm-alt-id" value="${lamb?.alt_id||''}" placeholder="e.g. USDA tag, registry #"></div></div>
    <div class="row"><div class="field"><label>Scrapie ID</label><input id="lm-scrapie" value="${lamb?.scrapie_id||''}" placeholder="Scrapie ID"></div>
    <div class="field"><label>Genetic Code</label><input id="lm-genetic" value="${lamb?.genetic_code||''}" placeholder="Free text"></div></div>
    <div class="row"><div class="field"><label>Date of Birth</label><input type="date" id="lm-dob" value="${lamb?.dob||''}"></div>
    <div class="field"><label>Sex</label><select id="lm-sex" onchange="autoSetFlockType()"><option ${lamb?.sex==='Ewe'?'selected':''}>Ewe</option><option ${lamb?.sex==='Ram'?'selected':''}>Ram</option><option ${lamb?.sex==='Wether'?'selected':''}>Wether</option></select></div></div>
    <div class="row"><div class="field"><label>Breed</label><input id="lm-breed" value="${lamb?.breed||''}" placeholder="e.g. Suffolk"></div>
    <div class="field"><label>Role</label><select id="lm-role">
      <option ${(!lamb||lamb.role==='Standard')?'selected':''}>Standard</option>
      <option ${lamb?.role==='Embryo Donor'?'selected':''}>Embryo Donor</option>
      <option ${lamb?.role==='Embryo Recipient'?'selected':''}>Embryo Recipient</option>
      <option ${lamb?.role==='Both'?'selected':''}>Both</option>
    </select></div></div>
    <div class="row">
      <div class="field"><label>Flock</label><select id="lm-flock-type">
        <option ${defaultFlockType==='Breeding'?'selected':''} value="Breeding">Breeding Flock</option>
        <option ${defaultFlockType==='Show'?'selected':''} value="Show">Show Flock</option>
        <option ${defaultFlockType==='Both'?'selected':''} value="Both">Both Flocks</option>
      </select></div>
      <div class="field"></div>
    </div>
    <div class="row">
      <div class="field"><label>Sire</label><select id="lm-sire-id">${sireOpts}</select></div>
      <div class="field"><label>Sire (if not in system)</label><input id="lm-sire-text" value="${lamb?.sire_text||''}" placeholder="Sire name/ID"></div>
    </div>
    <div class="row">
      <div class="field"><label>Dam</label><select id="lm-dam-id"><option value="">— Select or type below —</option>${lambOptions}</select></div>
      <div class="field"><label>Dam (if not in system)</label><input id="lm-dam-text" value="${lamb?.dam_text||''}" placeholder="Dam name/ID"></div>
    </div>

function autoSetFlockType() {
  const sex = document.getElementById('lm-sex')?.value;
  const flockType = document.getElementById('lm-flock-type');
  if (flockType && sex === 'Wether') flockType.value = 'Show';
}

async function saveLamb(id) {
  const name = document.getElementById('lm-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const colorIdx = allLambs.length % TAG_COLORS.length;
  const { sire_id, ai_sire_id } = parseSireSelection(v('lm-sire-id'));
  const flock_type = v('lm-flock-type') || (v('lm-sex') === 'Wether' ? 'Show' : 'Breeding');
  const payload = {
    name, ear_tag: v('lm-tag'), alt_id: v('lm-alt-id')||null, scrapie_id: v('lm-scrapie'), genetic_code: v('lm-genetic'),
    dob: v('lm-dob')||null, sex: v('lm-sex'), breed: v('lm-breed'), role: v('lm-role'),
    flock_type, sire_id, ai_sire_id, sire_text: v('lm-sire-text'),
    dam_id: v('lm-dam-id')||null, dam_text: v('lm-dam-text'), notes: v('lm-notes'),
    tag_color: id ? undefined : TAG_COLORS[colorIdx]
  };
  if (id) { await db.from('lambs').update(payload).eq('id', id); toast('Lamb updated'); }
  else { await db.from('lambs').insert(payload); toast('Lamb added'); }
  closeModal();
  await loadLambs();
  if (id) renderLambDetail(); else renderFlock();
}

function confirmDeleteLamb(id) {
  const el = document.getElementById('delete-lamb-btn');
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0.35rem;align-items:flex-end">
      <span style="font-size:0.75rem;color:#c08080;text-align:right">Permanently delete this lamb<br>and all their records?</span>
      <div style="display:flex;gap:0.35rem">
        <button class="btn btn-danger btn-sm" onclick="deleteLamb('${id}')">Yes, Delete</button>
        <button class="btn-icon" onclick="renderLambDetail()">Cancel</button>
      </div>
    </div>`;
}

async function deleteLamb(id) {
  // Clear any references to this lamb as a sire or dam on other lambs
  await db.from('lambs').update({ sire_id: null }).eq('sire_id', id);
  await db.from('lambs').update({ dam_id: null }).eq('dam_id', id);
  // Clear as sire on breeding records
  await db.from('breeding_records').update({ sire_id: null }).eq('sire_id', id);
  // Clear as dam on AI rams
  await db.from('ai_rams').update({ dam_lamb_id: null }).eq('dam_lamb_id', id);
  // Now delete
  const { error } = await db.from('lambs').delete().eq('id', id);
  if (error) { toast('Error deleting — check for linked records'); console.error(error); return; }
  toast('Lamb deleted'); await loadLambs(); showPage('flock');
}

    <div class="modal-header"><div class="modal-title">${isEdit?'Edit Record':'Log Health Record'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Type</label>
      <div style="display:flex;gap:0.5rem">
        <button class="btn ${type==='vaccine'?'btn-primary':'btn-secondary'}" style="flex:1" onclick="switchRecordType('vaccine')">💉 Vaccine</button>
        <button class="btn ${type==='medication'?'btn-primary':'btn-secondary'}" style="flex:1" onclick="switchRecordType('medication')">💊 Medication</button>
      </div>
    </div>
    ${isEdit ? `
      <div class="field" id="rec-product-field"><label>Product *</label>
        <select id="rec-product" onchange="checkCustomProduct()">
          <option value="">— Select —</option>
          <optgroup label="Standard">${opts}</optgroup>
          <optgroup label="My Products">${(type==='vaccine'?customProducts.vaccine:customProducts.medication).map(o=>`<option ${rec?.product===o?'selected':''}>${o}</option>`).join('')}</optgroup>
          <option value="__custom__">+ Add custom product…</option>
        </select>
      </div>
      <div class="field" id="rec-custom-field" style="display:none"><label>Custom Product Name</label>
        <input id="rec-custom-name" placeholder="Enter product name">
        <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;cursor:pointer">
          <input type="checkbox" id="rec-save-custom" style="accent-color:var(--accent);width:14px;height:14px">
          <span style="font-size:0.82rem;color:var(--text2)">Save to my product list</span>
        </label>
      </div>
    ` : `
      <div id="rec-products-list"></div>
      <button class="btn-icon" style="margin-bottom:0.75rem" onclick="addRecProduct()">+ Add Another Product</button>
    `}
    <div class="row">
      <div class="field"><label>Start Date *</label><input type="date" id="rec-date" value="${rec?.date||new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>End Date <span style="color:var(--text3);font-size:0.72rem">(optional)</span></label><input type="date" id="rec-end-date" value="${rec?.end_date||''}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Dose</label><input id="rec-dose" value="${rec?.dose||''}" placeholder="e.g. 2ml"></div>
      <div class="field"><label>Route</label><select id="rec-route">${ROUTES.map(r=>`<option ${rec?.route===r?'selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Notes</label><input id="rec-notes" value="${rec?.notes||''}" placeholder="Lot number, reactions…"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecord('${rec?.id||''}')">${isEdit?'Save Changes':'Save Record'}</button>
    </div>
  `);

}

function buildProductDropdown(selectedVal) {
  const type = window._recType || 'vaccine';
  const vaccines = [...BASE_VACCINES, ...customProducts.vaccine];
  const meds = [...BASE_MEDS, ...customProducts.medication];
  const opts = (type==='vaccine'?vaccines:meds).map(o=>`<option ${selectedVal===o?'selected':''}>${o}</option>`).join('');
  const customOpts = (type==='vaccine'?customProducts.vaccine:customProducts.medication).map(o=>`<option ${selectedVal===o?'selected':''}>${o}</option>`).join('');
  return `<option value="">— Select —</option><optgroup label="Standard">${opts}</optgroup>${customOpts?`<optgroup label="My Products">${customOpts}</optgroup>`:''}<option value="__custom__">+ Add custom product…</option>`;
}

function renderRecProductsList() {
  const el = document.getElementById('rec-products-list');
  if (!el) return;
  el.innerHTML = window._recProducts.map((p, i) => `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 0.75rem;margin-bottom:0.5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">
        <span style="font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em">Product ${i+1}</span>
        ${i>0?`<button class="btn-icon" style="color:#c07070;border-color:#5a2a2a;font-size:0.72rem;padding:0.15rem 0.4rem" onclick="removeRecProduct(${i})">✕ Remove</button>`:''}
      </div>
      <select style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.5rem 0.7rem;font-size:0.88rem;font-family:'Source Serif 4',serif" onchange="window._recProducts[${i}].product=this.value;window._recProducts[${i}].customName='';renderRecProductsList()">
        ${buildProductDropdown(p.product)}
      </select>
      ${p.product==='__custom__'?`
        <input style="width:100%;margin-top:0.4rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.5rem 0.7rem;font-size:0.88rem;box-sizing:border-box" placeholder="Enter product name" value="${p.customName||''}" oninput="window._recProducts[${i}].customName=this.value">
        <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.4rem;cursor:pointer">
          <input type="checkbox" ${p.saveCustom?'checked':''} onchange="window._recProducts[${i}].saveCustom=this.checked" style="accent-color:var(--accent);width:13px;height:13px">
          <span style="font-size:0.78rem;color:var(--text2)">Save to my product list</span>
        </label>
      `:''}
    </div>`).join('');
}

function addRecProduct() {
  window._recProducts.push({ product:'', customName:'', saveCustom:false });
  renderRecProductsList();
}

function removeRecProduct(i) {
  window._recProducts.splice(i, 1);
  renderRecProductsList();
}

function switchRecordType(type) {
  window._recType = type;
  const vaccines = [...BASE_VACCINES, ...customProducts.vaccine];
  const meds = [...BASE_MEDS, ...customProducts.medication];
  const opts = (type==='vaccine'?vaccines:meds).map(o=>`<option>${o}</option>`).join('');
  // Update single product dropdown (edit mode)
  const prodEl = document.getElementById('rec-product');
  if (prodEl) prodEl.innerHTML = `<option value="">— Select —</option><optgroup label="Standard">${opts}</optgroup><option value="__custom__">+ Add custom product…</option>`;
  // Update multi-product list (add mode)
  if (window._recProducts) { window._recProducts.forEach(p => p.product=''); renderRecProductsList(); }
  document.querySelectorAll('.modal .btn').forEach(b => {
    if (b.textContent.includes('Vaccine')) b.className = `btn ${type==='vaccine'?'btn-primary':'btn-secondary'}`;
    if (b.textContent.includes('Medication')) b.className = `btn ${type==='medication'?'btn-primary':'btn-secondary'}`;
  });
}

function checkCustomProduct() {
  const val = document.getElementById('rec-product')?.value;
  const el = document.getElementById('rec-custom-field');
  if (el) el.style.display = val === '__custom__' ? '' : 'none';
}

async function openEditRecord(id) {
  const { data } = await db.from('health_records').select('*').eq('id', id).single();
  if (data) openAddRecord(data);
}

async function saveRecord(id) {
  const type = window._recType || 'vaccine';
  const date = v('rec-date');
  const endDate = v('rec-end-date') || null;
  const dose = v('rec-dose');
  const route = v('rec-route');
  const notes = v('rec-notes');

  if (id) {
    // Edit single record
    const productSel = document.getElementById('rec-product').value;
    let product = productSel === '__custom__' ? v('rec-custom-name') : productSel;
    if (!product) { toast('Select a product'); return; }
    if (productSel === '__custom__' && document.getElementById('rec-save-custom').checked) {
      await db.from('custom_products').insert({ type, name: product });
      await loadCustomProducts();
    }
    await db.from('health_records').update({ lamb_id: currentLambId, type, product, date, end_date: endDate, dose, route, notes }).eq('id', id);
    toast('Record updated');
  } else {
    // Add multiple products
    const products = window._recProducts || [];
    const resolved = [];
    for (const p of products) {
      const name = p.product === '__custom__' ? p.customName.trim() : p.product;
      if (!name) continue;
      if (p.product === '__custom__' && p.saveCustom) {
        await db.from('custom_products').insert({ type, name });
      }
      resolved.push(name);
    }
    if (resolved.length === 0) { toast('Select at least one product'); return; }
    await db.from('health_records').insert(resolved.map(product => ({ lamb_id: currentLambId, type, product, date, end_date: endDate, dose, route, notes })));
    if (resolved.length > 1) { await loadCustomProducts(); toast(`${resolved.length} records saved`); }
    else toast('Record saved');
  }
  window._recProducts = [];
  closeModal(); loadLambTab();
}

// ── BREEDING ──────────────────────────────────────────
function openAddBreeding(rec) {
  const isEdit = !!rec;
  const currentSire = rec?.sire_id ? 'lamb:'+rec.sire_id : (rec?.ai_sire_id ? 'ai:'+rec.ai_sire_id : '');
  const outcomes = ['Pending','Confirmed Pregnant','Not Pregnant','Lamb Born','Failed'];
  const aiSireId = rec?.ai_sire_id || '';
  const semenOpts = aiSireId ? getSemenOptionsForRam(aiSireId, rec?.semen_location) : '<option value="">— Select sire first —</option>';
  const hasSemenInv = aiSireId && allSemenInventory.some(i => i.ai_ram_id === aiSireId && i.straws > 0);

  showModal(`
    <div class="modal-header"><div class="modal-title">${isEdit?'Edit Breeding':'Log Breeding'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Sire</label><select id="br-sire-id" onchange="updateBreedingSemenOpts()">${sireOptions(currentSire)}</select></div>
    <div class="field"><label>Sire (if not in system)</label><input id="br-sire-text" value="${rec?.sire_text||''}" placeholder="Sire name or ID"></div>
    <div id="br-semen-section" style="${hasSemenInv||!aiSireId?'':'display:none'}">
      <div class="row">
        <div class="field"><label>Semen Location</label><select id="br-semen-loc">${semenOpts}</select></div>
        <div class="field"><label>Straws Used</label><input type="number" id="br-straws-used" value="${rec?.straws_used||1}" min="0" step="0.5" placeholder="e.g. 1"></div>
      </div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:-0.5rem;margin-bottom:0.75rem">Leave straws at 0 to skip deduction</div>
    </div>
    <div class="row">
      <div class="field"><label>Breeding Date</label><input type="date" id="br-date" value="${rec?.breeding_date||''}" oninput="calcExpectedLamb()"></div>
      <div class="field"><label>Expected Lamb Date <span style="color:var(--text3);font-size:0.75rem">(auto +147 days)</span></label><input type="date" id="br-expected" value="${rec?.expected_lamb_date||''}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Outcome</label><select id="br-outcome">
        ${outcomes.map(o=>`<option ${(rec?.outcome||'Pending')===o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div class="field"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="br-notes">${rec?.notes||''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBreeding('${rec?.id||''}')">${isEdit?'Save Changes':'Save Record'}</button>
    </div>`);
}

function updateBreedingSemenOpts() {
  const sel = document.getElementById('br-sire-id');
  const val = sel?.value || '';
  const section = document.getElementById('br-semen-section');
  const locSel = document.getElementById('br-semen-loc');
  if (!section || !locSel) return;
  if (val.startsWith('ai:')) {
    const aiId = val.replace('ai:', '');
    const hasInv = allSemenInventory.some(i => i.ai_ram_id === aiId && i.straws > 0);
    section.style.display = hasInv ? '' : 'none';
    locSel.innerHTML = getSemenOptionsForRam(aiId, '');
  } else {
    section.style.display = 'none';
  }
}

async function openEditBreeding(id) {
  const { data } = await db.from('breeding_records').select('*').eq('id', id).single();
  if (data) openAddBreeding(data);
}
async function saveBreeding(id) {
  const { sire_id, ai_sire_id } = parseSireSelection(v('br-sire-id'));
  const payload = { lamb_id: currentLambId, sire_id, ai_sire_id, sire_text: v('br-sire-text'), breeding_date: v('br-date')||null, expected_lamb_date: v('br-expected')||null, outcome: v('br-outcome')||'Pending', notes: v('br-notes') };
  if (id) {
    await db.from('breeding_records').update(payload).eq('id', id);
    toast('Updated');
  } else {
    const { data } = await db.from('breeding_records').insert(payload).select().single();
    const savedId = data?.id;
    if (ai_sire_id && savedId) {
      const loc = v('br-semen-loc');
      const straws = parseFloat(v('br-straws-used')) || 0;
      if (loc && straws > 0) await deductSemenInventory(ai_sire_id, loc, straws, 'breeding', savedId);
    }
    toast('Breeding logged');

  closeModal(); loadLambTab();
}

async function openEditFlush(id) {

function showFlushModal(flush) {
  const isEdit = !!flush;
  const currentSire = flush?.sire_id ? 'lamb:'+flush.sire_id : (flush?.ai_sire_id ? 'ai:'+flush.ai_sire_id : '');
  const aiSireId = flush?.ai_sire_id || '';
  const semenOpts = aiSireId ? getSemenOptionsForRam(aiSireId, flush?.semen_location) : '<option value="">— Select sire first —</option>';
  const hasSemenInv = aiSireId && allSemenInventory.some(i => i.ai_ram_id === aiSireId && i.straws > 0);

  showModal(`
    <div class="modal-header"><div class="modal-title">${isEdit ? 'Edit Flush' : 'Log Embryo Flush'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="row">
      <div class="field"><label>Flush Date *</label><input type="date" id="fl-date" value="${flush?.flush_date||new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>Flush Type</label><select id="fl-type">
        <option ${(flush?.flush_type||'MOET')==='MOET'?'selected':''}>MOET</option>
        <option ${flush?.flush_type==='IVF'?'selected':''}>IVF</option>
      </select></div>
    </div>
    <div class="row">
      <div class="field"><label>Embryos Collected</label><input type="number" id="fl-count" value="${flush?.embryos_collected||''}" placeholder="e.g. 8"></div>
      <div class="field"><label>Embryos Transferred</label><input type="number" id="fl-transferred" value="${flush?.embryos_transferred||''}" placeholder="e.g. 6"></div>
    </div>
    <div class="field"><label>Sire</label><select id="fl-sire-id" onchange="updateFlushSemenOpts()">${sireOptions(currentSire)}</select></div>
    <div class="field"><label>Sire (if not in system)</label><input id="fl-sire-text" value="${flush?.sire_text||''}" placeholder="Sire name or ID"></div>
    <div id="fl-semen-section" style="${hasSemenInv?'':'display:none'}">
      <div class="row">
        <div class="field"><label>Semen Location</label><select id="fl-semen-loc">${semenOpts}</select></div>
        <div class="field"><label>Straws Used</label><input type="number" id="fl-straws-used" value="1" min="0" step="0.5" placeholder="e.g. 1"></div>
      </div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:-0.5rem;margin-bottom:0.75rem">Leave straws at 0 to skip deduction</div>
    </div>
    <div class="field"><label>Notes</label><textarea id="fl-notes" placeholder="Vet, protocol, notes…">${flush?.notes||''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFlush('${flush?.id||''}')">${isEdit ? 'Save Changes' : 'Save Flush'}</button>
    </div>`);
}

function updateFlushSemenOpts() {
  const val = document.getElementById('fl-sire-id')?.value || '';
  const section = document.getElementById('fl-semen-section');
  const locSel = document.getElementById('fl-semen-loc');
  if (!section || !locSel) return;
  if (val.startsWith('ai:')) {
    const aiId = val.replace('ai:', '');
    const hasInv = allSemenInventory.some(i => i.ai_ram_id === aiId && i.straws > 0);
    section.style.display = hasInv ? '' : 'none';
    locSel.innerHTML = getSemenOptionsForRam(aiId, '');
  } else {
    section.style.display = 'none';
  }
}

async function saveFlush(id) {
  const date = v('fl-date');
  if (!date) { toast('Date required'); return; }
  const { sire_id, ai_sire_id } = parseSireSelection(v('fl-sire-id'));
  const payload = { donor_id: currentLambId, flush_date: date, flush_type: v('fl-type')||'MOET', embryos_collected: parseInt(v('fl-count'))||0, embryos_transferred: v('fl-transferred') ? parseInt(v('fl-transferred')) : null, sire_id, ai_sire_id, sire_text: v('fl-sire-text'), notes: v('fl-notes') };
  if (id) {
    await db.from('embryo_flushes').update(payload).eq('id', id);
    toast('Flush updated');
  } else {
    const { data } = await db.from('embryo_flushes').insert(payload).select().single();
    const savedId = data?.id;
    if (ai_sire_id && savedId) {
      const loc = v('fl-semen-loc');
      const straws = parseFloat(v('fl-straws-used')) || 0;
      if (loc && straws > 0) await deductSemenInventory(ai_sire_id, loc, straws, 'flush', savedId);
    }
    toast('Flush recorded');
  }
  closeModal(); loadLambTab();
}

function confirmDeleteFlush(id) {
  const el = document.getElementById(`flush-del-${id}`);
  el.innerHTML = `<div class="confirm-inline"><span>Delete?</span><button class="btn btn-danger btn-sm" onclick="deleteFlush('${id}')">Yes</button><button class="btn-icon" onclick="loadLambTab()">No</button></div>`;
}

async function deleteFlush(id) {

}

    <div class="field"><label>Recipient (from flock)</label><select id="tr-recip-id"><option value="">— Select recipient —</option>${recipOptions}</select></div>

      <div style="border-top:1px solid var(--border);margin:0.75rem 0;padding-top:0.75rem">

          <div class="field"><label>Lambs Born</label><input type="number" id="tr-lamb-count" value="${transfer?.lamb_count||''}" placeholder="e.g. 2" min="0"></div>
        </div>
        <div class="field"><label>Notes</label><textarea id="tr-lamb-notes" placeholder="Birth weights, complications…">${transfer?.lamb_notes||''}</textarea></div>
        <div class="field">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">

      <button class="btn btn-primary" onclick="saveTransfer('${flushId}','${transfer?.id||''}')">${isEdit?'Save Changes':'Save Transfer'}</button>

    db.from('embryo_transfer_lambs').select('*').eq('transfer_id', transfer.id).order('created_at').then(({data}) => {

function renderTrLambRows() {
  const flockOptions = allLambs.map(l=>`<option value="${l.id}">${l.name}${l.ear_tag?' (#'+l.ear_tag+')':''}${l.alt_id?' ['+l.alt_id+']':''}</option>`).join('');

  return window._trLambs.map((lb, i) => `

        <input style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.45rem 0.6rem;font-size:0.85rem" value="${lb.ear_tag||''}" oninput="window._trLambs[${i}].ear_tag=this.value" placeholder="#tag"></div>

          <option ${!lb.sex?'selected':''} value="">—</option>
          <option ${lb.sex==='Ewe'?'selected':''}>Ewe</option>
          <option ${lb.sex==='Ram'?'selected':''}>Ram</option>
          <option ${lb.sex==='Wether'?'selected':''}>Wether</option>
        </select></div>
      <div style="flex:1;min-width:70px"><label style="font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em">Birth Wt (lbs)</label>
        <input type="number" step="0.1" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.45rem 0.6rem;font-size:0.85rem" value="${lb.birth_weight||''}" oninput="window._trLambs[${i}].birth_weight=this.value" placeholder="lbs"></div>
      <div style="flex:1.5;min-width:100px"><label style="font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em">Link to Lamb Profile</label>
        <select style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.45rem 0.6rem;font-size:0.85rem" onchange="window._trLambs[${i}].lamb_id=this.value">
          <option value="">— Optional —</option>${flockOptions}

      <button class="btn-icon" style="color:#c07070;border-color:#5a2a2a;flex-shrink:0;margin-bottom:1px" onclick="removeTrLambRow(${i})">✕</button>
    </div>`).join('');
}

function addTrLambRow() {
  window._trLambs.push({ ear_tag:'', sex:'', birth_weight:'', lamb_id:'' });
  const el = document.getElementById('tr-lamb-rows');
  if (el) el.innerHTML = renderTrLambRows();
}

function removeTrLambRow(i) {
  window._trLambs.splice(i, 1);
  const el = document.getElementById('tr-lamb-rows');
  if (el) el.innerHTML = renderTrLambRows();
}

function toggleLambBornFields() {
  const outcome = document.getElementById('tr-outcome')?.value;
  const fields = document.getElementById('tr-lamb-fields');
  if (fields) fields.style.display = outcome === 'Lamb Born' ? 'block' : 'none';
}

async function saveTransfer(flushId, id) {
  const outcome = v('tr-outcome') || 'Pending';
  const lambBorn = outcome === 'Lamb Born';
  const payload = {
    flush_id: flushId,
    donor_id: currentLambId,
    recipient_id: v('tr-recip-id')||null,
    recipient_text: v('tr-recip-text'),
    implant_date: v('tr-date')||null,
    num_transferred: v('tr-num') ? parseInt(v('tr-num')) : null,
    outcome,
    notes: v('tr-notes'),
    lamb_born: lambBorn,
    lamb_birth_date: lambBorn ? (v('tr-birth-date')||null) : null,
    lamb_count: lambBorn && v('tr-lamb-count') ? parseInt(v('tr-lamb-count')) : null,
    lamb_notes: lambBorn ? v('tr-lamb-notes') : null
  };
  let transferId = id;
  if (id) {
    await db.from('embryo_transfers').update(payload).eq('id', id);
    toast('Transfer updated');
  } else {
    const { data } = await db.from('embryo_transfers').insert(payload).select().single();
    transferId = data?.id;
    toast('Transfer recorded');
  }
  // Save individual lamb rows using dedicated table
  if (transferId && lambBorn) {
    await db.from('embryo_transfer_lambs').delete().eq('transfer_id', transferId);
    const lambRows = (window._trLambs||[]).filter(lb => lb.ear_tag || lb.lamb_id);
    if (lambRows.length > 0) {
      await db.from('embryo_transfer_lambs').insert(lambRows.map(lb => ({
        transfer_id: transferId,
        ear_tag: lb.ear_tag||null,
        sex: lb.sex||null,
        birth_weight: lb.birth_weight ? parseFloat(lb.birth_weight) : null,
        lamb_id: lb.lamb_id||null
      })));
    }
  }
  window._trLambs = [];
  closeModal(); loadLambTab();
}

function confirmDeleteTransfer(id) {

  el.innerHTML = `<div class="confirm-inline"><span>Delete?</span><button class="btn btn-danger btn-sm" onclick="deleteTransfer('${id}')">Yes</button><button class="btn-icon" onclick="loadLambTab()">No</button></div>`;

function ftGroupSelected() {
  const sel = document.getElementById('ft-group-filter');
  if (!sel?.value) { ftFilterList(); return; }
  const opt = sel.options[sel.selectedIndex];

  (window._ftAllLambs || []).forEach(l => {
    const row = document.getElementById(`ft-row-${l.id}`);
    if (!row) return;
    row.style.display = ids.has(l.id) ? 'flex' : 'none';

  ['ft-flock-filter','ft-sex-filter','ft-role-filter'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';

function ftFilterList() {
  const groupSel = document.getElementById('ft-group-filter');
  if (groupSel) groupSel.value = '';
  const q = document.getElementById('ft-search')?.value?.toLowerCase() || '';
  const flock = document.getElementById('ft-flock-filter')?.value || '';
  const sex = document.getElementById('ft-sex-filter')?.value || '';
  const role = document.getElementById('ft-role-filter')?.value || '';
  (window._ftAllLambs || []).forEach(l => {
    const row = document.getElementById(`ft-row-${l.id}`);
    if (!row) return;
    const ft = l.flock_type || '';
    let show = true;
    if (q && !l.name.toLowerCase().includes(q) && !(l.ear_tag||'').toLowerCase().includes(q) && !(l.alt_id||'').toLowerCase().includes(q)) show = false;
    if (flock === 'Show' && !(ft==='Show'||ft==='Both')) show = false;
    if (flock === 'Breeding' && !(ft==='Breeding'||ft==='Both')) show = false;
    if (flock === 'Both' && ft !== 'Both') show = false;

async function saveFlockTreatment() {
  const type = window._ftType || 'vaccine';
  const productSel = document.getElementById('ft-product').value;
  let product = productSel === '__custom__' ? v('ft-custom-name') : productSel;
  if (!product) { toast('Select a product'); return; }

  const selected = [...document.querySelectorAll('.ft-lamb-check:checked')].map(c => c.value);
  if (selected.length === 0) { toast('Select at least one lamb'); return; }

  if (productSel === '__custom__' && document.getElementById('ft-save-custom').checked) {
    await db.from('custom_products').insert({ type, name: product });
    await loadCustomProducts();
  }

  const date = v('ft-date');
  const endDate = v('ft-end-date') || null;
  const dose = v('ft-dose');
  const route = v('ft-route');
  const notes = v('ft-notes');

  const records = selected.map(lambId => ({ lamb_id: lambId, type, product, date, end_date: endDate, dose, route, notes }));
  await db.from('health_records').insert(records);

  toast(`Treatment logged for ${selected.length} lamb${selected.length !== 1 ? 's' : ''}`);
  closeModal();
}

async function saveBulkBreeding() {
  const ewes = window._bbAllEwes || allLambs.filter(l => l.status === 'Active' && l.sex === 'Ewe');
  const records = [];
  const missingSire = [];
  for (const ewe of ewes) {
    const checked = document.getElementById(`bb-check-${ewe.id}`)?.checked;
    if (!checked) continue;
    const sireVal = document.getElementById(`bb-sire-${ewe.id}`)?.value || '';
    const date = document.getElementById(`bb-date-${ewe.id}`)?.value || '';
    if (!sireVal) { missingSire.push(ewe.name); continue; }
    if (!date) continue;
    const { sire_id, ai_sire_id } = parseSireSelection(sireVal);
    const expectedDate = date ? new Date(new Date(date).getTime() + 147*24*60*60*1000).toISOString().slice(0,10) : null;
    records.push({ lamb_id: ewe.id, sire_id, ai_sire_id, breeding_date: date, expected_lamb_date: expectedDate, outcome: 'Pending' });
  }
  if (missingSire.length > 0) { toast(`Select a sire for: ${missingSire.join(', ')}`); return; }
  if (records.length === 0) { toast('No ewes selected'); return; }
  await db.from('breeding_records').insert(records);
  toast(`${records.length} breeding records saved`);
  closeModal();
  await loadLambs();
}

async function openBulkPregCheck() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span>Loading records…</div>`;

  const [{ data: breedRecs }, { data: transfers }, { data: flushes }] = await Promise.all([
    db.from('breeding_records').select('*').order('breeding_date', {ascending: false}),
    db.from('embryo_transfers').select('*').order('implant_date', {ascending: false}),
    db.from('embryo_flushes').select('*'),
  ]);

  // Most recent pending breeding per ewe
  const latestByEwe = {};
  (breedRecs||[]).forEach(r => {
    if (r.outcome === 'Pending' || !r.outcome) {
      if (!latestByEwe[r.lamb_id] || r.breeding_date > latestByEwe[r.lamb_id].breeding_date) {
        latestByEwe[r.lamb_id] = r;
      }
    }
  });
  const pendingBreedings = Object.values(latestByEwe).sort((a,b) => b.breeding_date.localeCompare(a.breeding_date));

  // Pending embryo transfers
  const pendingTransfers = (transfers||[]).filter(t => t.outcome === 'Pending' || !t.outcome);

  if (pendingBreedings.length === 0 && pendingTransfers.length === 0) {
    showModal(`
      <div class="modal-header"><div class="modal-title">🔍 Bulk Preg Check</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="empty"><div class="empty-icon">✅</div><h3>No pending records</h3><p>All breeding and transfer records have an outcome recorded.</p></div>
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
    renderFlock(); return;
  }

  const outcomes = ['Confirmed Pregnant', 'Not Pregnant', 'Pending'];
  const transferOutcomes = ['Confirmed Pregnant', 'Not Pregnant', 'Lamb Born', 'Failed', 'Pending'];

  // Build group filter options from pending animals
  const pendingLambIds = new Set([
    ...pendingBreedings.map(r => r.lamb_id),
    ...pendingTransfers.map(t => t.recipient_id).filter(Boolean)
  ]);
  const groups = window._planGroups || [];
  const members = window._planMembers || [];
  const groupOpts = groups
    .filter(g => g.status !== 'Cancelled')
    .map(g => {
      const ids = members.filter(m => m.group_id === g.id && m.lamb_id && pendingLambIds.has(m.lamb_id)).map(m => m.lamb_id);
      if (!ids.length) return '';
      return '<option value="' + g.id + '" data-ids="' + ids.join(',') + '">' + g.name + ' (' + ids.length + ')</option>';
    }).filter(Boolean).join('');

  showModal(`
    <div class="modal-header"><div class="modal-title">🔍 Bulk Preg Check</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="font-size:0.8rem;color:var(--text3);margin-bottom:0.75rem">${pendingBreedings.length} breeding + ${pendingTransfers.length} transfer records pending.</div>
    <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.6rem;flex-wrap:wrap">
      <span style="font-size:0.78rem;color:var(--text3);white-space:nowrap">Set all to:</span>
      <select id="pc-global-outcome" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.35rem 0.6rem;font-size:0.82rem;flex:1">
        ${outcomes.map(o=>`<option>${o}</option>`).join('')}
      </select>
      <button class="btn btn-secondary btn-sm" onclick="applyGlobalPregOutcome()">Apply to all</button>
    </div>
    ${groupOpts ? `<div style="margin-bottom:0.75rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)">
      <select id="pc-group-filter" onchange="pcFilterByGroup()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:0.35rem 0.6rem;font-size:0.82rem">
        <option value="">— All records —</option>${groupOpts}
      </select>
    </div>` : '<div style="border-bottom:1px solid var(--border);margin-bottom:0.75rem"></div>'}
    <div style="max-height:450px;overflow-y:auto" id="pc-rows">
      ${pendingBreedings.length > 0 ? `
        <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;padding:0.4rem 0;margin-bottom:0.25rem">🐏 Breeding Records</div>
        ${pendingBreedings.map(r => {
          const lamb = allLambs.find(l => l.id === r.lamb_id);
          const sire = r.ai_sire_id ? allAiRams.find(x=>x.id===r.ai_sire_id) : null;
          const sireName = sire ? sire.name+' 🧬' : (r.sire_text||'—');
          return `<div class="pc-record-row" data-lamb-id="${r.lamb_id||''}" style="display:grid;grid-template-columns:16px 1fr auto;gap:0.5rem 0.65rem;align-items:center;padding:0.55rem 0;border-bottom:1px solid var(--border)">
            <input type="checkbox" id="pc-check-${r.id}" data-type="breeding" style="accent-color:var(--accent);width:14px;height:14px">
            <div style="min-width:0">
              <div style="font-size:0.88rem;font-weight:600;color:var(--text)">${lamb?.name||'Unknown'} <span style="font-weight:400;color:var(--text3)">${lamb?.ear_tag?'#'+lamb.ear_tag:''}</span></div>

              ${outcomes.map(o=>`<option ${o==='Confirmed Pregnant'?'selected':''}>${o}</option>`).join('')}

      ${pendingTransfers.length > 0 ? `

          const flush = (flushes||[]).find(f=>f.id===t.flush_id);
          const donor = flush ? allLambs.find(l=>l.id===flush.donor_id) : null;
          return `<div class="pc-record-row" data-lamb-id="${t.recipient_id||''}" style="display:grid;grid-template-columns:16px 1fr auto;gap:0.5rem 0.65rem;align-items:center;padding:0.55rem 0;border-bottom:1px solid var(--border)">
            <input type="checkbox" id="pc-check-${t.id}" data-type="transfer" style="accent-color:var(--accent);width:14px;height:14px">
            <div style="min-width:0">
              <div style="font-size:0.88rem;font-weight:600;color:var(--text)">${recipName}</div>

        }).join('')}` : ''}
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBulkPregCheck()">Save Results</button>
    </div>`, true);

  renderFlock();

function pcFilterByGroup() {
  const sel = document.getElementById('pc-group-filter');
  const val = sel?.value || '';
  const ids = val ? new Set((sel.options[sel.selectedIndex]?.getAttribute('data-ids')||'').split(',').filter(Boolean)) : null;
  document.querySelectorAll('#pc-rows > div[id^="pc-rec-"], #pc-rows .pc-record-row').forEach(row => {
    if (!ids) { row.style.display = ''; return; }

function applyGlobalPregOutcome() {
  const outcome = document.getElementById('pc-global-outcome')?.value;
  document.querySelectorAll('.pc-record-row').forEach(row => {
    if (row.style.display === 'none') return;
    const outcomeId = row.querySelector('[id^="pc-outcome-"]')?.id;
    const checkId = row.querySelector('[id^="pc-check-"]')?.id;
    if (outcomeId) document.getElementById(outcomeId).value = outcome;
    if (checkId) document.getElementById(checkId).checked = true;
  });
}

async function saveBulkPregCheck() {
  const checkboxes = document.querySelectorAll('[id^="pc-check-"]');
  const breedingUpdates = [];
  const transferUpdates = [];

  checkboxes.forEach(cb => {
    if (!cb.checked) return;
    const id = cb.id.replace('pc-check-', '');
    const outcome = document.getElementById(`pc-outcome-${id}`)?.value;
    if (!outcome) return;
    if (cb.dataset.type === 'transfer') {
      transferUpdates.push({ id, outcome, lambBorn: outcome === 'Lamb Born' });
    } else {
      breedingUpdates.push({ id, outcome });
    }
  });

  if (breedingUpdates.length === 0 && transferUpdates.length === 0) { toast('No records selected'); return; }

  await Promise.all([

  ]);

  toast(`${total} record${total!==1?'s':''} updated`);

}

function bwShowSelected() {
  const sel = document.getElementById('bw-show-filter');
  if (!sel?.value) { bwFilterList(); return; }
  const showId = sel.value;
  const ids = window._bwShowLambMap?.[showId] || new Set();
  ['bw-search','bw-flock-filter','bw-sex-filter','bw-group-filter'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  (window._bwAllLambs || []).forEach(l => {
    const row = document.getElementById(`bw-row-${l.id}`);
    if (row) row.style.display = ids.has(l.id) ? 'flex' : 'none';
  });
}

function bwFilterList() {
  const showSel = document.getElementById('bw-show-filter');
  if (showSel) showSel.value = '';
  const q = document.getElementById('bw-search')?.value?.toLowerCase() || '';
  const flock = document.getElementById('bw-flock-filter')?.value || '';
  const sex = document.getElementById('bw-sex-filter')?.value || '';
  const groupSel = document.getElementById('bw-group-filter');
  if (groupSel) groupSel.value = '';
  (window._bwAllLambs || []).forEach(l => {
    const row = document.getElementById(`bw-row-${l.id}`);
    if (!row) return;
    const ft = l.flock_type || '';
    let show = true;
    if (q && !l.name.toLowerCase().includes(q) && !(l.ear_tag||'').toLowerCase().includes(q)) show = false;
    if (flock === 'Show' && !(ft==='Show'||ft==='Both')) show = false;
    if (flock === 'Breeding' && !(ft==='Breeding'||ft==='Both')) show = false;
    if (flock === 'Both' && ft !== 'Both') show = false;
    if (sex && l.sex !== sex) show = false;
    row.style.display = show ? 'flex' : 'none';
  });
}

function bwGroupSelected() {
  const sel = document.getElementById('bw-group-filter');
  if (!sel?.value) { bwFilterList(); return; }
  const ids = new Set((sel.options[sel.selectedIndex]?.getAttribute('data-ids')||'').split(',').filter(Boolean));

function applyGlobalWeightDate() {
  const date = document.getElementById('bw-global-date')?.value;
  if (!date) return;
  (window._bwAllLambs || []).forEach(lamb => {
    const row = document.getElementById(`bw-row-${lamb.id}`);
    const el = document.getElementById(`bw-date-${lamb.id}`);

async function saveBulkWeight() {
  const active = window._bwAllLambs || allLambs.filter(l => l.status === 'Active');
  const records = [];
  for (const lamb of active) {
    const cb = document.getElementById(`bw-cb-${lamb.id}`);
    if (!cb?.checked) continue;
    const wtEl = document.getElementById(`bw-wt-${lamb.id}`);
    const dateEl = document.getElementById(`bw-date-${lamb.id}`);
    const wt = wtEl?.value?.trim();
    const date = dateEl?.value;
    if (!wt || isNaN(parseFloat(wt))) continue;
    if (!date) continue;
    const bwTime = combineTimeAmPm('bw-global-time','bw-global-ampm');
    records.push({ lamb_id: lamb.id, weight_lbs: parseFloat(wt), date, weigh_time: bwTime||null });
  }
  if (records.length === 0) { toast('No weights entered — fill in at least one weight field'); return; }
  const { error } = await db.from('weight_records').insert(records);
  if (error) { console.error('Save error:', error); toast('Error saving: ' + (error.message||'unknown')); return; }
  toast(`${records.length} weight record${records.length!==1?'s':''} saved`);
  closeModal();
  if (currentPage === 'weights') renderWeightsPage();
}

  // AI rams must be selected in the AI Rams panel to appear

  // This handles deleted animals that still have stale references
  const validLambIds = new Set(allLambs.map(l => l.id));
  const validAiRamIds = new Set(allAiRams.map(r => r.id));
  allSelected.forEach(a => {
    if (a.sire_id && !validLambIds.has(a.sire_id)) a.sire_id = null;
    if (a.dam_id && !validLambIds.has(a.dam_id)) a.dam_id = null;
    if (a.ai_sire_id && !validAiRamIds.has(a.ai_sire_id)) a.ai_sire_id = null;
    if (a.sire_ai_id && !validAiRamIds.has(a.sire_ai_id)) a.sire_ai_id = null;

function layoutAndDrawPed(animals) {
  const NODE_W = 160, NODE_H = 60, HGAP = 40, VGAP = 80;
  const byId = {};
  animals.forEach(a => { byId[a.id] = a; });

  // Build children map
  const childrenOf = {};
  const hasParent = new Set();
  animals.forEach(a => {
    const parents = [
      a.sire_id, a.dam_id, a.ai_sire_id,
      a._type==='airam' ? a.sire_ai_id : null,
      a._type==='airam' ? a.dam_lamb_id : null
    ].filter(pid => pid && byId[pid]);
    parents.forEach(pid => {
      if (!childrenOf[pid]) childrenOf[pid] = [];
      if (!childrenOf[pid].includes(a.id)) childrenOf[pid].push(a.id);
      hasParent.add(a.id);
    });
  });

  const roots = animals.filter(a => !hasParent.has(a.id));
  // Split: real roots have children; isolated have no connections at all
  const realRoots = roots.filter(a => childrenOf[a.id] && childrenOf[a.id].length > 0);
  const isolated = roots.filter(a => !childrenOf[a.id] || childrenOf[a.id].length === 0);

  const positions = {};
  const placed = new Set();
  let xCursor = 20;

  function placeNode(id, depth, visited = new Set()) {
    if (placed.has(id) || visited.has(id)) return;
    visited.add(id); placed.add(id);
    const kids = (childrenOf[id] || []).filter(c => !placed.has(c));
    const y = 20 + depth * (NODE_H + VGAP);
    if (kids.length === 0) {
      positions[id] = { x: xCursor, y };
      xCursor += NODE_W + HGAP;
      return;
    }
    const startX = xCursor;
    kids.forEach(kid => placeNode(kid, depth + 1, new Set(visited)));
    const firstKid = positions[kids[0]];
    const lastKid = positions[kids[kids.length - 1]];
    if (firstKid && lastKid) {
      positions[id] = { x: (firstKid.x + lastKid.x + NODE_W) / 2 - NODE_W / 2, y };
    } else {
      positions[id] = { x: startX, y };
      xCursor += NODE_W + HGAP;
    }
  }

  // Only place real connected trees
  realRoots.forEach(a => { placeNode(a.id, 0); xCursor += HGAP; });
  // Place any remaining connected but missed animals
  animals.filter(a => !placed.has(a.id) && !isolated.includes(a)).forEach(a => placeNode(a.id, 0));

  // Place isolated animals in a grid below
  const treeMaxY = Object.values(positions).length > 0 ? Math.max(...Object.values(positions).map(p => p.y + NODE_H)) : 0;
  const treeMaxX = Object.values(positions).length > 0 ? Math.max(...Object.values(positions).map(p => p.x + NODE_W)) : 800;
  const hasTree = treeMaxY > 0;
  const gridY = hasTree ? treeMaxY + VGAP * 1.5 : 20;
  const colsPerRow = Math.max(1, Math.floor(Math.max(treeMaxX, NODE_W * 5) / (NODE_W + HGAP)));
  isolated.forEach((a, i) => {
    positions[a.id] = {
      x: 20 + (i % colsPerRow) * (NODE_W + HGAP),
      y: gridY + Math.floor(i / colsPerRow) * (NODE_H + VGAP)
    };
  });

  const totalW = Math.max(...Object.values(positions).map(p => p.x + NODE_W)) + 40;
  const totalH = Math.max(...Object.values(positions).map(p => p.y + NODE_H)) + 40;

  const catColors = { ewes:'#9333b0', recips:'#6020a0', airams:'#4020c0', rams:'#2050c0', wethers:'#306040' };

  // Build SVG lines
  let lines = '';
  // Separator between tree and isolated grid
  if (hasTree && isolated.length > 0) {
    const sepY = treeMaxY + VGAP * 0.6;
    lines += `<line x1="0" y1="${sepY}" x2="9999" y2="${sepY}" stroke="#2a3f22" stroke-width="1" stroke-dasharray="6,4"/>`;
    lines += `<text x="20" y="${sepY - 6}" fill="#4a6e38" font-size="12" font-family="system-ui,sans-serif">── Unlinked animals ──</text>`;
  }
  const lineColors = { sire:'#4a8a2a', dam:'#3070b8', ai:'#d08020' };
  animals.forEach(a => {
    const child = positions[a.id];
    if (!child) return;
    const cx = child.x + NODE_W/2, cy = child.y;

    function svgLine(parentId, color) {
      const par = positions[parentId];
      if (!par) return;
      const px = par.x + NODE_W/2, py = par.y + NODE_H;
      const midY = py + (cy - py)/2;
      lines += `<path d="M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}" fill="none" stroke="${color}" stroke-width="2"/>`;
    }
    if (a.sire_id && positions[a.sire_id]) svgLine(a.sire_id, lineColors.sire);
    if (a.dam_id && positions[a.dam_id]) svgLine(a.dam_id, lineColors.dam);
    if (a.ai_sire_id && positions[a.ai_sire_id]) svgLine(a.ai_sire_id, lineColors.ai);
    if (a._type==='airam' && a.sire_ai_id && positions[a.sire_ai_id]) svgLine(a.sire_ai_id, lineColors.ai);
    if (a._type==='airam' && a.dam_lamb_id && positions[a.dam_lamb_id]) svgLine(a.dam_lamb_id, lineColors.dam);
  });

  // Build nodes as absolutely positioned divs
  let nodes = '';
  animals.forEach(a => {
    const pos = positions[a.id];
    if (!pos) return;
    const color = catColors[a._cat] || '#4020c0';
    const tag = a.ear_tag ? '#'+a.ear_tag : (a.registration_no||'');
    const cursor = a._type === 'lamb' ? 'pointer' : 'default';
    const onclick = a._type === 'lamb' ? `onclick="showLamb('${a.id}')"` : '';
    nodes += `<div ${onclick} title="${a.name}${tag?' '+tag:''}" style="
      position:absolute;
      left:${pos.x}px;top:${pos.y}px;
      width:${NODE_W}px;height:${NODE_H}px;
      background:${color};
      border-radius:8px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:4px 10px;box-sizing:border-box;
      cursor:${cursor};
      user-select:none;
    ">
      <div style="color:#fff;font-size:15px;font-weight:700;font-family:system-ui,sans-serif;text-align:center;line-height:1.2;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</div>
      ${tag ? `<div style="color:rgba(255,255,255,0.75);font-size:11px;font-family:system-ui,sans-serif;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tag}</div>` : ''}
    </div>`;
  });

  const wrap = document.getElementById('ped-canvas-wrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div style="position:relative;width:${totalW}px;height:${totalH}px;min-width:100%;transform-origin:top left">
      <svg style="position:absolute;top:0;left:0;width:${totalW}px;height:${totalH}px;pointer-events:none" viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="none">
        ${lines}
      </svg>
      ${nodes}
    </div>`;
  pedZoomLevel = 1;
  setTimeout(setupPedScrollZoom, 50);
}

let pedZoomLevel = 1;

function pedZoom(factor) {
  pedZoomLevel = Math.max(0.3, Math.min(3, pedZoomLevel * factor));
  const inner = document.querySelector('#ped-canvas-wrap > div');
  if (inner) {
    inner.style.transform = `scale(${pedZoomLevel})`;
    inner.style.transformOrigin = 'top left';
  }
}

function pedResetView() {
  pedZoomLevel = 1;
  const w = document.getElementById('ped-canvas-wrap');
  const inner = w ? w.querySelector('div') : null;
  if (inner) { inner.style.transform = 'scale(1)'; }
  if (w) { w.scrollLeft = 0; w.scrollTop = 0; }
}

function setupPedScrollZoom() {
  const wrap = document.getElementById('ped-canvas-wrap');
  if (!wrap) return;

  // Ctrl+scroll to zoom
  wrap.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      pedZoom(e.deltaY < 0 ? 1.1 : 0.9);
    }
  }, { passive: false });

  // Mouse drag to pan
  let dragging = false;
  let dragStartX = 0, dragStartY = 0;
  let scrollStartX = 0, scrollStartY = 0;

  wrap.addEventListener('mousedown', e => {
    // Only drag on the background, not on node divs
    if (e.target !== wrap && e.target.tagName !== 'svg' && e.target.tagName !== 'path' && !e.target.closest('svg')) {
      if (e.target.style && e.target.style.position === 'absolute') return; // clicking a node
    }
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    scrollStartX = wrap.scrollLeft;
    scrollStartY = wrap.scrollTop;
    wrap.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    wrap.scrollLeft = scrollStartX - (e.clientX - dragStartX);
    wrap.scrollTop = scrollStartY - (e.clientY - dragStartY);
  });

  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; wrap.style.cursor = 'grab'; }
  });

  wrap.style.cursor = 'grab';
}

async function confirmUseInventory(id, available, flushId, donorId) {
  const recipId = document.getElementById('ui-recip')?.value || null;
  const recipText = document.getElementById('ui-recip-text')?.value?.trim() || null;
  const qty = parseInt(document.getElementById('ui-qty')?.value) || 1;
  const date = document.getElementById('ui-date')?.value;
  if (!recipId && !recipText) { toast('Select or enter a recipient'); return; }
  if (qty > parseInt(available)) { toast(`Only ${available} embryos available`); return; }
  // Create transfer record
  await db.from('embryo_transfers').insert({
    recipient_id: recipId||null, recip_text: recipText||null,
    flush_id: flushId||null, donor_id: donorId||null,
    implant_date: date, outcome: 'Pending', num_transferred: qty,
  });
  // Deduct from inventory
  const newQty = parseInt(available) - qty;
  if (newQty <= 0) {
    await db.from('embryo_inventory').delete().eq('id', id);
    toast(`Transfer created — inventory lot depleted`);
  } else {
    await db.from('embryo_inventory').update({ quantity: newQty }).eq('id', id);
    toast(`Transfer created — ${newQty} embryos remaining`);
  }
  closeModal();
  renderEmbryoInventory();
}

function fmtTimeInput(el) {
  let v = el.value.trim().replace(/[^0-9:apmAPM]/g, '');
  if (!v) return;
  // Strip am/pm suffix
  const isPM = /pm/i.test(v);
  const isAM = /am/i.test(v);
  v = v.replace(/[apmAM]/gi, '').trim();
  // Parse digits
  const digits = v.replace(/:/g, '');
  let h, m;
  if (digits.length <= 2) { h = parseInt(digits); m = 0; }
  else if (digits.length === 3) { h = parseInt(digits.slice(0,1)); m = parseInt(digits.slice(1)); }
  else { h = parseInt(digits.slice(0,2)); m = parseInt(digits.slice(2,4)); }
  if (isNaN(h)) return;
  m = isNaN(m) ? 0 : m;
  if (isPM && h < 12) h += 12;
  if (isAM && h === 12) h = 0;
  h = Math.min(23, Math.max(0, h));
  m = Math.min(59, Math.max(0, m));
  el.value = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  el.style.borderColor = '';
}

function combineTimeAmPm(timeId, ampmId) {
  const t = document.getElementById(timeId)?.value?.trim();
  const ap = document.getElementById(ampmId)?.value || 'AM';
  if (!t) return null;
  try {
    const [h, m] = t.split(':').map(Number);
    let h24 = h;
    if (ap === 'PM' && h < 12) h24 = h + 12;
    if (ap === 'AM' && h === 12) h24 = 0;
    return String(h24).padStart(2,'0') + ':' + String(m||0).padStart(2,'0');
  } catch(e) { return t; }
}

function fmtStepTime(t) {
  if (!t) return '';
  try {
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  } catch(e) { return t; }
}

async function printPlan(groupId) {
  const g = (window._planGroups||[]).find(x => x.id === groupId);
  if (!g) return;

  const members = (window._planMembers||[]).filter(m => m.group_id === groupId);
  const donors = members.filter(m => (m.role||'donor') === 'donor');
  const recips = members.filter(m => m.role === 'recip');
  const steps = window._planSteps || [];
  const protocols = window._planProtocols || [];

  const prot = g.protocol_id ? protocols.find(p => p.id === g.protocol_id) : null;
  const recipProt = g.recip_protocol_id ? protocols.find(p => p.id === g.recip_protocol_id) : null;
  const donorSteps = prot ? steps.filter(s => s.protocol_id === prot.id).sort((a,b) => b.day_offset - a.day_offset) : [];
  const recipSteps = recipProt ? steps.filter(s => s.protocol_id === recipProt.id).sort((a,b) => b.day_offset - a.day_offset) : [];
  const isFlush = g.type === 'flush';

  function stepDate(dayOffset) {
    if (!g.target_date) return '—';
    return new Date(new Date(g.target_date + 'T12:00:00').getTime() - dayOffset*24*60*60*1000).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
  }

  function donorRow(m) {
    const lamb = allLambs.find(l => l.id === m.lamb_id);
    const sire = m.ai_sire_id ? allAiRams.find(r => r.id === m.ai_sire_id) : null;
    return `<tr>
      <td style="padding:5px 8px;font-size:11px;font-weight:600">${lamb?.name||'Unknown'}</td>
      <td style="padding:5px 8px;font-size:11px">${lamb?.ear_tag?'#'+lamb.ear_tag:'—'}</td>
      <td style="padding:5px 8px;font-size:11px">${lamb?.scrapie_id||'—'}</td>
      <td style="padding:5px 8px;font-size:11px">${lamb?.breed||'—'}</td>
      <td style="padding:5px 8px;font-size:11px">${sire ? sire.name+' 🧬' : (m.sire_text||'—')}</td>
    </tr>`;

  function recipRow(m) {
    const lamb = m.lamb_id ? allLambs.find(l => l.id === m.lamb_id) : null;
    const name = lamb ? lamb.name : (m.recip_text||'Unknown');
    return `<tr>
      <td style="padding:5px 8px;font-size:11px;font-weight:600">${name}</td>
      <td style="padding:5px 8px;font-size:11px">${lamb?.ear_tag?'#'+lamb.ear_tag:'—'}</td>

        <td style="padding:6px 8px;font-size:11px"></td>

          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  const printDate = new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});

    .meta { display:grid; grid-template-columns:1fr 1fr; gap:6px 24px; margin-bottom:18px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:4px; padding:10px 14px; }
    .meta-row { display:flex; gap:6px; font-size:11px; }

    .footer { text-align:center; font-size:9px; color:#9ca3af; margin-top:24px; border-top:1px solid #e5e7eb; padding-top:8px; }
    @media print { body { padding:12px; } }
  </style>
</head>
<body>
  <h1>${g.name}</h1>
  <h2>${isFlush ? '🔬 Embryo Flush Plan' : '🐏 AI Breeding Plan'} · Generated ${printDate}</h2>

  <div class="meta">
    <div class="meta-row"><span class="meta-label">Type:</span><span>${isFlush?'Flush':'AI Breeding'}</span></div>
    <div class="meta-row"><span class="meta-label">Status:</span><span>${g.status}</span></div>
    <div class="meta-row"><span class="meta-label">Target Date:</span><span>${targetFmt}</span></div>
    <div class="meta-row"><span class="meta-label">Donor Protocol:</span><span>${prot?.name||'—'}</span></div>

function cancelPlan(groupId) {
  const g = (window._planGroups||[]).find(x => x.id === groupId);
  if (!g) return;
  // Use modal confirm instead of browser confirm (blocked on file:// URLs)
  showModal(`
    <div class="modal-header"><div class="modal-title">✕ Cancel Plan</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="padding:0.5rem 0 1rem;color:var(--text)">Cancel <strong>${g.name}</strong>? It will stay visible with Cancelled status and can be restored by editing it.</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Keep Plan</button>
      <button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger)" onclick="confirmCancelPlan('${groupId}')">Yes, Cancel Plan</button>
    </div>`);
}

async function confirmCancelPlan(groupId) {
  await db.from('breeding_groups').update({ status: 'Cancelled' }).eq('id', groupId);
  window._planGroups = (window._planGroups||[]).map(g => g.id === groupId ? {...g, status:'Cancelled'} : g);
  toast('Plan cancelled');
  closeModal();
  renderPlanningHTML();
}

async function openCompletePlan(groupId) {
  const g = (window._planGroups||[]).find(x => x.id === groupId);
  const groupMembers = (window._planMembers||[]).filter(m => m.group_id === groupId);
  if (!g) return;

  const isFlush = g.type === 'flush';
  const donors = groupMembers.filter(m => (m.role||'donor') === 'donor');
  const recips = isFlush ? groupMembers.filter(m => m.role === 'recip') : [];

  if (donors.length === 0) { toast('Add donors to this group first'); return; }

  const targetDate = g.target_date || new Date().toISOString().slice(0,10);

let _cpNextRow = 0;
function validateCpEmbryos() {
  const tbody = document.getElementById('cp-tbody');
  if (!tbody) return;

  const donorRows = Array.from(tbody.querySelectorAll('tr[data-type="donor"]'));
  const recipRows = Array.from(tbody.querySelectorAll('tr[data-type="recip"]'));

  // Build maps: donorIdx -> collected, transferred, frozen
  const collectedByDonor = {}, transferredByDonor = {}, frozenByDonor = {};
  donorRows.forEach((row, di) => {
    const rowId = row.id.replace('cp-row-','');
    collectedByDonor[di] = parseInt(document.getElementById(`cp-collected-${rowId}`)?.value) || 0;
    transferredByDonor[di] = parseInt(document.getElementById(`cp-transferred-${rowId}`)?.value) || 0;
    frozenByDonor[di] = parseInt(document.getElementById(`cp-frozen-${rowId}`)?.value) || 0;
  });

  // Sum recip embryos assigned per donor
  const assignedByDonor = {};
  recipRows.forEach(row => {
    const rowId = row.id.replace('cp-row-','');
    const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
    const embryos = parseInt(document.getElementById(`cp-embryos-${rowId}`)?.value) || 0;
    if (donorIdx !== '' && donorIdx !== null && donorIdx !== undefined) {
      const di = parseInt(donorIdx);
      assignedByDonor[di] = (assignedByDonor[di] || 0) + embryos;
    }
  });

  // Validate each donor row
  donorRows.forEach((row, di) => {
    const rowId = row.id.replace('cp-row-','');
    const collected = collectedByDonor[di] || 0;
    const transferred = transferredByDonor[di] || 0;
    const frozen = frozenByDonor[di] || 0;
    const assigned = assignedByDonor[di] || 0;
    const accounted = transferred + frozen;
    const unaccounted = collected - accounted;
    const balanceEl = document.getElementById(`cp-balance-${rowId}`);

    // Balance display
    if (balanceEl && collected > 0) {
      if (accounted > collected) {
        balanceEl.style.color = '#dc2626';
        balanceEl.textContent = `⚠️ ${accounted} accounted > ${collected} collected`;
      } else if (unaccounted > 0) {
        balanceEl.style.color = '#d97706';
        balanceEl.textContent = `⚠️ ${unaccounted} embryo${unaccounted!==1?'s':''} unaccounted for`;
      } else if (accounted === collected) {
        balanceEl.style.color = '#16a34a';
        balanceEl.textContent = `✓ All ${collected} accounted (${transferred} transferred, ${frozen} frozen)`;
      }
    } else if (balanceEl) {
      balanceEl.textContent = '';
    }

    // Color borders
    const collectedEl = document.getElementById(`cp-collected-${rowId}`);
    const transferredEl = document.getElementById(`cp-transferred-${rowId}`);
    const frozenEl = document.getElementById(`cp-frozen-${rowId}`);
    const isOk = collected > 0 && accounted === collected;
    const isOver = collected > 0 && accounted > collected;
    if (collectedEl) collectedEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : '';
    if (transferredEl) transferredEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : '';
    if (frozenEl) frozenEl.style.borderColor = isOver ? '#dc2626' : isOk ? '#16a34a' : (frozen > 0 ? '#3b82f6' : '');

    // Recip assigned warning
    const assignWarnId = `cp-collected-warn-${rowId}`;
    let assignWarnEl = document.getElementById(assignWarnId);
    if (collected > 0 && assigned > collected) {
      if (!assignWarnEl) {
        assignWarnEl = document.createElement('div');
        assignWarnEl.id = assignWarnId;
        assignWarnEl.style.cssText = 'font-size:0.68rem;color:#dc2626;font-weight:600;margin-top:0.15rem';
        collectedEl?.parentElement?.appendChild(assignWarnEl);
      }
      assignWarnEl.textContent = `⚠️ ${assigned} recips > ${collected} collected`;
    } else {
      if (assignWarnEl) assignWarnEl.remove();
    }
  });

  // Validate recip rows
  recipRows.forEach(row => {
    const rowId = row.id.replace('cp-row-','');
    const donorIdx = document.getElementById(`cp-donor-${rowId}`)?.value;
    const embryosEl = document.getElementById(`cp-embryos-${rowId}`);
    const embryos = parseInt(embryosEl?.value) || 0;
    let warnEl = document.getElementById(`cp-embryos-warn-${rowId}`);
    if (donorIdx !== '' && donorIdx !== undefined) {
      const di = parseInt(donorIdx);
      const collected = collectedByDonor[di] || 0;
      const assigned = assignedByDonor[di] || 0;
      if (collected > 0 && assigned > collected) {
        if (!warnEl) {
          warnEl = document.createElement('div');
          warnEl.id = `cp-embryos-warn-${rowId}`;
          warnEl.style.cssText = 'font-size:0.68rem;color:#dc2626;font-weight:600;margin-top:0.1rem';
          embryosEl?.parentElement?.appendChild(warnEl);
        }
        warnEl.textContent = `Over by ${assigned - collected}`;
        if (embryosEl) embryosEl.style.borderColor = '#dc2626';
      } else {
        if (warnEl) warnEl.remove();
        if (embryosEl) embryosEl.style.borderColor = collected > 0 ? '#16a34a' : '';
      }
    }
  });
}
